apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: ${{values.name}}-git-clone
  namespace: ${{values.namespace}}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  params:
    - name: url
      type: string
    - name: revision
      type: string
      default: main
  results:
    - name: commit
      description: The precise commit SHA that was fetched
      type: string
    - name: url
      description: The precise URL that was fetched
      type: string
  workspaces:
    - name: output
  steps:
    - name: clone
      computeResources: {}
      image: alpine/git:latest
      env:
        - name: PARAM_URL
          value: $(params.url)
        - name: PARAM_REVISION
          value: $(params.revision)
        - name: WORKSPACE_OUTPUT_PATH
          value: $(workspaces.output.path)
      script: |
        #!/usr/bin/env sh
        set -eu
        cd "$WORKSPACE_OUTPUT_PATH"
        git init
        git remote add origin "$PARAM_URL"
        git fetch --depth 1 origin "$PARAM_REVISION"
        git checkout FETCH_HEAD
        RESULT_SHA=$(git rev-parse HEAD)
        printf "%s" "$RESULT_SHA" > "$(results.commit.path)"
        printf "%s" "$PARAM_URL" > "$(results.url.path)"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: ${{values.name}}-buildah
  namespace: ${{values.namespace}}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  params:
    - name: IMAGE
      type: string
    - name: DOCKERFILE
      type: string
      default: ./Dockerfile
    - name: TLSVERIFY
      type: string
      default: "false"
  workspaces:
    - name: source
  steps:
    - name: build-and-push
      computeResources: {}
      image: quay.io/buildah/stable:v1.31.0
      workingDir: $(workspaces.source.path)
      securityContext:
        capabilities:
          add: ["SETFCAP"]
      script: |
        #!/usr/bin/env bash
        set -e
        buildah bud --storage-driver=vfs \
          --tls-verify=$(params.TLSVERIFY) \
          -f $(params.DOCKERFILE) \
          -t $(params.IMAGE) .
        buildah push --storage-driver=vfs \
          --tls-verify=$(params.TLSVERIFY) \
          $(params.IMAGE) \
          docker://$(params.IMAGE)
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: ${{values.name}}-openshift-client
  namespace: ${{values.namespace}}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  params:
    - name: SCRIPT
      type: string
  steps:
    - name: oc
      computeResources: {}
      image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
      script: |
        #!/usr/bin/env bash
        set -e
        $(params.SCRIPT)
