apiVersion: batch/v1
kind: Job
metadata:
  name: ${{values.name}}-initial-build
  namespace: ${{values.namespace}}
  labels:
    backstage.io/kubernetes-id: ${{values.uniqueName}}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        backstage.io/kubernetes-id: ${{values.uniqueName}}
    spec:
      serviceAccountName: ${{values.name}}-trigger-sa
      restartPolicy: Never
      containers:
        - name: trigger
          image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
          command: ["bash", "-lc"]
          args:
            - |
              set -euo pipefail
              NS="$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)"
              APP="${{values.name}}"
              PR_INITIAL="${APP}-initial"
              pipeline_label="tekton.dev/pipeline=${{values.name}}-build"

              newest_pr_name() {
                oc -n "$NS" get pipelinerun -l "${pipeline_label}" \
                  --sort-by=.metadata.creationTimestamp \
                  -o jsonpath='{.items[-1].metadata.name}' 2>/dev/null || true
              }

              PR_NAME="$(newest_pr_name)"
              if [ -n "${PR_NAME}" ]; then
                echo "Found PipelineRun ${PR_NAME}. Waiting for Succeeded..."
                oc -n "$NS" wait --for=condition=Succeeded "pipelinerun/${PR_NAME}" --timeout=45m
                exit 0
              fi

              if ! oc -n "$NS" get pipelinerun "${PR_INITIAL}" >/dev/null 2>&1; then
                echo "Creating deterministic initial PipelineRun ${PR_INITIAL}..."
                oc -n "$NS" create -f - <<'EOF'
              apiVersion: tekton.dev/v1
              kind: PipelineRun
              metadata:
                name: ${{values.name}}-initial
                labels:
                  backstage.io/kubernetes-id: ${{values.uniqueName}}
                  tekton.dev/pipeline: ${{values.name}}-build
                  test-drive.io/initial-build: "true"
              spec:
                pipelineRef:
                  name: ${{values.name}}-build
                params:
                  - name: git-url
                    value: http://gitea-http.gitea.svc.cluster.local:3000/ws-${{values.owner}}/${{values.name}}.git
                  - name: git-revision
                    value: main
                workspaces:
                  - name: source
                    volumeClaimTemplate:
                      spec:
                        accessModes: ["ReadWriteOnce"]
                        resources:
                          requests:
                            storage: 1Gi
              EOF
              fi

              PR_NAME="${PR_INITIAL}"
              echo "Waiting for PipelineRun ${PR_NAME} to Succeed..."
              oc -n "$NS" wait --for=condition=Succeeded "pipelinerun/${PR_NAME}" --timeout=45m
