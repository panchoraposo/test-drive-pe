apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: ${{values.name}}-auth
  namespace: ${{values.namespace}}
  labels:
    app.kubernetes.io/name: ${{values.name}}
    backstage.io/kubernetes-id: ${{values.uniqueName}}
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: ${{values.name}}-route
  defaults:
    rules:
      authentication:
        api-key-auth:
          apiKey:
            allNamespaces: true
            selector:
              matchExpressions:
                - key: devportal.kuadrant.io/apiproduct
                  operator: In
                  values:
                    # Allow using either the MCP API key or the backend API key
                    - ${{values.uniqueName}}-api
                    - ${{values.backendUniqueName}}-api
          credentials:
            customHeader:
              name: X-API-Key
          priority: 0
        oidc:
          jwt:
            issuerUrl: https://rhbk.${{ values.clusterDomain }}/realms/neuralbank
          credentials:
            authorizationHeader:
              prefix: Bearer
          priority: 1
      response:
        success: {}
        unauthenticated:
          code: 401
          body:
            value: '{"error":"Authentication required. Use X-API-Key header or Bearer token."}'
          headers:
            content-type:
              value: "application/json"
