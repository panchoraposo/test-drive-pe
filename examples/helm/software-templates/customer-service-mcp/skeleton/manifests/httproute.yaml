apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ${{values.name}}-route
  namespace: ${{values.namespace}}
  labels:
    app.kubernetes.io/name: ${{values.name}}
    backstage.io/kubernetes-id: ${{values.uniqueName}}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  parentRefs:
    - name: ${{values.name}}-gateway
      group: gateway.networking.k8s.io
      kind: Gateway
      namespace: ${{values.namespace}}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: ${{values.name}}
          port: 8080
          weight: 1
