apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ${{values.name}}-gateway
  namespace: ${{values.namespace}}
  labels:
    app.kubernetes.io/name: ${{values.name}}-gateway
    backstage.io/kubernetes-id: ${{values.uniqueName}}
    app.openshift.io/runtime: istio
  annotations:
    networking.istio.io/service-type: ClusterIP
    kuadrant.io/namespace: kuadrant-system
spec:
  gatewayClassName: istio
  listeners:
    - name: http
      port: 8080
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
