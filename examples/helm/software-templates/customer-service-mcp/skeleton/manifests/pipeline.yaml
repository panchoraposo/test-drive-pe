apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: ${{values.name}}-build
  namespace: ${{values.namespace}}
  labels:
    backstage.io/kubernetes-id: ${{values.uniqueName}}
spec:
  params:
    - name: git-url
      type: string
    - name: git-revision
      type: string
      default: main
    - name: image-name
      type: string
      default: "${{values.imageRegistry}}/${{values.namespace}}/${{values.name}}:latest"
  workspaces:
    - name: source
    - name: maven-settings
    - name: maven-repo
  tasks:
    - name: git-clone
      taskRef:
        kind: Task
        name: ${{values.name}}-git-clone
      params:
        - name: url
          value: $(params.git-url)
        - name: revision
          value: $(params.git-revision)
      workspaces:
        - name: output
          workspace: source
    - name: maven-build
      runAfter:
        - git-clone
      taskRef:
        kind: Task
        name: ${{values.name}}-maven
      params:
        - name: MAVEN_IMAGE
          value: maven:3.9-eclipse-temurin-17
        - name: GOALS
          value: "package -DskipTests"
      workspaces:
        - name: source
          workspace: source
        - name: maven-settings
          workspace: maven-settings
        - name: maven-repo
          workspace: maven-repo
    - name: build-image
      runAfter:
        - maven-build
      taskRef:
        kind: Task
        name: ${{values.name}}-buildah
      params:
        - name: IMAGE
          value: $(params.image-name)
        - name: DOCKERFILE
          value: src/main/docker/Dockerfile.jvm
      workspaces:
        - name: source
          workspace: source
    - name: deploy
      runAfter:
        - build-image
      taskRef:
        kind: Task
        name: ${{values.name}}-openshift-client
      params:
        - name: SCRIPT
          value: |
            oc rollout restart deployment/${{values.name}} -n ${{values.namespace}} || true
