apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ${{values.uniqueName}}-showroom-secret-reader
  namespace: ${{values.namespace}}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  - apiGroups: ["devportal.kuadrant.io"]
    resources: ["apikeys"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ${{values.uniqueName}}-showroom-secret-reader
  namespace: ${{values.namespace}}
subjects:
  - kind: ServiceAccount
    name: showroom
    namespace: showroom
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ${{values.uniqueName}}-showroom-secret-reader

