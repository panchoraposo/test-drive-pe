apiVersion: batch/v1
kind: Job
metadata:
  name: ${{values.name}}-initial-build
  namespace: ${{values.namespace}}
  labels:
    backstage.io/kubernetes-id: ${{values.uniqueName}}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        backstage.io/kubernetes-id: ${{values.uniqueName}}
    spec:
      serviceAccountName: ${{values.name}}-trigger-sa
      restartPolicy: Never
      containers:
        - name: trigger
          image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
          command: ["bash", "-lc"]
          args:
            - |
              set -euo pipefail
              NS="$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)"
              APP="${{values.name}}"
              pipeline_label="tekton.dev/pipeline=${{values.name}}-build"

              newest_pr_name() {
                oc -n "$NS" get pipelinerun -l "${pipeline_label}" --sort-by=.metadata.creationTimestamp -o name 2>/dev/null \
                  | awk -F/ 'END{print $2}'
              }

              PR_NAME="$(newest_pr_name || true)"
              if [ -z "${PR_NAME}" ]; then
                echo "No PipelineRun found yet for ${APP}. Waiting briefly for triggers/webhook..."
                # Keep this short: if the webhook doesn't trigger quickly, create the run ourselves.
                for _ in $(seq 1 8); do
                  PR_NAME="$(newest_pr_name || true)"
                  [ -n "${PR_NAME}" ] && break
                  sleep 2
                done
              fi

              if [ -n "${PR_NAME}" ]; then
                echo "Found existing PipelineRun ${PR_NAME}. Waiting for it to Succeed..."
                oc -n "$NS" wait --for=condition=Succeeded "pipelinerun/${PR_NAME}" --timeout=45m
                exit 0
              fi

              PR_NAME="$(oc -n "$NS" create -f - -o jsonpath='{.metadata.name}' <<'EOF'
              apiVersion: tekton.dev/v1
              kind: PipelineRun
              metadata:
                generateName: ${{values.name}}-run-
                labels:
                  backstage.io/kubernetes-id: ${{values.uniqueName}}
                  tekton.dev/pipeline: ${{values.name}}-build
              spec:
                pipelineRef:
                  name: ${{values.name}}-build
                params:
                  - name: git-url
                    value: http://gitea-http.gitea.svc.cluster.local:3000/ws-${{values.owner}}/${{values.name}}.git
                  - name: git-revision
                    value: main
                workspaces:
                  - name: source
                    volumeClaimTemplate:
                      spec:
                        accessModes: ["ReadWriteOnce"]
                        resources:
                          requests:
                            storage: 1Gi
                  - name: maven-settings
                    emptyDir: {}
                  - name: maven-repo
                    emptyDir: {}
              EOF
              )"

              echo "Created PipelineRun ${PR_NAME}. Waiting for it to Succeed..."
              oc -n "$NS" wait --for=condition=Succeeded "pipelinerun/${PR_NAME}" --timeout=45m
