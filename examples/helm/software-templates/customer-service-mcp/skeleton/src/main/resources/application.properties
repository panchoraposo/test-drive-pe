quarkus.application.name=${{values.name}}
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# MCP Server
quarkus.mcp.server.server-info.name=NeuralBank Customer Service MCP
quarkus.mcp.server.server-info.version=1.0.0
quarkus.mcp.server.traffic-logging.enabled=true
quarkus.mcp.server.traffic-logging.text-limit=100

# REST Client - points to the neuralbank-backend in the same namespace
quarkus.rest-client."customerclient".uri=http://neuralbank-backend.${{values.namespace}}.svc.cluster.local:8080
quarkus.rest-client."customerclient".connect-timeout=5000
quarkus.rest-client."customerclient".read-timeout=10000

# Dev profile - local backend
%dev.quarkus.rest-client."customerclient".uri=http://localhost:8081

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.neuralbank".level=DEBUG
quarkus.log.category."io.quarkiverse.mcp".level=DEBUG

# Health
quarkus.health.extensions.enabled=true
quarkus.smallrye-health.root-path=/q/health

# CORS
quarkus.http.cors=true
quarkus.http.cors.origins=*

# JSON
quarkus.jackson.fail-on-unknown-properties=false
quarkus.jackson.serialization-inclusion=non-null

# Container image
quarkus.container-image.build=true
quarkus.container-image.push=true
quarkus.container-image.registry=${{values.imageRegistry}}
quarkus.container-image.group=${{values.namespace}}
quarkus.container-image.name=${{values.name}}
quarkus.container-image.tag=latest
