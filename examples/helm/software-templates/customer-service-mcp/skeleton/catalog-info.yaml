apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{values.uniqueName}}
  description: ${{values.description}}
  annotations:
    backstage.io/techdocs-ref: url:https://gitea-gitea.${{ values.clusterDomain }}/ws-${{ values.owner }}/${{ values.name }}/src/branch/main/
    backstage.io/source-location: url:https://gitea-gitea.${{ values.clusterDomain }}/ws-${{ values.owner }}/${{ values.name }}
    backstage.io/view-url: https://gitea-gitea.${{ values.clusterDomain }}/ws-${{ values.owner }}/${{ values.name }}
    backstage.io/kubernetes-id: ${{values.uniqueName}}
    backstage.io/kubernetes-namespace: ${{values.namespace}}
    janus-idp.io/tekton: ${{values.uniqueName}}
    argocd/app-name: ${{values.uniqueName}}
    argocd/app-namespace: openshift-gitops
    tektonci/build-namespace: ${{values.namespace}}
    che.eclipse.org/che-server: https://devspaces.${{ values.clusterDomain }}
    devspaces.io/factory: "https://devspaces.${{ values.clusterDomain }}/#https://gitea-gitea.${{ values.clusterDomain }}/ws-${{ values.owner }}/${{ values.name }}.git?new&devfilePath=devfile.yaml&che-editor=che-incubator/che-theia/latest"
  links:
    - url: "https://devspaces.${{ values.clusterDomain }}/#https://gitea-gitea.${{ values.clusterDomain }}/ws-${{ values.owner }}/${{ values.name }}.git?new&devfilePath=devfile.yaml&che-editor=che-incubator/che-theia/latest"
      title: Open in DevSpaces
      icon: catalog
      type: ide
    - url: "https://gitea-gitea.${{ values.clusterDomain }}/ws-${{ values.owner }}/${{ values.name }}"
      title: View Source
      icon: github
      type: source
  tags:
    - java
    - quarkus
    - mcp
    - neuralbank
spec:
  type: service
  lifecycle: experimental
  owner: user:${{values.owner}}
  system: ${{values.owner}}-neuralbank
  providesApis:
    - ${{values.uniqueName}}-api
  dependsOn:
    - component:default/${{values.backendUniqueName | default(values.owner + '-neuralbank-backend') }}
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: ${{values.uniqueName}}-api
  description: "MCP Server API for customer service AI agent"
  annotations:
    kuadrant.io/namespace: ${{values.namespace}}
    kuadrant.io/apiproduct: ${{values.uniqueName}}-api
    kuadrant.io/httproute: ${{values.name}}-route
spec:
  type: openapi
  lifecycle: experimental
  owner: user:${{values.owner}}
  system: ${{values.owner}}-neuralbank
  definition: |
    openapi: 3.0.0
    info:
      title: Customer Service MCP API
      version: 1.0.0
      description: >
        Model Context Protocol server for AI-powered customer service.
        Protected by Kuadrant AuthPolicy (API Key via X-API-Key header)
        and RateLimitPolicy (120 req/min).
        Generate your API Key from the Dev Portal.
    components:
      securitySchemes:
        ApiKeyAuth:
          type: apiKey
          in: header
          name: X-API-Key
          description: API Key generated from the Kuadrant Dev Portal
    security:
      - ApiKeyAuth: []
    paths:
      /mcp:
        post:
          summary: MCP protocol endpoint (HTTP)
      /mcp/sse:
        get:
          summary: MCP Server-Sent Events endpoint
