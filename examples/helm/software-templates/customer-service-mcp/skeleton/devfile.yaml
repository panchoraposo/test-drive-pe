schemaVersion: 2.2.2
metadata:
  name: ${{values.name}}
  version: 1.0.0
  displayName: "${{values.name}} - Neuralbank MCP"
  description: ${{values.description}}
  language: Java
  projectType: Quarkus
components:
  - name: tools
    container:
      image: registry.redhat.io/devspaces/udi-rhel9:latest
      memoryLimit: 2Gi
      cpuLimit: "1"
      mountSources: true
      env:
        - name: DEFAULT_EXTENSIONS
          value: "/projects/${{values.name}}/.extensions/redhat.fabric8-analytics.vsix"
        - name: VSCODE_TRUSTED_EXTENSIONS
          value: "redhat.fabric8-analytics"
      volumeMounts:
        - name: m2
          path: /home/user/.m2
  - name: m2
    volume:
      size: 2Gi
commands:
  - id: 00-install-rhda-extension
    exec:
      component: tools
      commandLine: |
        set -euo pipefail
        mkdir -p "/projects/${{values.name}}/.extensions"
        if [ -f "/projects/${{values.name}}/.extensions/redhat.fabric8-analytics.vsix" ]; then
          echo "RHDA VSIX already present."
          exit 0
        fi
        echo "Downloading RHDA extension VSIX..."
        curl -sSL "https://open-vsx.org/api/redhat/fabric8-analytics/0.10.2/file/redhat.fabric8-analytics-0.10.2.vsix" -o "/projects/${{values.name}}/.extensions/redhat.fabric8-analytics.vsix"
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: build
        isDefault: false
  - id: 01-init-maven
    exec:
      component: tools
      commandLine: |
        if ! mvn --version 2>/dev/null | grep -qE '3\.(8\.[6-9]|8\.[1-9][0-9]|9\.|[1-9][0-9])'; then
          echo "Upgrading Maven..." &&
          curl -sSL https://archive.apache.org/dist/maven/maven-3/3.9.9/binaries/apache-maven-3.9.9-bin.tar.gz | tar xz -C /home/user &&
          echo 'export PATH=/home/user/apache-maven-3.9.9/bin:$PATH' >> /home/user/.bashrc &&
          export PATH=/home/user/apache-maven-3.9.9/bin:$PATH &&
          mvn --version;
        else
          echo "Maven version OK: $(mvn --version | head -1)";
        fi
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: build
        isDefault: false
  - id: 02-build
    exec:
      component: tools
      commandLine: export PATH=/home/user/apache-maven-3.9.9/bin:$PATH && mvn package -DskipTests
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: build
        isDefault: true
  - id: 03-run
    exec:
      component: tools
      commandLine: export PATH=/home/user/apache-maven-3.9.9/bin:$PATH && mvn quarkus:dev
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: run
        isDefault: true
  - id: 04-mcp-inspector
    exec:
      component: tools
      commandLine: "npx @anthropic-ai/mcp-inspector http://localhost:8080/mcp/sse"
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: debug
        isDefault: false
  - id: 05-open-rhda-report
    exec:
      component: tools
      commandLine: |
        REPORT_PATH="${REPORT_PATH:-/tmp/redhatDependencyAnalyticsReport.html}"
        echo "RHDA report path: ${REPORT_PATH}"
        if [ -f "${REPORT_PATH}" ]; then
          ls -lh "${REPORT_PATH}"
          echo "Tip: open it from the file explorer inside Dev Spaces."
        else
          echo "Report file not found yet."
          echo "Generate it in the IDE by opening pom.xml and clicking the pie-chart icon, or right-click pom.xml -> 'Red Hat Dependency Analytics Report...'"
        fi
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: test
        isDefault: false
events:
  postStart:
    - 00-install-rhda-extension
