schemaVersion: 2.2.2
metadata:
  name: ${{values.name}}
  version: 1.0.0
  displayName: "${{values.name}} - Neuralbank MCP"
  description: ${{values.description}}
  language: Java
  projectType: Quarkus
components:
  - name: tools
    container:
      image: registry.redhat.io/devspaces/udi-rhel9:latest
      memoryLimit: 4Gi
      cpuLimit: "2"
      mountSources: true
      volumeMounts:
        - name: m2
          path: /home/user/.m2
  - name: m2
    volume:
      size: 2Gi
commands:
  - id: 01-build
    exec:
      component: tools
      commandLine: |
        set -eu
        mvn -ntp package -DskipTests
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: build
        isDefault: true
  - id: 02-run
    exec:
      component: tools
      commandLine: |
        set -eu
        host_url="$(awk '/endpoint-url:/ {u=$2} /name: code-redirect-3/ {print u; exit}' /devworkspace-metadata/flattened.devworkspace.yaml 2>/dev/null || true)"
        host="${host_url#https://}"
        host="${host#http://}"
        host="${host%%/*}"
        extra=""
        if [ -n "${host}" ]; then
          extra="-Dquarkus.dev-ui.hosts=${host}"
        fi
        mvn -ntp ${extra} quarkus:dev
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: run
        isDefault: true

