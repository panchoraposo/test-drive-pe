apiVersion: devportal.kuadrant.io/v1alpha1
kind: APIProduct
metadata:
  name: ${{values.uniqueName}}-api
  namespace: ${{values.namespace}}
  labels:
    app.kubernetes.io/name: ${{values.name}}
    backstage.io/kubernetes-id: ${{values.uniqueName}}
spec:
  displayName: "${{values.uniqueName}} — Credit Management API"
  description: |
    REST API para gestión de créditos y clientes.
    Protegida con API Key (header X-API-Key) y rate limiting (120 req/min).
    Genera tu API Key desde el Dev Portal para consumir esta API.
  version: "v1"
  publishStatus: Published
  approvalMode: automatic
  tags:
    - api-key
    - kuadrant
    - rest
    - neuralbank
  contact:
    team: ${{values.owner}}
    email: "${{values.owner}}@redhat.local"
  documentation:
    openAPISpecURL: "https://${{values.name}}-${{values.namespace}}.${{ values.clusterDomain | default('apps.cluster.example.com') }}/q/openapi"
    swaggerUI: "https://${{values.name}}-${{values.namespace}}.${{ values.clusterDomain | default('apps.cluster.example.com') }}/q/swagger-ui"
    gitRepository: "https://gitea-gitea.${{ values.clusterDomain | default('apps.cluster.example.com') }}/ws-${{values.owner}}/${{values.name}}"
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: ${{values.name}}-route
