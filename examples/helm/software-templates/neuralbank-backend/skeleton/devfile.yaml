schemaVersion: 2.2.2
metadata:
  name: ${{values.name}}
  version: 1.0.0
  displayName: "${{values.name}} - Neuralbank Backend"
  description: ${{values.description}}
  language: Java
  projectType: Quarkus
components:
  - name: tools
    container:
      image: registry.redhat.io/devspaces/udi-rhel9:latest
      memoryLimit: 4Gi
      cpuLimit: "2"
      mountSources: true
      endpoints:
        - name: quarkus
          targetPort: 8080
          exposure: public
          protocol: http
          attributes:
            urlRewriteSupported: true
      volumeMounts:
        - name: m2
          path: /home/user/.m2
  - name: m2
    volume:
      size: 2Gi
commands:
  - id: 01-build
    exec:
      component: tools
      commandLine: |
        set -eu
        mvn -ntp package -DskipTests
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: build
        isDefault: true
  - id: 02-run
    exec:
      component: tools
      commandLine: |
        set -eu
        mvn -ntp quarkus:dev -Dquarkus.http.host=0.0.0.0 -Dquarkus.http.proxy.proxy-address-forwarding=true
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: run
        isDefault: true

