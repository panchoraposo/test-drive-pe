schemaVersion: 2.2.2
metadata:
  name: ${{values.name}}
  version: 1.0.0
  displayName: "${{values.name}} - Neuralbank Backend"
  description: ${{values.description}}
  language: Java
  projectType: Quarkus
components:
  - name: tools
    container:
      image: registry.redhat.io/devspaces/udi-rhel9:latest
      memoryLimit: 2Gi
      cpuLimit: "1"
      mountSources: true
      volumeMounts:
        - name: m2
          path: /home/user/.m2
  - name: m2
    volume:
      size: 2Gi
commands:
  - id: init-maven
    exec:
      component: tools
      commandLine: |
        if ! mvn --version 2>/dev/null | grep -qE '3\.(8\.[6-9]|8\.[1-9][0-9]|9\.|[1-9][0-9])'; then
          echo "Upgrading Maven..." &&
          curl -sSL https://archive.apache.org/dist/maven/maven-3/3.9.9/binaries/apache-maven-3.9.9-bin.tar.gz | tar xz -C /home/user &&
          echo 'export PATH=/home/user/apache-maven-3.9.9/bin:$PATH' >> /home/user/.bashrc &&
          export PATH=/home/user/apache-maven-3.9.9/bin:$PATH &&
          mvn --version;
        else
          echo "Maven version OK: $(mvn --version | head -1)";
        fi
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: build
        isDefault: false
  - id: build
    exec:
      component: tools
      commandLine: export PATH=/home/user/apache-maven-3.9.9/bin:$PATH && mvn package -DskipTests
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: build
        isDefault: true
  - id: run
    exec:
      component: tools
      commandLine: export PATH=/home/user/apache-maven-3.9.9/bin:$PATH && mvn quarkus:dev -Dquarkus.http.host=0.0.0.0 -Dquarkus.http.proxy.proxy-address-forwarding=true -Dquarkus.dev-ui.hosts=.*
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: run
        isDefault: true
