schemaVersion: 2.2.2
metadata:
  name: ${{values.name}}
  version: 1.0.0
  displayName: "${{values.name}} - Neuralbank Backend"
  description: ${{values.description}}
  language: Java
  projectType: Quarkus
components:
  - name: tools
    container:
      image: registry.redhat.io/devspaces/udi-rhel9:latest
      memoryLimit: 2Gi
      cpuLimit: "1"
      mountSources: true
      volumeMounts:
        - name: m2
          path: /home/user/.m2
  - name: m2
    volume:
      size: 2Gi
commands:
  - id: configure-maven
    exec:
      component: tools
      commandLine: |
        set -eu
        mkdir -p /home/user/.m2
        SETTINGS="/home/user/.m2/settings.xml"
        if [ -f "${SETTINGS}" ] && grep -q "nexus-repository-manager.maven-repo.svc.cluster.local" "${SETTINGS}"; then
          exit 0
        fi
        cat > "${SETTINGS}" <<'EOF'
        <settings>
          <mirrors>
            <mirror>
              <id>central</id>
              <mirrorOf>central</mirrorOf>
              <url>http://nexus-repository-manager.maven-repo.svc.cluster.local:8081/repository/maven-central/</url>
            </mirror>
            <mirror>
              <id>redhat-ga</id>
              <mirrorOf>redhat-ga</mirrorOf>
              <url>http://nexus-repository-manager.maven-repo.svc.cluster.local:8081/repository/redhat-ga/</url>
            </mirror>
          </mirrors>
        </settings>
EOF
      workingDir: ${PROJECT_SOURCE}
  - id: build
    exec:
      component: tools
      commandLine: |
        set -eu
        mkdir -p /home/user/.m2
        SETTINGS="/home/user/.m2/settings.xml"
        if [ ! -f "${SETTINGS}" ] || ! grep -q "nexus-repository-manager.maven-repo.svc.cluster.local" "${SETTINGS}"; then
          cat > "${SETTINGS}" <<'EOF'
          <settings>
            <mirrors>
              <mirror>
                <id>central</id>
                <mirrorOf>central</mirrorOf>
                <url>http://nexus-repository-manager.maven-repo.svc.cluster.local:8081/repository/maven-central/</url>
              </mirror>
              <mirror>
                <id>redhat-ga</id>
                <mirrorOf>redhat-ga</mirrorOf>
                <url>http://nexus-repository-manager.maven-repo.svc.cluster.local:8081/repository/redhat-ga/</url>
              </mirror>
            </mirrors>
          </settings>
EOF
        fi
        mvn -s "${SETTINGS}" package -DskipTests
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: build
        isDefault: true
  - id: run
    exec:
      component: tools
      commandLine: |
        set -eu
        mkdir -p /home/user/.m2
        SETTINGS="/home/user/.m2/settings.xml"
        if [ ! -f "${SETTINGS}" ] || ! grep -q "nexus-repository-manager.maven-repo.svc.cluster.local" "${SETTINGS}"; then
          cat > "${SETTINGS}" <<'EOF'
          <settings>
            <mirrors>
              <mirror>
                <id>central</id>
                <mirrorOf>central</mirrorOf>
                <url>http://nexus-repository-manager.maven-repo.svc.cluster.local:8081/repository/maven-central/</url>
              </mirror>
              <mirror>
                <id>redhat-ga</id>
                <mirrorOf>redhat-ga</mirrorOf>
                <url>http://nexus-repository-manager.maven-repo.svc.cluster.local:8081/repository/redhat-ga/</url>
              </mirror>
            </mirrors>
          </settings>
EOF
        fi
        mvn -s "${SETTINGS}" quarkus:dev -Dquarkus.http.host=0.0.0.0 -Dquarkus.http.proxy.proxy-address-forwarding=true
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: run
        isDefault: true
events:
  postStart:
    - configure-maven

