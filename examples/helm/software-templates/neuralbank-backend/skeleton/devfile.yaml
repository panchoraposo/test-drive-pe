schemaVersion: 2.2.2
metadata:
  name: ${{values.name}}
  version: 1.0.0
  displayName: "${{values.name}} - Neuralbank Backend"
  description: ${{values.description}}
  language: Java
  projectType: Quarkus
attributes:
  .vscode/extensions.json: |
    {
      "recommendations": [
        "redhat.fabric8-analytics"
      ]
    }
projects:
  - name: ${{values.name}}
    git:
      remotes:
        origin: https://gitea-gitea.${{values.clusterDomain}}/ws-${{values.owner}}/${{values.name}}.git
      checkoutFrom:
        revision: main
components:
  - name: tools
    container:
      image: registry.redhat.io/devspaces/udi-rhel9:latest
      env:
        # Ensure Code - OSS opens with a folder (avoids \"No folder opened\" after cloning).
        - name: VSCODE_DEFAULT_WORKSPACE
          value: /projects
        # Pre-install Red Hat Dependency Analytics (RHDA) from VSIX downloaded on postStart.
        - name: DEFAULT_EXTENSIONS
          value: "/projects/${{values.name}}/.extensions/redhat.fabric8-analytics.vsix"
        - name: VSCODE_TRUSTED_EXTENSIONS
          value: "redhat.fabric8-analytics"
      memoryRequest: 1Gi
      memoryLimit: 4Gi
      cpuRequest: "500m"
      cpuLimit: "2"
      mountSources: true
      volumeMounts:
        - name: m2
          path: /home/user/.m2
  - name: m2
    volume:
      size: 2Gi
commands:
  - id: 00-install-rhda-extension
    exec:
      component: tools
      commandLine: |
        set -euo pipefail
        mkdir -p "/projects/${{values.name}}/.extensions"
        if [ -f "/projects/${{values.name}}/.extensions/redhat.fabric8-analytics.vsix" ]; then
          echo "RHDA VSIX already present."
          exit 0
        fi
        echo "Downloading RHDA extension VSIX..."
        curl -sSL "https://open-vsx.org/api/redhat/fabric8-analytics/0.10.2/file/redhat.fabric8-analytics-0.10.2.vsix" \
          -o "/projects/${{values.name}}/.extensions/redhat.fabric8-analytics.vsix"
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: build
        isDefault: false
  - id: 01-build
    exec:
      component: tools
      commandLine: |
        set -eu
        # In DevSpaces we only need to compile/download deps; `package` runs Quarkus augmentation,
        # which has proven flaky on some workspace filesystems.
        mvn -ntp -DskipTests compile
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: build
        isDefault: true
  - id: 02-run
    exec:
      component: tools
      commandLine: |
        set -eu
        mvn -ntp quarkus:dev -Dquarkus.http.host=0.0.0.0 -Dquarkus.http.proxy.proxy-address-forwarding=true
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: run
        isDefault: true
events:
  postStart:
    - 00-install-rhda-extension

