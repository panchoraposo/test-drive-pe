apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: remove-component
  title: "Remove Component (Cleanup)"
  description: >
    Removes a previously created component from the platform:
    deletes the Gitea repository, unregisters from the catalog, and sends
    a notification. The ApplicationSet auto-prunes the ArgoCD
    Application when the repo disappears (~60s).
  tags:
    - cleanup
    - admin
    - remove
spec:
  owner: platform-engineering
  type: service
  parameters:
    - title: Component to Remove
      required:
        - name
        - owner
      properties:
        name:
          title: Component Name
          type: string
          description: "Base name of the component (e.g. neuralbank-backend)"
          pattern: "^[a-z0-9-]+$"
          ui:autofocus: true
          enum:
            - neuralbank-backend
            - neuralbank-frontend
            - customer-service-mcp
        owner:
          title: Owner (username)
          type: string
          description: "Owner of the component (e.g. user1)"
          pattern: "^user[0-9]+$"
          ui:help: "Auto-detected from your login. Change only if removing another user's component."
  steps:
    - id: delete-gitea-repo
      name: Delete Gitea Repository
      action: http:backstage:request
      continueOnError: true
      input:
        method: DELETE
        path: "/proxy/gitea/repos/ws-${{ parameters.owner }}/${{ parameters.name }}"
        headers:
          Content-Type: application/json

    - id: fetch-entity
      name: Fetch Catalog Entity
      action: http:backstage:request
      continueOnError: true
      input:
        method: GET
        path: "/catalog/entities/by-name/component/default/${{ parameters.owner }}-${{ parameters.name }}"

    - id: delete-entity
      name: Unregister from Catalog
      action: http:backstage:request
      continueOnError: true
      input:
        method: DELETE
        path: "/catalog/entities/by-uid/${{ steps['fetch-entity'].output.body.metadata.uid }}"

    - id: notify
      name: Send Email Notification
      action: http:backstage:request
      input:
        method: POST
        path: /proxy/mailpit/api/v1/send
        headers:
          Content-Type: application/json
        body:
          From:
            Email: "developer-hub@redhat.local"
            Name: "Red Hat Developer Hub"
          To:
            - Email: "${{ parameters.owner }}@redhat.local"
              Name: "${{ parameters.owner }}"
          Subject: "Neuralbank Platform — Component Decommissioned"
          Text: "Neuralbank Platform Notification — Component ${{ parameters.owner }}-${{ parameters.name }} has been decommissioned. Gitea repository deleted. ArgoCD Application will be auto-pruned by the ApplicationSet (~60s). Catalog entity unregistered."
          HTML: "<div style='font-family:Red Hat Text,Helvetica,Arial,sans-serif;max-width:600px;margin:0 auto;border:1px solid #e0e0e0;border-radius:8px;overflow:hidden'><div style='background:#6a6e73;padding:24px 32px;text-align:center'><h1 style='color:#fff;margin:0;font-size:22px;font-weight:600;letter-spacing:0.5px'>Neuralbank Platform</h1><p style='color:#d2d2d2;margin:4px 0 0;font-size:12px'>Red Hat Developer Hub</p></div><div style='padding:32px'><h2 style='color:#151515;margin:0 0 16px;font-size:18px'>Component Decommissioned</h2><p style='color:#6a6e73;font-size:14px;line-height:1.6;margin:0 0 20px'>The following component has been removed from the Neuralbank platform.</p><table style='width:100%;border-collapse:collapse;font-size:14px;margin-bottom:24px'><tr style='border-bottom:1px solid #f0f0f0'><td style='padding:10px 0;color:#6a6e73;width:140px'>Component</td><td style='padding:10px 0;color:#151515;font-weight:500'>${{ parameters.owner }}-${{ parameters.name }}</td></tr><tr><td style='padding:10px 0;color:#6a6e73'>Owner</td><td style='padding:10px 0;color:#151515;font-weight:500'>${{ parameters.owner }}</td></tr></table><h3 style='color:#151515;font-size:14px;margin:0 0 12px'>Actions Completed</h3><table style='width:100%;border-collapse:collapse;font-size:13px;margin-bottom:24px'><tr style='border-bottom:1px solid #f0f0f0'><td style='padding:8px 0;color:#6a6e73;width:24px'>1.</td><td style='padding:8px 0;color:#151515'>Gitea repository deleted</td><td style='padding:8px 0;text-align:right'><span style='background:#e7f1e8;color:#3e8635;padding:2px 8px;border-radius:12px;font-size:11px'>Done</span></td></tr><tr style='border-bottom:1px solid #f0f0f0'><td style='padding:8px 0;color:#6a6e73'>2.</td><td style='padding:8px 0;color:#151515'>ArgoCD Application auto-pruning</td><td style='padding:8px 0;text-align:right'><span style='background:#faeae8;color:#c9190b;padding:2px 8px;border-radius:12px;font-size:11px'>~60s</span></td></tr><tr><td style='padding:8px 0;color:#6a6e73'>3.</td><td style='padding:8px 0;color:#151515'>Catalog entity unregistered</td><td style='padding:8px 0;text-align:right'><span style='background:#e7f1e8;color:#3e8635;padding:2px 8px;border-radius:12px;font-size:11px'>Done</span></td></tr></table></div><div style='background:#f0f0f0;padding:16px 32px;text-align:center;font-size:11px;color:#6a6e73'>Neuralbank Platform &bull; Powered by Red Hat Developer Hub</div></div>"

  output:
    text:
      - title: Cleanup Complete
        content: |
          Component **${{ parameters.owner }}-${{ parameters.name }}** has been removed:
          1. Gitea repository `ws-${{ parameters.owner }}/${{ parameters.name }}` deleted
          2. ArgoCD Application auto-pruned by ApplicationSet (~60s)
          3. Backstage Catalog entity unregistered
          4. Notification sent
