# Connectivity-link stack — local Helm charts (vendored from connectivity-link)
# Sync-wave on Application metadata is advisory; manifests use argocd.argoproj.io/sync-wave.
{{- range .Values.connectivityLink.apps }}
{{- if and . .enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $.Release.Name }}-{{ .id }}
  namespace: {{ $.Values.argocd.namespace }}
  labels:
    demo.redhat.com/application: "field-content"
  annotations:
    argocd.argoproj.io/sync-wave: {{ .syncWave | quote }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ $.Values.argocd.project }}
  ignoreDifferences:
    - group: ""
      kind: Service
      jsonPointers:
        - /spec/clusterIP
        - /spec/clusterIPs
        - /spec/ipFamilies
        - /spec/ipFamilyPolicy
        - /spec/internalTrafficPolicy
    - group: route.openshift.io
      kind: Route
      jsonPointers:
        - /spec/host
        - /spec/wildcardPolicy
        - /status
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/template/metadata/annotations
        # Allow out-of-band patches for initContainers in vendor charts
        - /spec/template/spec/initContainers
    - group: ""
      kind: Secret
      jsonPointers:
        - /data
    - group: ""
      kind: Namespace
      jsonPointers:
        - /metadata/annotations
        - /metadata/labels
    - group: networking.istio.io
      kind: "*"
      jsonPointers:
        - /spec
        - /metadata/annotations
    - group: gateway.networking.k8s.io
      kind: Gateway
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      jsonPointers:
        - /metadata/annotations
        - /status
      jqPathExpressions:
        - .spec.parentRefs[]
        - .spec.rules[].backendRefs[]
        - .spec.rules[].matches[]
    - group: sailoperator.io
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: operator.istio.io
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: ols.openshift.io
      kind: OLSConfig
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: keycloak.org
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: k8s.keycloak.org
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: kuadrant.io
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: mcp.openshift.io
      kind: "*"
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: ""
      kind: ConfigMap
      jsonPointers:
        - /metadata/annotations
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/volumeClaimTemplates
        - /spec/template/metadata/annotations
        - /spec/template/metadata/labels
        - /spec/persistentVolumeClaimRetentionPolicy
        - /spec/updateStrategy
      managedFieldsManagers:
        - kube-controller-manager
    - group: rhdh.redhat.com
      kind: Backstage
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: janus-idp.io
      kind: Backstage
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: argoproj.io
      kind: ApplicationSet
      jsonPointers:
        - /metadata/annotations
        - /status
  source:
    repoURL: {{ $.Values.gitops.repoUrl }}
    targetRevision: {{ $.Values.gitops.revision }}
    path: {{ $.Values.gitops.basePath }}/components/{{ .path }}
    {{- $ing := (lookup "config.openshift.io/v1" "Ingress" "" "cluster") -}}
    {{- $domain := (coalesce ($.Values.deployer.domain | default "") (dig "spec" "domain" "" $ing)) -}}
    {{- $domain = required "Unable to determine cluster apps base domain. Set deployer.domain or ensure Ingress.config.openshift.io/cluster.spec.domain exists." $domain -}}
    {{- if eq .path "connectivity-link-openshift-gitops" }}
    helm:
      valuesObject:
        userCount: {{ $.Values.userCount | default 200 }}
        clusterDomain: {{ $domain }}
    {{- else if eq .path "connectivity-link-namespaces" }}
    helm:
      valuesObject:
        userCount: {{ $.Values.userCount | default 200 }}
    {{- else if eq .path "connectivity-link-devspaces" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
        userCount: {{ $.Values.userCount | default 200 }}
    {{- else if eq .path "connectivity-link-operators" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
        channel: {{ $.Values.connectivityLink.operators.channel | quote }}
        version: {{ $.Values.connectivityLink.operators.version | quote }}
        subscriptions: {{ $.Values.connectivityLink.operators.subscriptions | toJson }}
    {{- else if eq .path "connectivity-link-openshift-lightspeed" }}
    {{- $llmKey := $.Values.lightspeed.llmApiKey }}
    {{- $llmEndpoint := $.Values.lightspeed.llmEndpoint }}
    {{- $llmModel := $.Values.lightspeed.model | default "granite-3-2-8b-instruct" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
        llmApiKey: {{ $llmKey | quote }}
        llmEndpoint: {{ $llmEndpoint | quote }}
        llmModel: {{ $llmModel | quote }}
    {{- else if eq .path "connectivity-link-rhbk" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
        userCount: {{ $.Values.userCount | default 200 }}
    {{- else if eq .path "connectivity-link-mcp-gateway" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
        mcpToken: {{ $.Values.connectivityLink.mcpToken | default "IpIbd50gbMb1p2+iCigrhkm21pZwbn0g" | quote }}
        argocdApiToken: {{ $.Values.connectivityLink.argocdMcpToken | default "" | quote }}
        operatorInstallEnabled: {{ $.Values.connectivityLink.mcpGateway.operatorInstallEnabled | default false }}
    {{- else if eq .path "connectivity-link-oauth-users" }}
    helm:
      valuesObject:
        userCount: {{ $.Values.userCount | default 200 }}
    {{- else if eq .path "connectivity-link-applicationsets" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
        userCount: {{ $.Values.userCount | default 200 }}
    {{- else if eq .path "connectivity-link-gitea" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
        userCount: {{ $.Values.userCount | default 200 }}
    {{- else if eq .path "connectivity-link-developer-hub" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
        userCount: {{ $.Values.userCount | default 200 }}
        gitopsRevision: {{ $.Values.gitops.revision }}
    {{- else if eq .path "connectivity-link-workshop-registration" }}
    helm:
      valuesObject:
        deployer:
          domain: {{ $domain }}
        registration:
          enabled: true
          maxUsers: {{ $.Values.userCount | default 200 }}
          adminToken: {{ $.Values.workshopRegistration.adminToken | default "workshop-admin-2024" | quote }}
        keycloak:
          url: {{ printf "https://rhbk.%s" $domain | quote }}
          realm: backstage
          adminUser: admin
          adminPassword: {{ $.Values.workshopRegistration.keycloakAdminPassword | default "" | quote }}
        showroom:
          url: {{ printf "https://showroom-showroom.%s" $domain | quote }}
    {{- else if eq .path "connectivity-link-nfl-wallet" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
    {{- else if eq .path "connectivity-link-neuralbank-stack" }}
    helm:
      valuesObject:
        {{- $nb := deepCopy $.Values.connectivityLink.neuralbank }}
        {{- $kc := deepCopy $nb.keycloak }}
        {{- $_ := set $kc "issuerUrl" (printf "https://rhbk.%s/realms/neuralbank" $domain) }}
        {{- $_ := set $kc "authorizationEndpoint" (printf "https://rhbk.%s/realms/neuralbank/protocol/openid-connect/auth" $domain) }}
        {{- $_ := set $kc "redirectUri" (printf "https://neuralbank.%s/auth/callback" $domain) }}
        {{- $_ := set $kc "tokenEndpoint" (printf "https://rhbk.%s/realms/neuralbank/protocol/openid-connect/token" $domain) }}
        {{- $_ := set $kc "postLogoutRedirectUri" (printf "https://neuralbank.%s" $domain) }}
        {{- $_ := set $nb "keycloak" $kc }}
        {{- toYaml $nb | nindent 8 }}
    {{- else if eq .path "connectivity-link-kiali" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
    {{- else if eq .path "connectivity-link-rhcl-operator" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
    {{- else if eq .path "connectivity-link-opentelemetry" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
    {{- else if eq .path "connectivity-link-observability" }}
    helm:
      valuesObject:
        clusterDomain: {{ $domain }}
    {{- end }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .destinationNamespace }}
  syncPolicy:
    automated:
      prune: {{ .prune }}
      selfHeal: {{ .selfHeal }}
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
      {{- if .skipDryRunOnMissingResource }}
      - SkipDryRunOnMissingResource=true
      {{- end }}
{{- end }}
{{- end }}
# ============================================================
# Helm Chart Applications — third-party charts from external repos
# ============================================================
{{- if .Values.connectivityLink.helmApps }}
{{- range .Values.connectivityLink.helmApps }}
{{- if and . .enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $.Release.Name }}-helm-{{ .id }}
  namespace: {{ $.Values.argocd.namespace }}
  labels:
    demo.redhat.com/application: "field-content"
  annotations:
    argocd.argoproj.io/sync-wave: {{ .syncWave | quote }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ $.Values.argocd.project }}
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/volumeClaimTemplates
        - /spec/template/metadata/annotations
        - /spec/template/metadata/labels
        - /spec/persistentVolumeClaimRetentionPolicy
        - /spec/updateStrategy
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/template/metadata/annotations
        # Allow out-of-band patches for initContainers in vendor charts
        - /spec/template/spec/initContainers
    - group: ""
      kind: Service
      jsonPointers:
        - /spec/clusterIP
        - /spec/clusterIPs
        - /spec/ipFamilies
        - /spec/ipFamilyPolicy
        - /spec/internalTrafficPolicy
    - group: ""
      kind: Secret
      jsonPointers:
        - /data
  source:
    repoURL: {{ .repoURL }}
    chart: {{ .chart }}
    targetRevision: {{ .targetRevision }}
    helm:
      releaseName: {{ .chart }}
      valuesObject:
        {{- toYaml .values | nindent 8 }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .destinationNamespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
{{- end }}
{{- end }}
{{- end }}
