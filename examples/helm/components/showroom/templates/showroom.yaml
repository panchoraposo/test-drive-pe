{{- if .Values.showroom.enabled }}
---
# Showroom Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.showroom.namespace | default "showroom" }}
  labels:
    demo.redhat.com/application: "showroom"
---
# Showroom ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.showroom.name }}
  namespace: {{ .Values.showroom.namespace }}
---
# Showroom RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: edit-{{ .Values.showroom.name }}-sa
  namespace: {{ .Values.showroom.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
- kind: ServiceAccount
  name: {{ .Values.showroom.name }}
  namespace: {{ .Values.showroom.namespace }}
---
# Showroom ClusterRoleBinding — read-only access across all namespaces
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.showroom.name }}-cluster-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-reader
subjects:
- kind: ServiceAccount
  name: {{ .Values.showroom.name }}
  namespace: {{ .Values.showroom.namespace }}
---
# Showroom secret-reader Role — scoped to neuralbank-stack only
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: showroom-secret-reader
  namespace: neuralbank-stack
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: showroom-secret-reader
  namespace: neuralbank-stack
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: showroom-secret-reader
subjects:
- kind: ServiceAccount
  name: {{ .Values.showroom.name }}
  namespace: {{ .Values.showroom.namespace }}
---
# Showroom Nginx ConfigMap
kind: ConfigMap
metadata:
  name: {{ .Values.showroom.name }}-proxy-config
  namespace: {{ .Values.showroom.namespace }}
apiVersion: v1
data:
  nginx.conf: |
    events {
    }
    error_log /dev/stdout info;
    http {
      include /etc/nginx/mime.types;
      proxy_cache off;
      expires -1;
      proxy_cache_path /dev/null keys_zone=mycache:10m;
      map $http_upgrade $connection_upgrade {
          default upgrade;
          '' close;
      }
      server {
        listen 8080;
        absolute_redirect off;
        # Normalize quoted Antora component roots that may appear via persisted URL state.
        # Example bad paths:
        # - /'modules'/
        # - /%27modules%27/
        # - /"modules"/
        # Redirect these to the real component roots so refresh never 404s.
        rewrite ^/%27modules%27$ /modules/ permanent;
        rewrite ^/%27modules%27/(.*)$ /modules/$1 permanent;
        rewrite ^/%27modules-es%27$ /modules-es/ permanent;
        rewrite ^/%27modules-es%27/(.*)$ /modules-es/$1 permanent;
        rewrite ^/'modules'$ /modules/ permanent;
        rewrite ^/'modules'/(.*)$ /modules/$1 permanent;
        rewrite ^/'modules-es'$ /modules-es/ permanent;
        rewrite ^/'modules-es'/(.*)$ /modules-es/$1 permanent;
        rewrite ^/\"modules\"$ /modules/ permanent;
        rewrite ^/\"modules\"/(.*)$ /modules/$1 permanent;
        rewrite ^/\"modules-es\"$ /modules-es/ permanent;
        rewrite ^/\"modules-es\"/(.*)$ /modules-es/$1 permanent;
        # Antora sources live under content/ and content-es/; published site uses /modules/ and /modules-es/.
        rewrite ^/content-es/?$ /modules-es/ permanent;
        rewrite ^/content-es/(.*)$ /modules-es/$1 permanent;
        rewrite ^/content/?$ /modules/ permanent;
        rewrite ^/content/(.*)$ /modules/$1 permanent;
        # Extensionless lab page URLs (client router, bookmark, or refresh) must map to .html files.
        rewrite ^/www/(modules(?:-es)?)/([^./?#]+)/?$ /www/$1/$2.html last;
        rewrite ^/(modules(?:-es)?)/([^./?#]+)/?$ /$1/$2.html last;
        # Prevent stale lab guide content in embedded views.
        # The Showroom UI can be opened in multiple frames; aggressive browser caching
        # may cause users to keep seeing old pages after updates.
        proxy_hide_header Cache-Control;
        proxy_hide_header Expires;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        location / {
          proxy_pass http://127.0.0.1:8000;
          expires off;
          proxy_cache off;
          proxy_pass_request_headers on;
          proxy_set_header Accept-Encoding "";
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }
        {{- if .Values.showroom.terminal.enabled }}
        location /terminal/ {
          proxy_pass http://127.0.0.1:7681;
          rewrite ^/terminal/(.*)$ /$1 break;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_read_timeout 43200000;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header Host $http_host;
          proxy_set_header X-NginX-Proxy true;
        }
        {{- end }}
      }
    }
---
# Patched supplemental UI and lab pages; applied before Antora build.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.showroom.name }}-ui-patch
  namespace: {{ .Values.showroom.namespace }}
data:
  header-content.hbs: |
{{ .Files.Get "files/header-content.hbs" | indent 4 }}
  nav.adoc: |
{{ .Files.Get "files/nav.adoc" | indent 4 }}
  nav-es.adoc: |
{{ .Files.Get "files/nav-es.adoc" | indent 4 }}
  index.adoc: |
{{ .Files.Get "files/index.adoc" | indent 4 }}
  index-es.adoc: |
{{ .Files.Get "files/index-es.adoc" | indent 4 }}
  02-architecture-overview.adoc: |
{{ .Files.Get "files/02-architecture-overview.adoc" | indent 4 }}
  02-architecture-overview-es.adoc: |
{{ .Files.Get "files/02-architecture-overview-es.adoc" | indent 4 }}
  04-deploy-backend.adoc: |
{{ .Files.Get "files/04-deploy-backend.adoc" | indent 4 }}
  13-observability.adoc: |
{{ .Files.Get "files/13-observability.adoc" | indent 4 }}
  13-observability-es.adoc: |
{{ .Files.Get "files/13-observability-es.adoc" | indent 4 }}
  06-deploy-frontend-gateway-es.adoc: |
{{ .Files.Get "files/06-deploy-frontend-gateway-es.adoc" | indent 4 }}
  06-deploy-frontend-gateway.adoc: |
{{ .Files.Get "files/06-deploy-frontend-gateway.adoc" | indent 4 }}
  04-deploy-backend-es.adoc: |
{{ .Files.Get "files/04-deploy-backend-es.adoc" | indent 4 }}
  07-explore-argocd-apis-es.adoc: |
{{ .Files.Get "files/07-explore-argocd-apis-es.adoc" | indent 4 }}
  09-explore-connectivity-link-oidc-es.adoc: |
{{ .Files.Get "files/09-explore-connectivity-link-oidc-es.adoc" | indent 4 }}
  10-explore-connectivity-link-apikey-es.adoc: |
{{ .Files.Get "files/10-explore-connectivity-link-apikey-es.adoc" | indent 4 }}
  12-openshift-lightspeed-mcp.adoc: |
{{ .Files.Get "files/12-openshift-lightspeed-mcp.adoc" | indent 4 }}
  12-openshift-lightspeed-mcp-es.adoc: |
{{ .Files.Get "files/12-openshift-lightspeed-mcp-es.adoc" | indent 4 }}
  14-full-stack-verification-es.adoc: |
{{ .Files.Get "files/14-full-stack-verification-es.adoc" | indent 4 }}
---
# Showroom User Data ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.showroom.name }}-userdata
  namespace: {{ .Values.showroom.namespace }}
data:
  user_data.yml: |
    cluster_domain: {{ .Values.deployer.domain }}
    user_name: '%USER_NAME%'
    user_password: '%USER_PASSWORD%'
    demo_namespace: {{ .Values.demo.namespace }}
    demo_app: {{ .Values.demo.appName }}
---
# Showroom PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.showroom.name }}-terminal-lab-user-home
  namespace: {{ .Values.showroom.namespace }}
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: "5Gi"
---
# Showroom Service
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.showroom.name }}
  namespace: {{ .Values.showroom.namespace }}
spec:
  type: ClusterIP
  ports:
  - port: 8080
    protocol: TCP
    targetPort: 8080
  selector:
    app.kubernetes.io/name: {{ .Values.showroom.name }}
---
# Showroom Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.showroom.name }}
  namespace: {{ .Values.showroom.namespace }}
  labels:
    demo.redhat.com/application: "showroom"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.showroom.name }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.showroom.name }}
    spec:
      serviceAccountName: {{ .Values.showroom.name }}
      initContainers:
      - name: git-cloner
        image: "quay.io/rhpds/git-cloner:v1.1.2"
        env:
        - name: GIT_REPO_URL
          value: {{ .Values.showroom.content.repoUrl | quote }}
        - name: GIT_REPO_REF
          value: {{ .Values.showroom.content.repoRef | quote }}
        - name: CLONE_DIR
          value: "/showroom/repo"
        volumeMounts:
        - mountPath: /showroom/repo
          name: showroom-files
          subPath: repo
      - name: patch-supplemental-ui
        image: "quay.io/rhpds/git-cloner:v1.1.2"
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -e
            dest="/showroom/repo/content/supplemental-ui/partials/header-content.hbs"
            mkdir -p "$(dirname "$dest")"
            cp /patch/header-content.hbs "$dest"
            # Remove direct references to Kiali/Jaeger from the published UI.
            # The 3D model labels live in head-meta.hbs in both EN/ES content trees.
            for f in \
              /showroom/repo/content/supplemental-ui/partials/head-meta.hbs \
              /showroom/repo/content-es/supplemental-ui/partials/head-meta.hbs; do
              if [ -f "$f" ]; then
                sed -i 's|Grafana / Kiali|Grafana / Service Mesh|g' "$f" || true
              fi
            done
            # Workshop credentials: ensure docs never show the old default password.
            # Replace in both EN/ES content trees before Antora renders HTML.
            for d in /showroom/repo/content /showroom/repo/content-es; do
              if [ -d "$d" ]; then
                grep -RIl 'Welcome123' "$d" 2>/dev/null | xargs -I{} sed -i 's/Welcome123!/redhat/g; s/Welcome123/redhat/g' {} || true
              fi
            done
            cp /patch/nav.adoc /showroom/repo/content/modules/ROOT/nav.adoc
            cp /patch/nav-es.adoc /showroom/repo/content-es/modules/ROOT/nav.adoc
            cp /patch/index.adoc /showroom/repo/content/modules/ROOT/pages/index.adoc
            cp /patch/index-es.adoc /showroom/repo/content-es/modules/ROOT/pages/index.adoc
            cp /patch/02-architecture-overview.adoc /showroom/repo/content/modules/ROOT/pages/02-architecture-overview.adoc
            cp /patch/02-architecture-overview-es.adoc /showroom/repo/content-es/modules/ROOT/pages/02-architecture-overview.adoc
            cp /patch/04-deploy-backend.adoc /showroom/repo/content/modules/ROOT/pages/04-deploy-backend.adoc
            cp /patch/13-observability.adoc /showroom/repo/content/modules/ROOT/pages/13-observability.adoc
            cp /patch/13-observability-es.adoc /showroom/repo/content-es/modules/ROOT/pages/13-observability.adoc
            cp /patch/06-deploy-frontend-gateway-es.adoc /showroom/repo/content-es/modules/ROOT/pages/06-deploy-frontend-gateway.adoc
            cp /patch/06-deploy-frontend-gateway.adoc /showroom/repo/content/modules/ROOT/pages/06-deploy-frontend-gateway.adoc
            cp /patch/04-deploy-backend-es.adoc /showroom/repo/content-es/modules/ROOT/pages/04-deploy-backend.adoc
            cp /patch/07-explore-argocd-apis-es.adoc /showroom/repo/content-es/modules/ROOT/pages/07-explore-argocd-apis.adoc
            cp /patch/09-explore-connectivity-link-oidc-es.adoc /showroom/repo/content-es/modules/ROOT/pages/09-explore-connectivity-link-oidc.adoc
            cp /patch/10-explore-connectivity-link-apikey-es.adoc /showroom/repo/content-es/modules/ROOT/pages/10-explore-connectivity-link-apikey.adoc
            rm -f /showroom/repo/content/modules/ROOT/pages/11-developer-lightspeed.adoc \
                  /showroom/repo/content-es/modules/ROOT/pages/11-developer-lightspeed.adoc
            cp /patch/12-openshift-lightspeed-mcp.adoc /showroom/repo/content/modules/ROOT/pages/12-openshift-lightspeed-mcp.adoc
            cp /patch/12-openshift-lightspeed-mcp-es.adoc /showroom/repo/content-es/modules/ROOT/pages/12-openshift-lightspeed-mcp.adoc
            cp /patch/14-full-stack-verification-es.adoc /showroom/repo/content-es/modules/ROOT/pages/14-full-stack-verification.adoc
        volumeMounts:
        - mountPath: /showroom/repo
          name: showroom-files
          subPath: repo
        - mountPath: /patch
          name: showroom-ui-patch
          readOnly: true
      - name: antora-builder
        image: "quay.io/rhpds/antora:v1.0.1"
        env:
        - name: FILES_DIR
          value: "/showroom/repo"
        - name: OUTPUT_DIR
          value: "/showroom/www"
        - name: ANTORA_SITE_FILE
          value: {{ .Values.showroom.content.antoraPlaybook | quote }}
        volumeMounts:
        - mountPath: /showroom/repo
          name: showroom-files
          subPath: repo
        - name: user-data
          mountPath: /user_data/
        - mountPath: /showroom/www
          name: showroom-files
          subPath: www
      containers:
      - name: nginx
        image: "quay.io/rhpds/nginx:1.25"
        imagePullPolicy: "IfNotPresent"
        volumeMounts:
        - mountPath: /etc/nginx/nginx.conf
          name: nginx-config
          subPath: nginx.conf
        - mountPath: /var/cache/nginx
          name: nginx-cache
        - mountPath: /var/run
          name: nginx-pid
        ports:
        - name: web
          containerPort: 8080
      - name: content
        image: {{ .Values.showroom.content.image | quote }}
        imagePullPolicy: "IfNotPresent"
        env:
        - name: GIT_REPO_URL
          value: {{ .Values.showroom.content.repoUrl | quote }}
        - name: GIT_REPO_REF
          value: {{ .Values.showroom.content.repoRef | quote }}
        - name: ANTORA_PLAYBOOK
          value: {{ .Values.showroom.content.antoraPlaybook | quote }}
        - name: DOMAIN
          value: {{ .Values.deployer.domain | quote }}
        {{- if .Values.showroom.nookbag.enabled }}
        - name: ZT_BUNDLE
          value: {{ .Values.showroom.nookbag.bundleUrl | quote }}
        - name: ZT_UI_ENABLED
          value: "true"
        - name: GUID
          value: {{ .Values.showroom.namespace | quote }}
        {{- end }}
        volumeMounts:
        - name: user-data
          mountPath: /user_data/
        - mountPath: /showroom/repo
          name: showroom-files
          subPath: repo
        - mountPath: /showroom/www
          name: showroom-files
          subPath: www
        ports:
        - containerPort: 8000
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /
            port: 8000
        readinessProbe:
          httpGet:
            path: /
            port: 8000
      {{- if .Values.showroom.terminal.enabled }}
      - name: terminal
        image: {{ .Values.showroom.terminal.image | quote }}
        imagePullPolicy: IfNotPresent
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        volumeMounts:
        - name: terminal-lab-user-home
          mountPath: /home/lab-user
        ports:
        - containerPort: 7681
          protocol: TCP
        resources:
          limits:
            cpu: {{ .Values.showroom.terminal.resources.limits.cpu }}
            memory: {{ .Values.showroom.terminal.resources.limits.memory }}
          requests:
            cpu: {{ .Values.showroom.terminal.resources.requests.cpu }}
            memory: {{ .Values.showroom.terminal.resources.requests.memory }}
      {{- end }}
      volumes:
      - name: showroom-files
        emptyDir: {}
      - name: user-data
        configMap:
          name: {{ .Values.showroom.name }}-userdata
      - name: showroom-ui-patch
        configMap:
          name: {{ .Values.showroom.name }}-ui-patch
      - name: nginx-config
        configMap:
          defaultMode: 420
          name: {{ .Values.showroom.name }}-proxy-config
      - name: nginx-pid
        emptyDir: {}
      - name: nginx-cache
        emptyDir: {}
      - name: terminal-lab-user-home
        persistentVolumeClaim:
          claimName: {{ .Values.showroom.name }}-terminal-lab-user-home
---
# Showroom Route
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ .Values.showroom.name }}
  namespace: {{ .Values.showroom.namespace }}
  annotations:
    haproxy.router.openshift.io/timeout: 1h
    haproxy.router.openshift.io/timeout-tunnel: 1h
spec:
  to:
    kind: Service
    name: {{ .Values.showroom.name }}
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
{{- end }}
