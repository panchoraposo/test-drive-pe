apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  annotations:
    argocd.argoproj.io/sync-options: ServerSideApply=true
  name: openshift-gitops-cluster-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: ServiceAccount
  name: openshift-gitops-argocd-application-controller
  namespace: openshift-gitops
---
apiVersion: argoproj.io/v1beta1
kind: ArgoCD
metadata:
  name: openshift-gitops
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-options: ServerSideApply=true
spec:
  extraConfig:
    # ApplicationSets often report "Progressing: Waiting for the status to be reported"
    # which keeps the parent app in Progressing even when everything is actually reconciled.
    # This override marks ApplicationSets as Healthy to keep the workshop GitOps baseline clean.
    resource.customizations.health.argoproj.io_ApplicationSet: |
      hs = {}
      hs.status = "Healthy"
      hs.message = "ApplicationSet health overridden"
      return hs
  rbac:
    defaultPolicy: 'role:workshop-readonly'
    scopes: '[groups, preferred_username]'
    policy: |
      g, system:cluster-admins, role:admin
      g, admin, role:admin
      # Default readonly access for workshop users (keeps UI usable even if username claim differs)
      p, role:workshop-readonly, applications, get, default/user*-*, allow
      p, role:workshop-readonly, applications, list, default/user*-*, allow
      p, role:workshop-readonly, logs, get, default/user*-*, allow
      p, role:workshop-readonly, projects, get, *, allow
      p, role:workshop-readonly, projects, list, *, allow
      p, role:workshop-readonly, clusters, get, *, allow
      p, role:workshop-readonly, repositories, get, *, allow
      {{- $userCount := .Values.userCount | default 200 | int }}
      {{- range $i := until $userCount }}
      {{- $user := printf "user%d" (add1 $i) }}
      p, {{ $user }}, applications, get, default/{{ $user }}-*, allow
      p, {{ $user }}, applications, sync, default/{{ $user }}-*, allow
      p, {{ $user }}, applications, action/*, default/{{ $user }}-*, allow
      p, {{ $user }}, logs, get, default/{{ $user }}-*, allow
      {{- end }}
  controller:
    resources:
      limits:
        cpu: "4"
        memory: 6Gi
      requests:
        cpu: 500m
        memory: 2Gi
    env:
      - name: ARGOCD_CONTROLLER_REPLICAS
        value: "1"
  repo:
    resources:
      limits:
        cpu: "2"
        memory: 2Gi
      requests:
        cpu: 250m
        memory: 512Mi
  server:
    resources:
      limits:
        cpu: "2"
        memory: 1Gi
      requests:
        cpu: 125m
        memory: 256Mi
