            {
              "expr": "sum(rate(istio_tcp_connections_opened_total{reporter=\"destination\"}[5m])) by (destination_workload, destination_workload_namespace)",
              "legendFormat": "opened — {{`{{destination_workload_namespace}}`}}/{{`{{destination_workload}}`}}"
            },
            {
              "expr": "sum(rate(istio_tcp_connections_closed_total{reporter=\"destination\"}[5m])) by (destination_workload, destination_workload_namespace)",
              "legendFormat": "closed — {{`{{destination_workload_namespace}}`}}/{{`{{destination_workload}}`}}"
            }
          ],
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" }
        },
        {
          "title": "TCP Connections Opened Rate",
          "description": "Rate of new TCP connections per destination",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 51 },
          "fieldConfig": {
            "defaults": {
              "unit": "cps",
              "custom": { "fillOpacity": 10, "lineWidth": 2, "showPoints": "never" }
            }
          },
          "options": { "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "sum(rate(istio_tcp_connections_opened_total{reporter=\"destination\"}[5m])) by (destination_workload, destination_workload_namespace)",
              "legendFormat": "{{`{{destination_workload_namespace}}`}}/{{`{{destination_workload}}`}}"
            }
          ],
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" }
        },
        {
          "title": "Waypoint — Request Rate (L7 via waypoint)",
          "description": "L7 traffic handled by ambient mesh waypoint proxies",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 59 },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "fillOpacity": 15, "lineWidth": 2, "showPoints": "never" }
            }
          },
          "options": { "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "sum(rate(istio_requests_total{reporter=\"waypoint\"}[5m])) by (destination_workload, destination_workload_namespace)",
              "legendFormat": "[waypoint] {{`{{destination_workload_namespace}}`}}/{{`{{destination_workload}}`}}"
            },
            {
              "expr": "sum(rate(istio_requests_total{reporter=\"destination\", source_workload=~\".*waypoint.*\"}[5m])) by (destination_workload, destination_workload_namespace)",
              "legendFormat": "[via-wp] {{`{{destination_workload_namespace}}`}}/{{`{{destination_workload}}`}}"
            },
            {
              "expr": "sum(rate(istio_requests_total{reporter=\"destination\", destination_workload=~\".*waypoint.*\"}[5m])) by (source_workload, source_workload_namespace)",
              "legendFormat": "[to-wp] {{`{{source_workload_namespace}}`}}/{{`{{source_workload}}`}}"
