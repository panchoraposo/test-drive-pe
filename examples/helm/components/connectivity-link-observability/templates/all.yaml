apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: connectivity-link-prometheus-scrape
rules:
- apiGroups:
  - ""
  resources:
  - nodes
  - nodes/metrics
  - services
  - endpoints
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - networking.k8s.io
  resources:
  - ingresses
  verbs:
  - get
  - list
  - watch
- nonResourceURLs:
  - /metrics
  - /metrics/cadvisor
  verbs:
  - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: connectivity-link-stack-prometheus-scrape
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: connectivity-link-prometheus-scrape
subjects:
- kind: ServiceAccount
  name: connectivity-link-stack-prometheus
  namespace: openshift-cluster-observability-operator
---
apiVersion: monitoring.rhobs/v1
kind: PodMonitor
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    k8s-app: ztunnel-monitor
    openshift.io/user-monitoring: "true"
  name: ztunnel-metrics
  namespace: openshift-cluster-observability-operator
spec:
  namespaceSelector:
    matchNames:
    - ztunnel
  podMetricsEndpoints:
  - interval: 30s
    path: /stats/prometheus
    port: "15020"
  selector:
    matchLabels:
      app: ztunnel
---
apiVersion: monitoring.rhobs/v1
kind: PodMonitor
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    k8s-app: waypoint-monitor
    openshift.io/user-monitoring: "true"
  name: istio-waypoints-monitor
  namespace: openshift-cluster-observability-operator
spec:
  namespaceSelector:
    any: true
  podMetricsEndpoints:
  - interval: 30s
    path: /stats/prometheus
    port: http-envoy-prom
  - interval: 30s
    path: /stats/prometheus
    port: "15090"
  selector:
    matchExpressions:
    - key: gateway.istio.io/managed
      operator: Exists
---
apiVersion: monitoring.rhobs/v1
kind: ServiceMonitor
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/name: kuadrant
    openshift.io/user-monitoring: "true"
  name: kuadrant
  namespace: openshift-cluster-observability-operator
spec:
  endpoints:
  - interval: 30s
    port: metrics
  - interval: 30s
    port: https
    scheme: https
    tlsConfig:
      insecureSkipVerify: true
  namespaceSelector:
    matchNames:
    - istio-system
  selector:
    matchExpressions:
    - key: app.kubernetes.io/name
      operator: In
      values:
      - kuadrant-controller-manager
      - kuadrant
      - authorino
---
apiVersion: monitoring.rhobs/v1
kind: ServiceMonitor
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/component: gateway
    openshift.io/user-monitoring: "true"
  name: litemaas-gateway-metrics
  namespace: openshift-cluster-observability-operator
spec:
  endpoints:
  - interval: 30s
    path: /stats/prometheus
    port: "15090"
  namespaceSelector:
    matchNames:
    - litemaas
  selector:
    matchLabels:
      gateway.networking.k8s.io/gateway-name: litemaas-gateway
---
apiVersion: monitoring.rhobs/v1
kind: ServiceMonitor
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/component: gateway
    openshift.io/user-monitoring: "true"
  name: neuralbank-gateway-metrics
  namespace: openshift-cluster-observability-operator
spec:
  endpoints:
  - interval: 30s
    path: /stats/prometheus
    port: "15090"
  namespaceSelector:
    matchNames:
    - neuralbank-stack
  selector:
    matchLabels:
      gateway.networking.k8s.io/gateway-name: neuralbank-gateway
---
apiVersion: monitoring.rhobs/v1alpha1
kind: MonitoringStack
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    connectivity-link.redhat.com/stack: connectivity-link-stack
  name: connectivity-link-stack
  namespace: openshift-cluster-observability-operator
spec:
  alertmanagerConfig:
    disabled: false
  logLevel: info
  prometheusConfig:
    replicas: 1
  resourceSelector:
    matchLabels:
      openshift.io/user-monitoring: "true"
  retention: 7d
---
apiVersion: monitoring.rhobs/v1alpha1
kind: ThanosQuerier
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  name: connectivity-link-querier
  namespace: openshift-cluster-observability-operator
spec:
  selector:
    matchLabels:
      connectivity-link.redhat.com/stack: connectivity-link-stack
---
apiVersion: observability.openshift.io/v1alpha1
kind: UIPlugin
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  name: monitoring
  namespace: openshift-cluster-observability-operator
spec:
  monitoring:
    acm:
      alertmanager:
        url: http://connectivity-link-stack-alertmanager.openshift-cluster-observability-operator.svc.cluster.local:9093
      enabled: true
      thanosQuerier:
        url: http://thanos-querier-connectivity-link-querier.openshift-cluster-observability-operator.svc.cluster.local:10902
  type: Monitoring
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  name: thanos-querier-connectivity-link
  namespace: openshift-cluster-observability-operator
spec:
  host: thanos-querier.{{ .Values.clusterDomain | default "apps.cluster.example.com" }}
  port:
    targetPort: 10902
  tls:
    termination: edge
  to:
    kind: Service
    name: thanos-querier-connectivity-link-querier
    weight: 100
  wildcardPolicy: None
---
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  labels:
    app: grafana-observability
    dashboards: grafana-observability
  name: grafana-observability
  namespace: openshift-cluster-observability-operator
spec:
  config:
    auth:
      disable_login_form: "false"
    auth.anonymous:
      enabled: "true"
      org_role: Viewer
    security:
      admin_password: openshift
      admin_user: admin
  route:
    spec:
      host: grafana-observability.{{ .Values.clusterDomain | default "apps.cluster.example.com" }}
      tls:
        termination: edge
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  name: prometheus-rhobs
  namespace: openshift-cluster-observability-operator
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana-observability
  datasource:
    name: Prometheus (RHOBS)
    type: prometheus
    access: proxy
    url: http://connectivity-link-stack-prometheus.openshift-cluster-observability-operator.svc.cluster.local:9090
    isDefault: true
    jsonData:
      timeInterval: "30s"
    editable: true
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  name: thanos-querier
  namespace: openshift-cluster-observability-operator
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana-observability
  datasource:
    name: Thanos Querier
    type: prometheus
    access: proxy
    url: http://thanos-querier-connectivity-link-querier.openshift-cluster-observability-operator.svc.cluster.local:10902
    jsonData:
      timeInterval: "30s"
    editable: true
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "6"
  name: api-gateway-metrics
  namespace: openshift-cluster-observability-operator
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana-observability
  json: |
    {
      "annotations": { "list": [] },
      "title": "API Gateway Metrics",
      "uid": "api-gateway-metrics",
      "version": 1,
      "panels": [
        {
          "title": "Request Rate by Gateway",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(istio_requests_total[5m])) by (destination_workload_namespace)",
              "legendFormat": "{{`{{destination_workload_namespace}}`}}"
            }
          ],
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" }
        },
        {
          "title": "Error Rate (4xx/5xx)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(istio_requests_total{response_code=~\"[45].*\"}[5m])) by (destination_workload_namespace)",
              "legendFormat": "{{`{{destination_workload_namespace}}`}}"
            }
          ],
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" }
        },
        {
          "title": "P95 Latency (ms)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket[5m])) by (le, destination_workload_namespace))",
              "legendFormat": "{{`{{destination_workload_namespace}}`}}"
            }
          ],
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" }
        },
        {
          "title": "Rate Limit Rejections",
          "type": "stat",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "sum(increase(ratelimit_service_rate_limit_total{status=\"over_limit\"}[1h]))",
              "legendFormat": "Rejected"
            }
          ],
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" }
        }
      ],
      "templating": {
        "list": [
          {
            "name": "DS_PROMETHEUS",
            "type": "datasource",
            "query": "prometheus",
            "current": { "text": "Prometheus (RHOBS)", "value": "Prometheus (RHOBS)" }
          }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "schemaVersion": 39
    }
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "6"
  name: service-mesh-overview
  namespace: openshift-cluster-observability-operator
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana-observability
  json: |
    {
      "annotations": { "list": [] },
      "title": "Service Mesh Overview",
      "uid": "service-mesh-overview",
      "version": 3,
      "panels": [
        {
          "title": "Total Requests/s",
          "type": "gauge",
          "gridPos": { "h": 7, "w": 6, "x": 0, "y": 0 },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps", "min": 0, "max": 100,
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "super-light-green", "value": null },
                { "color": "green", "value": 1 },
                { "color": "orange", "value": 50 },
                { "color": "red", "value": 80 }
              ]}
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "showThresholdLabels": false, "showThresholdMarkers": true },
          "targets": [{ "expr": "sum(rate(istio_requests_total[5m]))", "instant": true }],
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" }
        },
        {
          "title": "Success Rate",
          "type": "gauge",
          "gridPos": { "h": 7, "w": 6, "x": 6, "y": 0 },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit", "min": 0, "max": 1,
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "red", "value": null },
                { "color": "orange", "value": 0.90 },
                { "color": "yellow", "value": 0.95 },
                { "color": "green", "value": 0.99 }
              ]}
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "showThresholdLabels": false, "showThresholdMarkers": true },
          "targets": [{ "expr": "sum(rate(istio_requests_total{response_code=~\"2..\"}[5m])) / sum(rate(istio_requests_total[5m]))", "instant": true }],
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" }
        },
        {
          "title": "P95 Latency",
          "type": "gauge",
          "gridPos": { "h": 7, "w": 6, "x": 12, "y": 0 },
          "fieldConfig": {
            "defaults": {
              "unit": "ms", "min": 0, "max": 2000,
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "green", "value": null },
                { "color": "yellow", "value": 100 },
                { "color": "orange", "value": 500 },
                { "color": "red", "value": 1000 }
              ]}
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "showThresholdLabels": false, "showThresholdMarkers": true },
          "targets": [{ "expr": "histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket[5m])) by (le))", "instant": true }],
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" }
        },
        {
          "title": "Error Rate",
          "type": "gauge",
          "gridPos": { "h": 7, "w": 6, "x": 18, "y": 0 },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit", "min": 0, "max": 0.5,
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "green", "value": null },
                { "color": "yellow", "value": 0.01 },
                { "color": "orange", "value": 0.05 },
                { "color": "red", "value": 0.10 }
              ]}
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "showThresholdLabels": false, "showThresholdMarkers": true },
          "targets": [{ "expr": "sum(rate(istio_requests_total{response_code=~\"[45]..\"}[5m])) / sum(rate(istio_requests_total[5m]))", "instant": true }],
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" }
        },
        {
          "title": "2xx Responses",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 7 },
          "fieldConfig": { "defaults": { "unit": "reqps", "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] } } },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "area" },
          "targets": [{ "expr": "sum(rate(istio_requests_total{response_code=~\"2..\"}[5m]))", "instant": true }],
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" }
        },
        {
          "title": "4xx Errors",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 7 },
          "fieldConfig": { "defaults": { "unit": "reqps", "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "orange", "value": 0.1 }, { "color": "red", "value": 1 }] } } },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "area" },
          "targets": [{ "expr": "sum(rate(istio_requests_total{response_code=~\"4..\"}[5m]))", "instant": true }],
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" }
        },
        {
          "title": "5xx Errors",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 7 },
          "fieldConfig": { "defaults": { "unit": "reqps", "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "orange", "value": 0.01 }, { "color": "red", "value": 0.1 }] } } },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "area" },
          "targets": [{ "expr": "sum(rate(istio_requests_total{response_code=~\"5..\"}[5m]))", "instant": true }],
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" }
        },
        {
          "title": "TCP Sent",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 7 },
          "fieldConfig": { "defaults": { "unit": "Bps", "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] } } },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "area" },
          "targets": [{ "expr": "sum(rate(istio_tcp_sent_bytes_total[5m]))", "instant": true }],
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" }
        },
        {
          "title": "TCP Received",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 7 },
          "fieldConfig": { "defaults": { "unit": "Bps", "thresholds": { "mode": "absolute", "steps": [{ "color": "purple", "value": null }] } } },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "area" },
          "targets": [{ "expr": "sum(rate(istio_tcp_received_bytes_total[5m]))", "instant": true }],
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" }
        },
        {
          "title": "Connections/s",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 20, "y": 7 },
          "fieldConfig": { "defaults": { "unit": "cps", "thresholds": { "mode": "absolute", "steps": [{ "color": "yellow", "value": null }] } } },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "area" },
          "targets": [{ "expr": "sum(rate(istio_tcp_connections_opened_total[5m]))", "instant": true }],
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" }
        },
        {
          "title": "Traffic Flow — Request Rate (source → destination)",
          "description": "L7 HTTP request rate from gateways and waypoint proxies",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 11 },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "fillOpacity": 15, "lineWidth": 2, "showPoints": "never" }
            }
          },
          "options": { "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "sum(rate(istio_requests_total{reporter=\"destination\"}[5m])) by (source_workload, source_workload_namespace, destination_workload, destination_workload_namespace)",
              "legendFormat": "{{`{{source_workload_namespace}}`}}/{{`{{source_workload}}`}} → {{`{{destination_workload_namespace}}`}}/{{`{{destination_workload}}`}}"
            }
          ],
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" }
        },
        {
          "title": "Request Rate by Namespace",
          "description": "Total request rate per destination namespace (L7 + L4 combined view)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 19 },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "fillOpacity": 15, "lineWidth": 2, "showPoints": "never" }
            }
          },
          "options": { "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "sum(rate(istio_requests_total{reporter=\"destination\"}[5m])) by (destination_workload_namespace)",
              "legendFormat": "{{`{{destination_workload_namespace}}`}} (L7)"
            },
            {
              "expr": "sum(rate(istio_tcp_connections_opened_total{reporter=\"destination\"}[5m])) by (destination_workload_namespace)",
              "legendFormat": "{{`{{destination_workload_namespace}}`}} (TCP conn/s)"
            }
          ],
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" }
        },
        {
          "title": "Success Rate (2xx %)",
          "description": "Percentage of successful (2xx) responses per destination service",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 27 },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "custom": { "fillOpacity": 10, "lineWidth": 2, "showPoints": "never" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "orange", "value": 0.95 },
                  { "color": "green", "value": 0.99 }
                ]
              }
            }
          },
          "options": { "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "sum(rate(istio_requests_total{response_code=~\"2.*\", reporter=\"destination\"}[5m])) by (destination_workload, destination_workload_namespace) / sum(rate(istio_requests_total{reporter=\"destination\"}[5m])) by (destination_workload, destination_workload_namespace)",
              "legendFormat": "{{`{{destination_workload_namespace}}`}}/{{`{{destination_workload}}`}}"
            }
          ],
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" }
        },
        {
          "title": "Success Rate — Current",
          "description": "Instant success rate gauge per destination service",
          "type": "gauge",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 27 },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "orange", "value": 0.95 },
                  { "color": "green", "value": 0.99 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "sum(rate(istio_requests_total{response_code=~\"2.*\", reporter=\"destination\"}[5m])) by (destination_workload, destination_workload_namespace) / sum(rate(istio_requests_total{reporter=\"destination\"}[5m])) by (destination_workload, destination_workload_namespace)",
              "legendFormat": "{{`{{destination_workload_namespace}}`}}/{{`{{destination_workload}}`}}",
              "instant": true
            }
          ],
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" }
        },
        {
          "title": "Latency P50 / P95 / P99",
          "description": "Request latency percentiles by destination service",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 35 },
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "custom": { "fillOpacity": 8, "lineWidth": 2, "showPoints": "never" }
            }
          },
          "options": { "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(istio_request_duration_milliseconds_bucket{reporter=\"destination\"}[5m])) by (le, destination_workload, destination_workload_namespace))",
              "legendFormat": "P50 — {{`{{destination_workload_namespace}}`}}/{{`{{destination_workload}}`}}"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{reporter=\"destination\"}[5m])) by (le, destination_workload, destination_workload_namespace))",
              "legendFormat": "P95 — {{`{{destination_workload_namespace}}`}}/{{`{{destination_workload}}`}}"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(istio_request_duration_milliseconds_bucket{reporter=\"destination\"}[5m])) by (le, destination_workload, destination_workload_namespace))",
              "legendFormat": "P99 — {{`{{destination_workload_namespace}}`}}/{{`{{destination_workload}}`}}"
