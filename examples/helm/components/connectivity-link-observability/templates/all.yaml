          "options": { "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "sum(rate(istio_tcp_sent_bytes_total{reporter=\"destination\"}[5m])) by (destination_workload, destination_workload_namespace)",
              "legendFormat": "{{`{{destination_workload_namespace}}`}}/{{`{{destination_workload}}`}}"
            }
          ],
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" }
        },
        {
          "title": "TCP Traffic — Bytes Received",
          "description": "TCP bytes received rate from ztunnel L4 telemetry",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 43 },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": { "fillOpacity": 20, "lineWidth": 2, "showPoints": "never", "drawStyle": "bars" }
            }
          },
          "options": { "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "sum(rate(istio_tcp_received_bytes_total{reporter=\"destination\"}[5m])) by (destination_workload, destination_workload_namespace)",
              "legendFormat": "{{`{{destination_workload_namespace}}`}}/{{`{{destination_workload}}`}}"
            }
          ],
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" }
        },
        {
          "title": "Active Connections (opened − closed rate)",
          "description": "Net connection rate per destination from ztunnel",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 51 },
          "fieldConfig": {
            "defaults": {
