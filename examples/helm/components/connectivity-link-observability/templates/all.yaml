          "options": { "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{reporter=\"waypoint\"}[5m])) by (le, destination_workload, destination_workload_namespace))",
              "legendFormat": "[waypoint] P95 — {{`{{destination_workload_namespace}}`}}/{{`{{destination_workload}}`}}"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{reporter=\"destination\", source_workload=~\".*waypoint.*\"}[5m])) by (le, destination_workload, destination_workload_namespace))",
              "legendFormat": "[via-wp] P95 — {{`{{destination_workload_namespace}}`}}/{{`{{destination_workload}}`}}"
            }
          ],
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" }
        },
        {
          "title": "Error Breakdown — 4xx by Destination",
          "description": "Client error rate (4xx) per destination service and response code",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 67 },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "fillOpacity": 15, "lineWidth": 2, "showPoints": "never", "stacking": { "mode": "normal" } }
            }
          },
          "options": { "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "sum(rate(istio_requests_total{response_code=~\"4.*\", reporter=\"destination\"}[5m])) by (destination_workload, destination_workload_namespace, response_code)",
              "legendFormat": "{{`{{destination_workload_namespace}}`}}/{{`{{destination_workload}}`}} [{{`{{response_code}}`}}]"
            }
          ],
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" }
        },
        {
          "title": "Error Breakdown — 5xx by Destination",
          "description": "Server error rate (5xx) per destination service and response code",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 67 },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "fillOpacity": 15, "lineWidth": 2, "showPoints": "never", "stacking": { "mode": "normal" } }
            }
          },
          "options": { "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "sum(rate(istio_requests_total{response_code=~\"5.*\", reporter=\"destination\"}[5m])) by (destination_workload, destination_workload_namespace, response_code)",
              "legendFormat": "{{`{{destination_workload_namespace}}`}}/{{`{{destination_workload}}`}} [{{`{{response_code}}`}}]"
            }
          ],
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" }
        }
      ],
      "templating": {
        "list": [
          {
            "name": "DS_PROMETHEUS",
            "type": "datasource",
            "query": "prometheus",
            "current": { "text": "Prometheus (RHOBS)", "value": "Prometheus (RHOBS)" }
          }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "refresh": "30s",
      "schemaVersion": 39
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "7"
  name: mesh-traffic-generator
  namespace: openshift-cluster-observability-operator
data:
  generate.sh: |
    #!/bin/sh
    DOMAIN="{{ .Values.clusterDomain | default "apps.cluster.example.com" }}"
    NB_HOST="neuralbank.${DOMAIN}"
    LM_HOST="litemaas.${DOMAIN}"

    echo "=== Mesh Traffic Generator ==="
    echo "Interval: ${INTERVAL:-5}s"

    while true; do
      # Neuralbank via gateway (OIDC 302, L7 waypoint metrics)
      curl -sk -o /dev/null -w "%{http_code} nb-gw/q/health\n" --connect-timeout 2 --max-time 4 \
        -H "Host: $NB_HOST" "http://neuralbank-gateway-istio.neuralbank-stack.svc:8080/q/health" &
      curl -sk -o /dev/null -w "%{http_code} nb-gw/api/v1/customers\n" --connect-timeout 2 --max-time 4 \
        -H "Host: $NB_HOST" "http://neuralbank-gateway-istio.neuralbank-stack.svc:8080/api/v1/customers" &
      # Neuralbank direct backend (200, L4 ztunnel metrics)
      curl -sk -o /dev/null -w "%{http_code} nb-svc/q/health\n" --connect-timeout 2 --max-time 4 \
        "http://neuralbank-backend-svc.neuralbank-stack.svc:8080/q/health" &
      # LiteMaaS via gateway (200, L7 waypoint metrics)
      curl -sk -o /dev/null -w "%{http_code} lm-gw/\n" --connect-timeout 2 --max-time 4 \
        -H "Host: $LM_HOST" "http://litemaas-gateway-istio.litemaas.svc:8080/" &
      wait
      sleep $(( ${INTERVAL:-5} + RANDOM % 3 ))
    done
---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "7"
  labels:
    app: mesh-traffic-generator
    app.kubernetes.io/part-of: observability
  name: mesh-traffic-generator
  namespace: openshift-cluster-observability-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mesh-traffic-generator
  template:
    metadata:
      labels:
        app: mesh-traffic-generator
    spec:
      containers:
      - name: traffic-gen
        image: registry.access.redhat.com/ubi9/ubi:latest
        command: ["/bin/sh", "/scripts/generate.sh"]
        env:
        - name: INTERVAL
          value: "5"
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 50m
            memory: 64Mi
        volumeMounts:
        - name: scripts
          mountPath: /scripts
      volumes:
      - name: scripts
        configMap:
          name: mesh-traffic-generator
          defaultMode: 0755
      terminationGracePeriodSeconds: 5
