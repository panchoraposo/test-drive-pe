        {
          "title": "P95 Latency per Service",
          "description": "Current P95 latency gauge per destination service",
          "type": "gauge",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 35 },
          "fieldConfig": {
            "defaults": {
              "unit": "ms", "min": 0, "max": 2000,
