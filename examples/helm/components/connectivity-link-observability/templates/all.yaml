                { "color": "green", "value": null },
                { "color": "yellow", "value": 100 },
                { "color": "orange", "value": 500 },
                { "color": "red", "value": 1000 }
              ]}
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "showThresholdLabels": false, "showThresholdMarkers": true },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{reporter=\"destination\"}[5m])) by (le, destination_workload, destination_workload_namespace))",
              "legendFormat": "{{`{{destination_workload_namespace}}`}}/{{`{{destination_workload}}`}}",
              "instant": true
            }
