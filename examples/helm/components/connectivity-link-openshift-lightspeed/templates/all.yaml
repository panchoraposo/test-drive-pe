##
## LLM credentials for OLS provider
##
apiVersion: v1
kind: Secret
metadata:
  name: llm-credentials
  namespace: openshift-lightspeed
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
stringData:
  apitoken: {{ .Values.llmApiKey | default "sk-no-key" | quote }}
---
##
## RHDH MCP auth token for OLS → Developer Hub MCP integration
##
apiVersion: v1
kind: Secret
metadata:
  name: rhdh-mcp-token
  namespace: openshift-lightspeed
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
stringData:
  header: "Bearer {{ .Values.rhdhBackendSecret | default "a01bb6ee68d5afbd9e82402b1a37a73d900bc653d6dc2375dec06bce6d62f34d" }}"
---
##
## OLSConfig — LiteLLM + MCP servers for tool calling
##
apiVersion: ols.openshift.io/v1alpha1
kind: OLSConfig
metadata:
  name: cluster
  labels:
    app.kubernetes.io/part-of: connectivity-link-lightspeed
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  featureGates:
    - MCPServer
  llm:
    providers:
      - name: litellm
        type: openai
        url: {{ .Values.llmEndpoint | default "https://litellm-prod.apps.maas.redhatworkshops.io/v1" | quote }}
        credentialsSecretRef:
          name: llm-credentials
        models:
          - name: {{ .Values.llmModel | default "granite-3-2-8b-instruct" }}
  ols:
    defaultProvider: litellm
    defaultModel: {{ .Values.llmModel | default "granite-3-2-8b-instruct" }}
    logLevel: INFO
    querySystemPrompt: |
      You have MCP tool functions available. When the user asks about
      cluster resources or operations, you MUST call the appropriate tool.
      Do NOT suggest CLI commands — use tools instead.

      IMPORTANT: Tool names have NO underscores between prefix and name.

      Kubernetes tools (prefix k8s):
        k8spods_list, k8spods_list_in_namespace, k8spods_get,
        k8spods_log, k8spods_top, k8spods_run, k8spods_exec, k8spods_delete,
        k8sresources_list, k8sresources_get, k8sresources_create_or_update,
        k8sresources_delete, k8sresources_scale,
        k8snamespaces_list, k8sprojects_list,
        k8snodes_top, k8snodes_log, k8snodes_stats_summary,
        k8sevents_list,
        k8shelm_install, k8shelm_list, k8shelm_uninstall.

      OpenShift tools (prefix ocp, camelCase, no underscores):
        ocpcreateDeployment, ocpdeployDatabase, ocpcreateService,
        ocpcreateHpa, ocpcreateNetworkPolicy,
        ocpmonitorDeployments, ocpdetectResourceIssues,
        ocpcheckClusterHealth, ocpcheckNodeConditions,
        ocpcheckKubeletStatus, ocpcheckCrioStatus,
        ocpgetPerformanceMetrics, ocpanalyzeJournalctlPodErrors,
        ocpanalyzePodDisruptions,
        ocprunCpuStressTest, ocprunNetworkTest,
        ocprunStorageBenchmark, ocprunDatabaseBenchmark, ocprunKubeBurner.

      Developer Hub / Backstage tools (NO prefix, use exact names):
        fetch-template-metadata — list/search Software Templates
        fetch-catalog-entities — list/search catalog entities (Components, APIs, Systems)
        register-catalog-entities — register new entities from a URL
        unregister-catalog-entities — remove registered entities
        fetch-techdocs — list entities with TechDocs
        analyze-techdocs-coverage — documentation coverage stats
        retrieve-techdocs-content — get TechDocs content for an entity

      ArgoCD tools (prefix argo, 15 tools):
        argolist_applications — list all ArgoCD applications
        argolist_clusters — list registered clusters
        argoget_application — get details of a specific application
        argoget_application_resource_tree — get resource tree
        argoget_application_managed_resources — get managed resources (supports kind/namespace filters)
        argoget_application_workload_logs — get pod/workload logs
        argoget_application_events — get application events
        argoget_resource_events — get events for a managed resource
        argoget_resources — get manifests for managed resources
        argoget_resource_actions — list available actions on a resource
        argocreate_application — create new ArgoCD application
        argoupdate_application — update an existing application
        argodelete_application — delete an application
        argosync_application — trigger sync on an application
        argorun_resource_action — run an action on a managed resource (e.g. restart)

      CRITICAL: Use ONLY the exact tool names listed above. Never invent tool names.
    deployment:
      api:
        replicas: 1
      console:
        replicas: 1
      dataCollector: {}
      database:
        replicas: 1
      llamaStack: {}
      mcpServer: {}
    conversationCache:
      type: postgres
      postgres:
        maxConnections: 2000
        sharedBuffers: 256MB
    introspectionEnabled: true
    userDataCollection: {}
  mcpServers:
    - name: mcp-gateway
      url: "http://mcp-gateway-istio.mcp-system.svc.cluster.local:8080/mcp"
      timeout: 120
    - name: rhdh-catalog
      url: "http://backstage-developer-hub.developer-hub.svc.cluster.local/api/mcp-actions/v1"
      timeout: 120
      headers:
        - name: Authorization
          valueFrom:
            type: secret
            secretRef:
              name: rhdh-mcp-token

---
##
## Mock OpenAI-compatible LLM (workshop fallback)
## Used as upstream for the in-cluster LiteLLM proxy when no GPU-backed model is available.
##
apiVersion: v1
kind: ConfigMap
metadata:
  name: mock-llm-app
  namespace: openshift-lightspeed
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  main.py: |
    from __future__ import annotations

    import json
    from typing import Any, Dict, List, Optional

    from fastapi import FastAPI, Request
    from fastapi.responses import JSONResponse, StreamingResponse

    app = FastAPI()

    MODEL_ID = "qwen25-7b-instruct"


    @app.get("/v1/models")
    async def list_models() -> Dict[str, Any]:
      return {
        "object": "list",
        "data": [
          {
            "id": MODEL_ID,
            "object": "model",
            "created": 0,
            "owned_by": "openai",
          }
        ],
      }


    def _extract_user_text(messages: List[Dict[str, Any]]) -> str:
      for m in reversed(messages or []):
        if m.get("role") == "user" and isinstance(m.get("content"), str):
          return m["content"]
      return ""


    def _is_validation_prompt(messages: List[Dict[str, Any]]) -> bool:
      joined = "\n".join([str(m.get("content", "")) for m in (messages or [])])
      return "question classification tool" in joined.lower()


    def _completion_text(messages: List[Dict[str, Any]]) -> str:
      if _is_validation_prompt(messages):
        # The Lightspeed question validity shield expects a strict allow/reject answer.
        return "allowed"
      user_text = _extract_user_text(messages)
      if not user_text:
        return "ok"
      return (
        "Lightspeed is running in workshop fallback mode (no external LLM configured).\n\n"
        f"You asked: {user_text}\n\n"
        "Tip: Ask about Developer Hub templates, catalog, Argo CD apps, or Kuadrant policies."
      )


    @app.post("/v1/chat/completions")
    async def chat_completions(req: Request) -> Any:
      payload = await req.json()
      messages = payload.get("messages") or []
      stream = bool(payload.get("stream"))
      content = _completion_text(messages)

      if not stream:
        return JSONResponse(
          {
            "id": "chatcmpl-mock",
            "object": "chat.completion",
            "created": 0,
            "model": payload.get("model", MODEL_ID),
            "choices": [
              {
                "index": 0,
                "message": {"role": "assistant", "content": content},
                "finish_reason": "stop",
              }
            ],
          }
        )

      async def gen():
        # Minimal OpenAI SSE stream: send the full content in a couple chunks.
        chunks = [content[: max(1, len(content) // 2)], content[max(1, len(content) // 2) :]]
        for part in chunks:
          data = {
            "id": "chatcmpl-mock",
            "object": "chat.completion.chunk",
            "created": 0,
            "model": payload.get("model", MODEL_ID),
            "choices": [{"index": 0, "delta": {"content": part}, "finish_reason": None}],
          }
          yield f"data: {json.dumps(data)}\n\n"
        done = {
          "id": "chatcmpl-mock",
          "object": "chat.completion.chunk",
          "created": 0,
          "model": payload.get("model", MODEL_ID),
          "choices": [{"index": 0, "delta": {}, "finish_reason": "stop"}],
        }
        yield f"data: {json.dumps(done)}\n\n"
        yield "data: [DONE]\n\n"

      return StreamingResponse(gen(), media_type="text/event-stream")

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-llm
  namespace: openshift-lightspeed
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-llm
  template:
    metadata:
      labels:
        app: mock-llm
    spec:
      containers:
        - name: mock-llm
          image: "tiangolo/uvicorn-gunicorn-fastapi:python3.11"
          env:
            - name: MODULE_NAME
              value: "main"
            - name: VARIABLE_NAME
              value: "app"
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: app
              mountPath: /app/main.py
              subPath: main.py
      volumes:
        - name: app
          configMap:
            name: mock-llm-app

---
apiVersion: v1
kind: Service
metadata:
  name: mock-llm
  namespace: openshift-lightspeed
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  selector:
    app: mock-llm
  ports:
    - name: http
      port: 8080
      targetPort: 80
