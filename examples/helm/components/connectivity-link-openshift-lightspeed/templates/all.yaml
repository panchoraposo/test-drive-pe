##
## LLM credentials for OLS provider
##
apiVersion: v1
kind: Secret
metadata:
  name: llm-credentials
  namespace: openshift-lightspeed
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
stringData:
  apitoken: {{ .Values.llmApiKey | default "sk-no-key" | quote }}
---
##
## RHDH MCP auth token for OLS → Developer Hub MCP integration
##
apiVersion: v1
kind: Secret
metadata:
  name: rhdh-mcp-token
  namespace: openshift-lightspeed
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
stringData:
  header: "Bearer {{ .Values.rhdhBackendSecret | default "a01bb6ee68d5afbd9e82402b1a37a73d900bc653d6dc2375dec06bce6d62f34d" }}"
---
##
## OLSConfig — LiteLLM + MCP servers for tool calling
##
apiVersion: ols.openshift.io/v1alpha1
kind: OLSConfig
metadata:
  name: cluster
  labels:
    app.kubernetes.io/part-of: connectivity-link-lightspeed
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  featureGates:
    - MCPServer
  llm:
    providers:
      - name: litellm
        type: openai
        url: {{ .Values.llmEndpoint | default "https://litellm-prod.apps.maas.redhatworkshops.io/v1" | quote }}
        credentialsSecretRef:
          name: llm-credentials
        models:
          - name: {{ .Values.llmModel | default "granite-3-2-8b-instruct" }}
  ols:
    defaultProvider: litellm
    defaultModel: {{ .Values.llmModel | default "granite-3-2-8b-instruct" }}
    logLevel: INFO
    querySystemPrompt: |
      You have MCP tool functions available. When the user asks about
      cluster resources or operations, you MUST call the appropriate tool.
      Do NOT suggest CLI commands — use tools instead.

      IMPORTANT: Tool names have NO underscores between prefix and name.

      Kubernetes tools (prefix k8s):
        k8spods_list, k8spods_list_in_namespace, k8spods_get,
        k8spods_log, k8spods_top, k8spods_run, k8spods_exec, k8spods_delete,
        k8sresources_list, k8sresources_get, k8sresources_create_or_update,
        k8sresources_delete, k8sresources_scale,
        k8snamespaces_list, k8sprojects_list,
        k8snodes_top, k8snodes_log, k8snodes_stats_summary,
        k8sevents_list,
        k8shelm_install, k8shelm_list, k8shelm_uninstall.

      OpenShift tools (prefix ocp, camelCase, no underscores):
        ocpcreateDeployment, ocpdeployDatabase, ocpcreateService,
        ocpcreateHpa, ocpcreateNetworkPolicy,
        ocpmonitorDeployments, ocpdetectResourceIssues,
        ocpcheckClusterHealth, ocpcheckNodeConditions,
        ocpcheckKubeletStatus, ocpcheckCrioStatus,
        ocpgetPerformanceMetrics, ocpanalyzeJournalctlPodErrors,
        ocpanalyzePodDisruptions,
        ocprunCpuStressTest, ocprunNetworkTest,
        ocprunStorageBenchmark, ocprunDatabaseBenchmark, ocprunKubeBurner.

      Developer Hub / Backstage tools (NO prefix, use exact names):
        fetch-template-metadata — list/search Software Templates
        fetch-catalog-entities — list/search catalog entities (Components, APIs, Systems)
        register-catalog-entities — register new entities from a URL
        unregister-catalog-entities — remove registered entities
        fetch-techdocs — list entities with TechDocs
        analyze-techdocs-coverage — documentation coverage stats
        retrieve-techdocs-content — get TechDocs content for an entity

      ArgoCD tools (prefix argo, 15 tools):
        argolist_applications — list all ArgoCD applications
        argolist_clusters — list registered clusters
        argoget_application — get details of a specific application
        argoget_application_resource_tree — get resource tree
        argoget_application_managed_resources — get managed resources (supports kind/namespace filters)
        argoget_application_workload_logs — get pod/workload logs
        argoget_application_events — get application events
        argoget_resource_events — get events for a managed resource
        argoget_resources — get manifests for managed resources
        argoget_resource_actions — list available actions on a resource
        argocreate_application — create new ArgoCD application
        argoupdate_application — update an existing application
        argodelete_application — delete an application
        argosync_application — trigger sync on an application
        argorun_resource_action — run an action on a managed resource (e.g. restart)

      CRITICAL: Use ONLY the exact tool names listed above. Never invent tool names.
    deployment:
      api:
        replicas: 1
      console:
        replicas: 1
      dataCollector: {}
      database:
        replicas: 1
      llamaStack: {}
      mcpServer: {}
    conversationCache:
      type: postgres
      postgres:
        maxConnections: 2000
        sharedBuffers: 256MB
    introspectionEnabled: false
    userDataCollection: {}
  mcpServers:
    - name: mcp-gateway
      url: "http://mcp-gateway-istio.mcp-system.svc.cluster.local:8080/mcp"
      timeout: 120
    - name: rhdh-catalog
      url: "http://backstage-developer-hub.developer-hub.svc.cluster.local/api/mcp-actions/v1"
      timeout: 120
      headers:
        - name: Authorization
          valueFrom:
            type: secret
            secretRef:
              name: rhdh-mcp-token

---
##
## Mock OpenAI-compatible LLM (workshop fallback)
## Used as upstream for the in-cluster LiteLLM proxy when no GPU-backed model is available.
##
apiVersion: v1
kind: ConfigMap
metadata:
  name: mock-llm-app
  namespace: openshift-lightspeed
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  server.py: |
    from __future__ import annotations

    import json
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer
    from typing import Any, Dict, List

    MODEL_ID = "qwen25-7b-instruct"

    PRESET_ANSWERS: Dict[str, str] = {
      "getting started with developer hub": (
        "Here’s a quick getting-started path in Red Hat Developer Hub:\n\n"
        "1) Explore the Catalog to discover existing components (services, APIs, systems).\n"
        "2) Use Software Templates to scaffold a new service (repo + CI/CD + manifests) and let Argo CD deploy it.\n"
        "3) Check the new component’s TechDocs and links (repo, pipelines, runtime).\n"
        "4) Use APIs to find published OpenAPI specs and consumption details.\n\n"
        "If you tell me what you want to build (backend/frontend), I’ll point you to the right template."
      ),
      "software templates": (
        "Software Templates in Developer Hub are scaffolder templates that automate creating a new service.\n\n"
        "Typical flow:\n"
        "- Pick a template (e.g. backend service)\n"
        "- Fill parameters (name, owner, runtime options)\n"
        "- The template creates a repo, pipelines, and GitOps config\n"
        "- Argo CD syncs and deploys to OpenShift\n\n"
        "Tip: Start in Create → Template, then follow the generated links (repo, pipeline run, Argo CD app)."
      ),
      "neuralbank platform": (
        "Neuralbank (workshop) is composed of:\n\n"
        "- Frontend (user-facing web app)\n"
        "- Backend (customer service API)\n"
        "- Keycloak (RHBK) for OIDC (interactive login for the pre-deployed stack)\n"
        "- Gateway + Kuadrant policies for API protection (API Key / OIDC) and rate limiting\n"
        "- Observability stack (metrics/traces/logs dashboards)\n\n"
        "The workshop demonstrates both auth patterns: OIDC for interactive users and API Key for M2M access."
      ),
      "ci/cd with tekton": (
        "CI/CD in this workshop uses Tekton pipelines triggered by repository changes.\n\n"
        "Typical steps:\n"
        "- Build and test the app\n"
        "- Build/push container image\n"
        "- Update deployment manifests (GitOps)\n"
        "- Argo CD syncs changes to the cluster\n\n"
        "To debug: check the PipelineRun logs and then confirm Argo CD shows the app as Healthy/Synced."
      ),
    }


    def _flatten_content(content: Any) -> str:
      if content is None:
        return ""
      if isinstance(content, str):
        return content
      if isinstance(content, dict):
        # OpenAI-style: {"type":"text","text":"..."}
        if isinstance(content.get("text"), str):
          return content["text"]
        return json.dumps(content, ensure_ascii=False)
      if isinstance(content, list):
        return "\n".join(_flatten_content(x) for x in content)
      return str(content)


    def _extract_user_text(messages: List[Dict[str, Any]]) -> str:
      for m in reversed(messages or []):
        if m.get("role") == "user":
          return _flatten_content(m.get("content"))
      return ""


    def _is_validation_prompt(messages: List[Dict[str, Any]]) -> bool:
      joined = "\n".join([_flatten_content(m.get("content")) for m in (messages or [])]).lower()
      return (
        # Be liberal here: the upstream shield prompt has changed across versions
        # (classification/classifying/classifier). We just need to detect that
        # this is a validity-check prompt and return the exact token expected.
        ("question classif" in joined)
        or ("determine if a user's question is related" in joined)
        or ("determine where or a user's question is related" in joined)
        or ("answer with allowed" in joined and "answer with rejected" in joined)
        or ("allowed" in joined and "rejected" in joined and "response:" in joined)
      )


    def _has_any_tool_result(messages: List[Dict[str, Any]]) -> bool:
      for m in reversed(messages or []):
        if m.get("role") in ("tool", "function"):
          return True
      return False


    def _tool_names(tools: Any) -> List[str]:
      out: List[str] = []
      if not isinstance(tools, list):
        return out
      for t in tools:
        if not isinstance(t, dict):
          continue
        fn = t.get("function")
        if isinstance(fn, dict) and isinstance(fn.get("name"), str):
          out.append(fn["name"])
      return out


    def _pick_tool(tools: Any, preferred: List[str]) -> str | None:
      names = set(_tool_names(tools))
      for n in preferred:
        if n in names:
          return n
      return None


    def _tool_by_name(tools: Any, name: str) -> Dict[str, Any] | None:
      if not isinstance(tools, list):
        return None
      for t in tools:
        if not isinstance(t, dict):
          continue
        fn = t.get("function")
        if isinstance(fn, dict) and fn.get("name") == name:
          return t
      return None


    def _args_for_tool(tools: Any, tool_name: str, desired: Dict[str, Any]) -> str:
      tool = _tool_by_name(tools, tool_name) or {}
      fn = tool.get("function") if isinstance(tool, dict) else {}
      params = fn.get("parameters") if isinstance(fn, dict) else None
      if not isinstance(params, dict):
        return json.dumps(desired, ensure_ascii=False)
      props = params.get("properties") if isinstance(params.get("properties"), dict) else {}
      required = params.get("required") if isinstance(params.get("required"), list) else []

      out: Dict[str, Any] = {}
      for k in props.keys():
        if k in desired and desired[k] is not None:
          out[k] = desired[k]

      # Best-effort: satisfy required keys with safe placeholders.
      for k in required:
        if k in out:
          continue
        schema = props.get(k) if isinstance(props, dict) else None
        t = schema.get("type") if isinstance(schema, dict) else None
        if k in desired and desired[k] is not None:
          out[k] = desired[k]
        elif t == "boolean":
          out[k] = False
        elif t == "array":
          out[k] = []
        elif t == "object":
          out[k] = {}
        else:
          out[k] = ""
      return json.dumps(out, ensure_ascii=False)


    def _completion(req: Dict[str, Any]) -> Dict[str, Any]:
      messages = req.get("messages") if isinstance(req.get("messages"), list) else []
      tools = req.get("tools")
      if _is_validation_prompt(messages):
        # The lightspeed_question_validity shield checks for the exact token
        # "ALLOWED" (uppercase). Any other output triggers a violation.
        return {"content": "ALLOWED"}

      # If the orchestrator already executed a tool, return a short final answer.
      if _has_any_tool_result(messages):
        return {"content": "Done. The requested operation has been executed."}

      user_text = _extract_user_text(messages)
      if not user_text:
        return {"content": "ok"}
      key = user_text.strip().lower()

      # Lightspeed preset buttons sometimes send the full question (not just the title).
      # Match by keywords/contains so the workshop "expected" answers show up.
      if "software template" in key or ("template" in key and "developer hub" in key):
        return {"content": PRESET_ANSWERS["software templates"]}
      if "getting started" in key or ("first step" in key and "developer hub" in key):
        return {"content": PRESET_ANSWERS["getting started with developer hub"]}
      if "tekton" in key or "ci/cd" in key or "cicd" in key:
        return {"content": PRESET_ANSWERS["ci/cd with tekton"]}

      # Avoid replying with the "Neuralbank Platform" summary for operational questions
      # like "show logs of neuralbank-backend" that happen to include the word "neuralbank".
      if ("neuralbank platform" in key) or (
        "neuralbank" in key and ("what components" in key or "components make up" in key)
      ):
        return {"content": PRESET_ANSWERS["neuralbank platform"]}

      # Common OpenShift Lightspeed console-style prompts in the workshop.
      if ("show me the logs" in key) or ("show logs" in key and "pod" in key):
        return {"content": (
          "To view pod logs in OpenShift:\n"
          "- Open the OpenShift Console → Observe → Logs\n"
          "- Select the project (namespace) where the pod runs\n"
          "- Pick the pod and container\n\n"
          "If you tell me the namespace and pod name, I can point you to the exact place to find it."
        )}
      if ("what events happened" in key) or ("events happened" in key) or ("show events" in key):
        return {"content": (
          "To view events in OpenShift:\n"
          "- Open the OpenShift Console → Observe → Events\n"
          "- Filter by the project (namespace)\n\n"
          "If you tell me the namespace (e.g. `user1-neuralbank`), I can tell you what to filter for."
        )}

      # Tool calling (MCP Gateway). If tools are present, emit OpenAI tool_calls.
      if tools:
        # Example: install Redis via Helm
        if ("install redis" in key and "helm" in key) or ("redis" in key and "helm" in key):
          tool_name = _pick_tool(tools, ["k8shelm_install", "k8shelm_install_in_namespace"])
          if tool_name:
            desired = {
              "name": "redis",
              "release": "redis",
              "releaseName": "redis",
              "chart": "redis",
              "chartRef": "oci://registry-1.docker.io/bitnamicharts/redis",
              "repo": "oci://registry-1.docker.io/bitnamicharts",
              "repoURL": "https://charts.bitnami.com/bitnami",
              "values": {"auth": {"enabled": False}},
              "valuesObject": {"auth": {"enabled": False}},
              "valuesYaml": "auth:\n  enabled: false\n",
            }
            return {
              "content": "",
              "tool_calls": [
                {
                  "id": "call_redis_helm_install",
                  "type": "function",
                  "function": {"name": tool_name, "arguments": _args_for_tool(tools, tool_name, desired)},
                }
              ],
            }

        # Example: deploy a Redis database via OpenShift helper tool
        if "deploy a redis database" in key or "deploy redis database" in key:
          tool_name = _pick_tool(tools, ["ocpdeployDatabase"])
          if tool_name:
            desired = {"databaseType": "redis", "name": "redis"}
            return {
              "content": "",
              "tool_calls": [
                {
                  "id": "call_ocp_deploy_redis",
                  "type": "function",
                  "function": {"name": tool_name, "arguments": _args_for_tool(tools, tool_name, desired)},
                }
              ],
            }

        # Other showroom examples
        if "check the cluster health" in key:
          tool_name = _pick_tool(tools, ["ocpcheckClusterHealth"])
          if tool_name:
            return {"content": "", "tool_calls": [{"id": "call_cluster_health", "type": "function", "function": {"name": tool_name, "arguments": "{}"}}]}

        if "pods with resource issues" in key or "resource issues" in key:
          tool_name = _pick_tool(tools, ["ocpdetectResourceIssues"])
          if tool_name:
            return {"content": "", "tool_calls": [{"id": "call_resource_issues", "type": "function", "function": {"name": tool_name, "arguments": "{}"}}]}

        if "horizontalpodautoscaler" in key or "hpa" in key:
          tool_name = _pick_tool(tools, ["ocpcreateHpa"])
          if tool_name:
            desired = {"name": "backend", "target": "backend"}
            return {
              "content": "",
              "tool_calls": [
                {"id": "call_create_hpa", "type": "function", "function": {"name": tool_name, "arguments": _args_for_tool(tools, tool_name, desired)}}
              ],
            }

        if "run a network test" in key or ("network test" in key and "between" in key):
          tool_name = _pick_tool(tools, ["ocprunNetworkTest"])
          if tool_name:
            return {
              "content": "",
              "tool_calls": [
                {"id": "call_network_test", "type": "function", "function": {"name": tool_name, "arguments": "{}"}}
              ],
            }

        if "monitor all deployments" in key:
          tool_name = _pick_tool(tools, ["ocpmonitorDeployments"])
          if tool_name:
            desired = {}
            return {
              "content": "",
              "tool_calls": [
                {"id": "call_monitor_deployments", "type": "function", "function": {"name": tool_name, "arguments": _args_for_tool(tools, tool_name, desired)}}
              ],
            }

      if key in PRESET_ANSWERS:
        return {"content": PRESET_ANSWERS[key]}
      return {"content": (
        "Lightspeed is running in workshop fallback mode (no external LLM configured).\n\n"
        f"You asked: {user_text}\n\n"
        "Tip: Ask about Developer Hub templates, catalog, Argo CD apps, or Kuadrant policies."
      )}


    class Handler(BaseHTTPRequestHandler):
      server_version = "mock-llm/1.0"

      def _send_json(self, code: int, payload: Any, content_type: str = "application/json"):
        body = json.dumps(payload, ensure_ascii=False).encode("utf-8")
        self.send_response(code)
        self.send_header("Content-Type", f"{content_type}; charset=utf-8")
        self.send_header("Content-Length", str(len(body)))
        self.end_headers()
        self.wfile.write(body)

      def _send_sse(self, chunks: List[Dict[str, Any]]):
        self.send_response(200)
        self.send_header("Content-Type", "text/event-stream; charset=utf-8")
        self.send_header("Cache-Control", "no-cache")
        self.end_headers()
        for obj in chunks:
          line = f"data: {json.dumps(obj, ensure_ascii=False)}\n\n".encode("utf-8")
          self.wfile.write(line)
          self.wfile.flush()
        self.wfile.write(b"data: [DONE]\n\n")
        self.wfile.flush()

      def do_GET(self):
        if self.path.rstrip("/") == "/v1/models":
          self._send_json(
            200,
            {
              "object": "list",
              "data": [{"id": MODEL_ID, "object": "model", "created": 0, "owned_by": "openai"}],
            },
          )
          return
        self._send_json(404, {"error": {"message": "not found", "code": 404}})

      def do_POST(self):
        if self.path.rstrip("/") != "/v1/chat/completions":
          self._send_json(404, {"error": {"message": "not found", "code": 404}})
          return

        length = int(self.headers.get("Content-Length", "0") or "0")
        raw = self.rfile.read(length) if length else b"{}"
        try:
          payload = json.loads(raw.decode("utf-8"))
        except Exception:
          self._send_json(400, {"error": {"message": "invalid json", "code": 400}})
          return

        messages = payload.get("messages") or []
        stream = bool(payload.get("stream"))
        resp = _completion(payload)
        content = resp.get("content", "")
        tool_calls = resp.get("tool_calls")
        model = payload.get("model") or MODEL_ID

        if not stream:
          msg: Dict[str, Any] = {"role": "assistant", "content": content}
          finish_reason = "stop"
          if tool_calls:
            msg["tool_calls"] = tool_calls
            finish_reason = "tool_calls"
          self._send_json(
            200,
            {
              "id": "chatcmpl-mock",
              "object": "chat.completion",
              "created": 0,
              "model": model,
              "choices": [
                {
                  "index": 0,
                  "message": msg,
                  "finish_reason": finish_reason,
                }
              ],
            },
          )
          return

        # Minimal OpenAI SSE stream chunks.
        chunks = []
        if tool_calls:
          tc0 = tool_calls[0]
          chunks.append(
            {
              "id": "chatcmpl-mock",
              "object": "chat.completion.chunk",
              "created": 0,
              "model": model,
              "choices": [
                {
                  "index": 0,
                  "delta": {
                    "role": "assistant",
                    "tool_calls": [
                      {
                        "index": 0,
                        "id": tc0.get("id"),
                        "type": "function",
                        "function": tc0.get("function"),
                      }
                    ],
                  },
                  "finish_reason": None,
                }
              ],
            }
          )
          chunks.append(
            {
              "id": "chatcmpl-mock",
              "object": "chat.completion.chunk",
              "created": 0,
              "model": model,
              "choices": [{"index": 0, "delta": {}, "finish_reason": "tool_calls"}],
            }
          )
        else:
          half = max(1, len(content) // 2)
          parts = [content[:half], content[half:]]
          for part in parts:
            chunks.append(
              {
                "id": "chatcmpl-mock",
                "object": "chat.completion.chunk",
                "created": 0,
                "model": model,
                "choices": [{"index": 0, "delta": {"content": part}, "finish_reason": None}],
              }
            )
          chunks.append(
            {
              "id": "chatcmpl-mock",
              "object": "chat.completion.chunk",
              "created": 0,
              "model": model,
              "choices": [{"index": 0, "delta": {}, "finish_reason": "stop"}],
            }
          )
        self._send_sse(chunks)

      def log_message(self, fmt: str, *args: Any) -> None:
        # Keep logs minimal (avoid dumping user content).
        return


    def main():
      server = ThreadingHTTPServer(("0.0.0.0", 8080), Handler)
      server.serve_forever()


    if __name__ == "__main__":
      main()

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-llm
  namespace: openshift-lightspeed
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-llm
  template:
    metadata:
      labels:
        app: mock-llm
    spec:
      containers:
        - name: mock-llm
          image: "python:3.13-alpine"
          command: ["python", "/app/server.py"]
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: app
              mountPath: /app/server.py
              subPath: server.py
      volumes:
        - name: app
          configMap:
            name: mock-llm-app

---
apiVersion: v1
kind: Service
metadata:
  name: mock-llm
  namespace: openshift-lightspeed
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  selector:
    app: mock-llm
  ports:
    - name: http
      port: 8080
      targetPort: 8080
