kind: ConfigMap
apiVersion: v1
metadata:
  name: llama-stack-config
  namespace: developer-hub
  labels:
    rhdh.redhat.com/ext-config-sync: 'true'
  annotations:
    rhdh.redhat.com/backstage-name: developer-hub
data:
  run.yaml: |
    version: '2'
    image_name: minimal-viable-llama-stack-configuration
    apis:
      - agents
      - datasetio
      - eval
      - inference
      - safety
      - scoring
      - telemetry
      - tool_runtime
      - vector_io
    benchmarks: []
    container_image: null
    datasets: []
    external_providers_dir: "/app-root/config/providers.d"
    inference_store:
      db_path: .llama/distributions/ollama/inference_store.db
      type: sqlite
    metadata_store:
      db_path: .llama/distributions/ollama/registry.db
      namespace: null
      type: sqlite
    models:
    - model_id: sentence-transformers/all-mpnet-base-v2
      metadata:
        embedding_dimension: 768
      model_type: embedding
      provider_id: sentence-transformers
      provider_model_id: "/app-root/embeddings_model"
    providers:
      agents:
      - config:
          persistence_store:
            db_path: .llama/distributions/ollama/agents_store.db
            namespace: null
            type: sqlite
          responses_store:
            db_path: .llama/distributions/ollama/responses_store.db
            type: sqlite
        provider_id: meta-reference
        provider_type: inline::meta-reference
      datasetio:
      - config:
          kvstore:
            db_path: .llama/distributions/ollama/huggingface_datasetio.db
            namespace: null
            type: sqlite
        provider_id: huggingface
        provider_type: remote::huggingface
      - config:
          kvstore:
            db_path: .llama/distributions/ollama/localfs_datasetio.db
            namespace: null
            type: sqlite
        provider_id: localfs
        provider_type: inline::localfs
      eval:
      - config:
          kvstore:
            db_path: .llama/distributions/ollama/meta_reference_eval.db
            namespace: null
            type: sqlite
        provider_id: meta-reference
        provider_type: inline::meta-reference
      inference:
        - provider_id: vllm
          provider_type: remote::vllm
          config:
            url: ${env.VLLM_URL}
            api_token: ${env.VLLM_API_KEY}
            max_tokens: ${env.VLLM_MAX_TOKENS:=4096}
            tls_verify: ${env.VLLM_TLS_VERIFY:=true}
        - provider_id: sentence-transformers
          provider_type: inline::sentence-transformers
          config: {}
      safety:
        - config:
            excluded_categories: []
          provider_id: llama-guard
          provider_type: inline::llama-guard
        - provider_id: lightspeed_question_validity
          provider_type: inline::lightspeed_question_validity
          config:
            model_id: ${env.VALIDATION_PROVIDER:=vllm}/${env.VALIDATION_MODEL_NAME}
            model_prompt: |-
              Instructions:
              You are a question classification tool. You are an expert in the following categories:
              - Backstage
              - Red Hat Developer Hub (RHDH)
              - Kubernetes
              - Openshift
              - CI/CD
              - GitOps
              - Pipelines
              - Tekton
              - Argo CD
              - Developer Portals
              - Deployments
              - Software Catalogs
              - Software Templates
              - Tech Docs
              - DevSpaces / Cloud IDEs
              - Application development for this workshop (backend/frontend, Java/Quarkus/Maven, Node.js/React)

              Your job is to determine if a user's question is related to the categories you are an expert in.
              If the question is related to those categories, or any features/workflows commonly used with them in this workshop, answer with ${allowed}.
              If the question is not related to your expert categories, answer with ${rejected}.
              You do not need to explain your answer.
              Below are some example questions:
              Example Question:
              Why is the sky blue?
              Example Response:
              ${rejected}
              Example Question:
              Can you help configure my cluster to automatically scale?
              Example Response:
              ${allowed}
              Example Question:
              How do I create or import an existing software template in Backstage?
              Example Response:
              ${allowed}
              Example Question:
              build a backend
              Example Response:
              ${allowed}
              Example Question:
              Write a poem about the ocean.
              Example Response:
              ${rejected}
              Question:
              ${message}
              Response:
            invalid_question_response: |-
              Hi, I'm the Red Hat Developer Hub Lightspeed assistant, I can help you with questions about Red Hat Developer Hub or Backstage.
              Please ensure your question is about these topics, and feel free to ask again!
      scoring:
      - config: {}
        provider_id: basic
        provider_type: inline::basic
      - config: {}
        provider_id: llm-as-judge
        provider_type: inline::llm-as-judge
      - config:
          openai_api_key: '********'
        provider_id: braintrust
        provider_type: inline::braintrust
      telemetry:
      - config:
          service_name: 'lightspeed-stack-telemetry'
          sinks: sqlite
          sqlite_db_path: .llama/distributions/ollama/trace_store.db
        provider_id: meta-reference
        provider_type: inline::meta-reference
      tool_runtime:
      - provider_id: rag-runtime
        provider_type: inline::rag-runtime
        config: {}
      vector_io:
      - config:
          kvstore:
            db_path: .llama/distributions/ollama/faiss_store.db
            namespace: null
            type: sqlite
        provider_id: faiss
        provider_type: inline::faiss
      - provider_id: rhdh-docs
        provider_type: inline::faiss
        config:
          kvstore:
            type: sqlite
            namespace:
            db_path: /app-root/vector_db/rhdh_product_docs/1.8/faiss_store.db
    scoring_fns: []
    server:
      auth: null
      host: null
      port: 8321
      quota: null
      tls_cafile: null
      tls_certfile: null
      tls_keyfile: null
    shields:
      - shield_id: lightspeed_question_validity-shield
        provider_id: lightspeed_question_validity
    tool_groups:
    - provider_id: rag-runtime
      toolgroup_id: builtin::rag
      description: "Only use for questions specifically about Red Hat Developer Hub (RHDH). Searches technical documentation for RHDH installation, discovery, configuration, release, upgrade, control access, integration, observability, and extending with plugins. Do not use for any other topic outside RHDH."
    vector_dbs:
    - embedding_dimension: 768
      embedding_model: sentence-transformers/all-mpnet-base-v2
      provider_id: rhdh-docs
      vector_db_id: rhdh-product-docs-1_8
---
# Bootstrap ArgoCD credentials so Backstage can start even on greenfield installs.
# The PostSync hook job updates this secret when the OpenShift GitOps admin password is available.
apiVersion: v1
kind: Secret
metadata:
  name: rhdh-argocd-credentials
  namespace: developer-hub
  labels:
    rhdh.redhat.com/ext-config-sync: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "0"
type: Opaque
stringData:
  # Placeholder to avoid CreateContainerConfigError if the ArgoCD password sync hook cannot run.
  ARGOCD_INSTANCE_2_PASSWORD: "placeholder"
---
apiVersion: rhdh.redhat.com/v1alpha5
kind: Backstage
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  name: developer-hub
  namespace: developer-hub
spec:
  application:
    appConfig:
      configMaps:
      - name: app-config-rhdh
      - name: lightspeed-app-config
      mountPath: /opt/app-root/src
    dynamicPluginsConfigMapName: dynamic-plugins-rhdh
    extraEnvs:
      secrets:
      - name: secrets-rhdh
      - name: rhdh-argocd-credentials
      - name: llama-stack-secrets
      - name: lightspeed-secrets
      - key: token
        name: developer-hub-k8s-sa-token
    extraFiles:
      configMaps:
      - name: rhdh-rbac-policy
      mountPath: /opt/app-root/src
    route:
      enabled: true
  database:
    enableLocalDb: true
  deployment:
    patch:
      spec:
        template:
          spec:
            automountServiceAccountToken: true
            volumes:
              - name: dynamic-plugins-root
                ephemeral:
                  volumeClaimTemplate:
                    spec:
                      accessModes:
                        - ReadWriteOnce
                      resources:
                        requests:
                          storage: 4Gi
              - name: lightspeed-stack
                configMap:
                  name: lightspeed-stack
              - name: lightspeed-core-sitecustomize
                configMap:
                  name: lightspeed-core-sitecustomize
              - name: llama-stack-config
                configMap:
                  name: llama-stack-config
              # lightspeed-core's llama-stack config expects an external providers directory.
              # Some images/configurations reference `/app-root/providers.d`; mount an empty dir
              # to guarantee the path exists and avoid startup FileNotFoundError.
              - name: lightspeed-external-providers
                emptyDir: {}
              - name: shared-storage
                emptyDir: {}
              - name: rag-data-volume
                emptyDir: {}
            initContainers:
              - name: init-rag-data
                image: "quay.io/redhat-ai-dev/rag-content:release-1.8-lcs"
                command:
                  - "sh"
                  - "-c"
                  - "echo 'Copying RAG data...'; cp -r /rag/vector_db/rhdh_product_docs /data/ && cp -r /rag/embeddings_model /data/ && echo 'Copy complete.'"
                volumeMounts:
                  - mountPath: /data
                    name: rag-data-volume
            containers:
              - name: backstage-backend
                env:
                  - name: NODE_TLS_REJECT_UNAUTHORIZED
                    value: "0"
              - name: llama-stack
                image: "quay.io/redhat-ai-dev/llama-stack:0.1.1"
                envFrom:
                  - secretRef:
                      name: llama-stack-secrets
                volumeMounts:
                  - mountPath: /app-root/.llama
                    name: shared-storage
                  - mountPath: /app-root/embeddings_model
                    name: rag-data-volume
                    subPath: embeddings_model
                  - mountPath: /app-root/vector_db/rhdh_product_docs
                    name: rag-data-volume
                    subPath: rhdh_product_docs
                  - mountPath: /app-root/config/run.yaml
                    name: llama-stack-config
                    subPath: run.yaml
              - name: lightspeed-core
                image: "quay.io/lightspeed-core/lightspeed-stack:dev-20251021-ee9f08f"
                volumeMounts:
                  - mountPath: /app-root/lightspeed-stack.yaml
                    name: lightspeed-stack
                    subPath: lightspeed-stack.yaml
                  - mountPath: /app-root/src/sitecustomize.py
                    name: lightspeed-core-sitecustomize
                    subPath: sitecustomize.py
                  - mountPath: /app-root/providers.d
                    name: lightspeed-external-providers
                  - mountPath: /tmp/data
                    name: shared-storage
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rhdh-argocd-secret-reader
  annotations:
    argocd.argoproj.io/sync-wave: "0"
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "create", "update", "patch"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rhdh-argocd-secret-reader-binding
  annotations:
    argocd.argoproj.io/sync-wave: "0"
subjects:
- kind: ServiceAccount
  name: rhdh-argocd-sync
  namespace: developer-hub
roleRef:
  kind: ClusterRole
  name: rhdh-argocd-secret-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rhdh-argocd-sync
  namespace: developer-hub
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: rhdh-argocd-password-sync
  namespace: developer-hub
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 5
  template:
    spec:
      serviceAccountName: rhdh-argocd-sync
      restartPolicy: OnFailure
      containers:
      - name: sync
        image: registry.redhat.io/openshift4/ose-cli:latest
        command:
        - /bin/bash
        - -c
        - |
          set -euo pipefail
          echo "Syncing ArgoCD credentials for Developer Hub (best-effort)..."

          # New environments may not have OpenShift GitOps installed, may use a different namespace,
          # or may not expose the default admin secret. Do not fail the whole Developer Hub sync
          # if we can't read it; the ArgoCD plugin can still start (but ArgoCD features may be limited).
          ARGOCD_PWD=""
          for NS in openshift-gitops; do
            for SECRET in openshift-gitops-cluster argocd-cluster; do
              if oc get secret "$SECRET" -n "$NS" &>/dev/null; then
                ARGOCD_PWD=$(oc get secret "$SECRET" -n "$NS" -o jsonpath='{.data.admin\.password}' 2>/dev/null | base64 -d 2>/dev/null || true)
                if [ -n "$ARGOCD_PWD" ]; then
                  echo "Read ArgoCD admin password from ${NS}/${SECRET}"
                  break 2
                fi
              fi
            done
          done

          if [ -z "$ARGOCD_PWD" ]; then
            echo "WARNING: Could not read ArgoCD admin password (skipping rhdh-argocd-credentials update)."
            exit 0
          fi

          CURRENT=$(oc get secret rhdh-argocd-credentials -n developer-hub -o jsonpath='{.data.ARGOCD_INSTANCE_2_PASSWORD}' 2>/dev/null | base64 -d 2>/dev/null)
          if [ "$CURRENT" = "$ARGOCD_PWD" ]; then
            echo "ArgoCD password already up to date"
            exit 0
          fi

          echo "Creating/updating rhdh-argocd-credentials secret..."
          cat <<EOSECRET | oc apply -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: rhdh-argocd-credentials
            namespace: developer-hub
            labels:
              rhdh.redhat.com/ext-config-sync: "true"
          type: Opaque
          stringData:
            ARGOCD_INSTANCE_2_PASSWORD: "$ARGOCD_PWD"
          EOSECRET

          echo "Restarting Developer Hub to pick up new password..."
          oc rollout restart deployment/backstage-developer-hub -n developer-hub
          echo "ArgoCD password synced successfully"
---
apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/hook: PostSync
  name: rhdh-welcome-notification
  namespace: developer-hub
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: notify
        image: registry.redhat.io/openshift4/ose-cli:latest
        env:
        - name: BACKEND_SECRET
          valueFrom:
            secretKeyRef:
              name: secrets-rhdh
              key: BACKEND_SECRET
        - name: CLUSTER_DOMAIN
          value: "{{ .Values.clusterDomain }}"
        command:
        - /bin/bash
        - -c
        - |
          RHDH_URL="https://backstage-developer-hub-developer-hub.${CLUSTER_DOMAIN}"
          MAILPIT_URL="https://n8n-mailpit-openshift-lightspeed.${CLUSTER_DOMAIN}"

          echo "Waiting for Developer Hub to be ready..."
          for i in $(seq 1 60); do
            STATUS=$(curl -sk -o /dev/null -w '%{http_code}' "${RHDH_URL}/api/notifications" \
              -H "X-Backstage-Backend-Secret: ${BACKEND_SECRET}")
            if [ "$STATUS" = "200" ]; then
              echo "Developer Hub notifications API is ready"
              break
            fi
            echo "Attempt $i: HTTP $STATUS, retrying in 10s..."
            sleep 10
          done

          echo "Sending welcome notification..."
          curl -sk -X POST "${RHDH_URL}/api/notifications" \
            -H "X-Backstage-Backend-Secret: ${BACKEND_SECRET}" \
            -H "Content-Type: application/json" \
            -d "{
              \"recipients\": {\"type\": \"broadcast\"},
              \"payload\": {
                \"title\": \"Workshop Email Notifications\",
                \"description\": \"Your workshop email inbox is ready. Click to view notifications sent by Developer Hub scaffolder templates, pipeline results, and system alerts.\",
                \"link\": \"${MAILPIT_URL}\",
                \"severity\": \"normal\",
                \"topic\": \"workshop-mailpit\"
              }
            }"

          echo ""
          echo "Notification sent successfully"
