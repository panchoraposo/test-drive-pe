apiVersion: v1
data:
  app-config-rhdh.yaml: |
    app:
      title: Developer Hub
      baseUrl: "${RHDH_BASE_URL}"
    workshop:
      clusterDomain: {{ .Values.clusterDomain }}
    integrations:
      gitea:
        - host: gitea-gitea.{{ .Values.clusterDomain }}
          baseUrl: https://gitea-gitea.{{ .Values.clusterDomain }}
          apiBaseUrl: https://gitea-gitea.{{ .Values.clusterDomain }}/api/v1
          username: gitea_admin
          password: "openshift"
        # Templates use repoUrl host "gitea-gitea" (not the apps.* host above). API + git push
        # + publish:gitea availability polling (baseUrl/src/branch, up to 20s) use this entry.
        # catalog:register and output links in templates still use the external HTTPS URLs.
        - host: gitea-gitea
          baseUrl: http://gitea-http.gitea.svc.cluster.local:3000
          apiBaseUrl: http://gitea-http.gitea.svc.cluster.local:3000/api/v1
          username: gitea_admin
          password: "openshift"
    auth:
      environment: production
      session:
        secret: "${BACKEND_SECRET}"
      providers:
        oidc:
          production:
            metadataUrl: "${KEYCLOAK_METADATA_URL}"
            clientId: "${KEYCLOAK_CLIENT_ID}"
            clientSecret: "${KEYCLOAK_CLIENT_SECRET}"
            callbackUrl: "${RHDH_CALLBACK_URL}"
            prompt: auto
            signIn:
              resolvers:
                - resolver: preferredUsernameMatchingUserEntityName
                - resolver: emailMatchingUserEntityProfileEmail
    backend:
      actions:
        pluginSources:
          - 'software-catalog-mcp-tool'
          - 'techdocs-mcp-tool'
      auth:
        externalAccess:
          - type: static
            options:
              token: ${BACKEND_SECRET}
              subject: admin-curl-access
          - type: static
            options:
              token: ${MCP_TOKEN}
              subject: mcp-clients
            accessRestrictions:
              - plugin: mcp-actions
              - plugin: catalog
      baseUrl: "${RHDH_BASE_URL}"
      cors:
        origin: "${RHDH_BASE_URL}"
      csp:
        upgrade-insecure-requests: false
        frame-ancestors:
          - "'self'"
          - "https://*.{{ .Values.clusterDomain }}"
        img-src:
          - "'self'"
          - "data:"
          - https://img.shields.io
      reading:
        allow:
          - host: github.com
          - host: raw.githubusercontent.com
          - host: gitea-gitea.{{ .Values.clusterDomain }}
          - host: gitea-http.gitea.svc.cluster.local:3000
    signInPage: oidc
    scaffolder:
      # Backstage scaffolder defaults (available as environment.parameters.*).
      # We keep defaultValues too for compatibility with older scaffolder configs.
      defaultEnvironment:
        parameters:
          clusterDomain: {{ .Values.clusterDomain }}
      defaultValues:
        clusterDomain: {{ .Values.clusterDomain }}
    catalog:
      providers:
        keycloakOrg:
          default:
            baseUrl: "${KEYCLOAK_BASE_URL}"
            loginRealm: "${KEYCLOAK_REALM}"
            realm: "${KEYCLOAK_REALM}"
            clientId: "${KEYCLOAK_CLIENT_ID}"
            clientSecret: "${KEYCLOAK_CLIENT_SECRET}"
            userQuerySize: 500
            groupQuerySize: 250
            schedule:
              frequency: { minutes: 1 }
              timeout: { minutes: 5 }
              initialDelay: { seconds: 15 }
      locations:
        - type: url
          target: https://github.com/panchoraposo/test-drive-pe/blob/{{ .Values.gitopsRevision }}/examples/helm/software-templates/templates-catalog.yaml
        - type: url
          target: https://github.com/panchoraposo/test-drive-pe/blob/{{ .Values.gitopsRevision }}/examples/helm/components/connectivity-link-neuralbank-stack/catalog-info.yaml
        - type: url
          target: https://github.com/panchoraposo/test-drive-pe/blob/{{ .Values.gitopsRevision }}/examples/helm/components/connectivity-link-observability/catalog-info.yaml
        - type: url
          target: https://github.com/panchoraposo/test-drive-pe/blob/{{ .Values.gitopsRevision }}/examples/helm/components/connectivity-link-mailpit/catalog-info.yaml
        - type: url
          target: https://github.com/panchoraposo/test-drive-pe/blob/{{ .Values.gitopsRevision }}/examples/helm/components/connectivity-link-developer-hub/catalog/platform-engineering-group.yaml
      rules:
        - allow: [Component, Group, User, Resource, Location, Template, API, APIProduct, System, Domain]
    techdocs:
      builder: local
      generator:
        runIn: local
      publisher:
        type: local
    proxy:
      endpoints:
        '/gitea':
          target: "http://gitea-http.gitea.svc.cluster.local:3000/api/v1"
          changeOrigin: true
          allowedMethods: ['GET', 'POST', 'PUT', 'DELETE']
          headers:
            Authorization: "Basic Z2l0ZWFfYWRtaW46b3BlbnNoaWZ0"
        '/mailpit':
          target: "http://n8n-mailpit.openshift-lightspeed.svc:8025"
          changeOrigin: true
          allowedMethods: ['GET', 'POST']
          credentials: dangerously-allow-unauthenticated
        '/k8s-api':
          target: "https://kubernetes.default.svc"
          changeOrigin: true
          secure: false
          allowedMethods: ['GET', 'POST', 'PUT', 'PATCH', 'DELETE']
          headers:
            Authorization: "Bearer ${token}"
    argocd:
      appLocatorMethods:
        - type: 'config'
          instances:
            - name: openshift-gitops
              url: ${ARGOCD_INSTANCE_2_URL}
              username: ${ARGOCD_INSTANCE_2_USERNAME}
              password: ${ARGOCD_INSTANCE_2_PASSWORD}
    kubernetes:
      serviceLocatorMethod:
        type: 'multiTenant'
      clusterLocatorMethods:
        - type: 'config'
          clusters:
            - url: 'https://kubernetes.default.svc'
              name: 'local'
              authProvider: 'serviceAccount'
              serviceAccountToken: ${token}
              skipTLSVerify: true
              skipMetricsLookup: true
      customResources:
        - group: 'tekton.dev'
          apiVersion: 'v1'
          plural: 'pipelineruns'
        - group: 'tekton.dev'
          apiVersion: 'v1'
          plural: 'taskruns'
        - group: 'route.openshift.io'
          apiVersion: 'v1'
          plural: 'routes'
    notifications:
      processors:
        email:
          transportConfig:
            transport: smtp
            hostname: n8n-mailpit.openshift-lightspeed.svc
            port: 1025
            secure: false
          sender: "devhub@neuralbank.io"
          replyTo: "noreply@neuralbank.io"
          broadcastConfig:
            receiver: none
          cache:
            ttl: { minutes: 30 }
    permission:
      enabled: true
      rbac:
        policies-csv-file: /opt/app-root/src/rbac-policy.csv
        policyFileReload: true
        admin:
          users:
            - name: user:default/maximilianopizarro
            - name: user:default/platformadmin
    enabled:
      kubernetes: true
      techdocs: true
      argocd: true
      sonarqube: false
      keycloak: true
      ocm: false
      gitlab: false
      github: false
      gitlabOrg: false
      jenkins: false
      permission: false
      kuadrant: true
kind: ConfigMap
metadata:
  annotations:
    rhdh.redhat.com/backstage-name: developer-hub
  labels:
    rhdh.redhat.com/ext-config-sync: "true"
  name: app-config-rhdh
  namespace: developer-hub
---
apiVersion: v1
data:
  dynamic-plugins.yaml: |
    includes:
      - dynamic-plugins.default.yaml
    plugins:
      - package: ./dynamic-plugins/dist/backstage-community-plugin-rbac
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-community-plugin-catalog-backend-module-keycloak-dynamic
        disabled: false
      - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-plugin-kubernetes-backend:bs_1.42.5__0.20.1!backstage-plugin-kubernetes-backend
        disabled: false
      - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-plugin-scaffolder-backend-module-gitea:bs_1.45.3__0.2.15!backstage-plugin-scaffolder-backend-module-gitea
        disabled: false
      # RHDH 1.10 (Backstage 1.49.4): use OCI artifact for Tekton.
      # The container image may not include the bundled wrapper path.
      - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-tekton:bs_1.49.4__3.37.0!backstage-community-plugin-tekton
        pluginConfig:
          dynamicPlugins:
            frontend:
              backstage-community.plugin-tekton:
                mountPoints:
                  - mountPoint: entity.page.ci/cards
                    importName: TektonCI
                    config:
                      layout:
                        gridColumn: "1 / -1"
                        gridRowStart: 1
                      if:
                        allOf:
                          - isTektonCIAvailable
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-community-plugin-topology
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-plugin-kubernetes
        disabled: false
        pluginConfig:
          dynamicPlugins:
            frontend:
              backstage.plugin-kubernetes:
                mountPoints:
                  - mountPoint: entity.page.kubernetes/cards
                    importName: EntityKubernetesContent
                    config:
                      layout:
                        gridColumn: "1 / -1"
                      if:
                        anyOf:
                          - hasAnnotation: backstage.io/kubernetes-id
                          - hasAnnotation: backstage.io/kubernetes-namespace
      - package: ./dynamic-plugins/dist/roadiehq-scaffolder-backend-module-http-request-dynamic
        disabled: false
      # RHDH 1.10 (Backstage 1.49.4): do not rely on the bundled wrapper path for ArgoCD backend.
      # Some RHDH images no longer ship `./dynamic-plugins/dist/roadiehq-backstage-plugin-argo-cd-backend-dynamic`,
      # which causes the `install-dynamic-plugins` initContainer to fail with ENOENT on `package.json`.
      - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-argocd-backend:bs_1.49.4__1.4.0!backstage-community-plugin-argocd-backend
        disabled: false
      - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-argocd:bs_1.49.4__2.8.0!backstage-community-plugin-argocd
        disabled: false
        pluginConfig:
          dynamicPlugins:
            frontend:
              backstage-community.plugin-argocd:
                mountPoints:
                  - mountPoint: entity.page.overview/cards
                    importName: ArgocdDeploymentSummary
                    config:
                      layout:
                        gridColumnEnd:
                          lg: "span 8"
                          xs: "span 12"
                      if:
                        anyOf:
                          - hasAnnotation: argocd/app-name
                          - hasAnnotation: argocd/app-selector
                  - mountPoint: entity.page.cd/cards
                    importName: ArgocdDeploymentLifecycle
                    config:
                      layout:
                        gridColumn: "1 / -1"
                      if:
                        anyOf:
                          - hasAnnotation: argocd/app-name
                          - hasAnnotation: argocd/app-selector
      - package: ./dynamic-plugins/dist/backstage-plugin-notifications
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-plugin-notifications-backend-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-plugin-notifications-backend-module-email-dynamic
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-plugin-signals
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-plugin-signals-backend-dynamic
        disabled: false
      - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-plugin-mcp-actions-backend:bs_1.45.3__0.1.5
        disabled: false
      - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-software-catalog-mcp-tool:bs_1.45.3__0.4.1
        disabled: false
      - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-techdocs-mcp-tool:bs_1.45.3__0.3.2
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-community-plugin-tech-radar
        disabled: false
      - package: ./dynamic-plugins/dist/backstage-community-plugin-catalog-backend-module-scaffolder-relation-processor-dynamic
        disabled: false
      - package: "@kuadrant/kuadrant-backstage-plugin-backend-dynamic@v0.1.0"
        disabled: false
        integrity: sha512-+iz5a/38ZB/phehlHMcbM79S/bMZwslcxi+lnG5Tb2InlWtumloFK7OzZk11s0/CjJPytF3CipOz4QpFHQ09qw==
      - package: "@kuadrant/kuadrant-backstage-plugin-frontend@v0.1.0"
        disabled: false
        integrity: sha512-3RLpjskJX4UqUQrc3gqg2TJL60cRKT+4mpnHH5OTi8leUxHgbyx2RnOmdRXivgXB1DwHK/oY7BsnPPft4Up2NQ==
        pluginConfig:
          dynamicPlugins:
            frontend:
              internal.plugin-kuadrant:
                appIcons:
                  - name: kuadrantIcon
                    importName: KuadrantIcon
                dynamicRoutes:
                  - path: /kuadrant
                    importName: KuadrantPage
                    menuItem:
                      icon: kuadrantIcon
                      text: Kuadrant
                  - path: /kuadrant/api-products/:namespace/:name
                    importName: ApiProductDetailPage
                  - path: /kuadrant/api-keys/:namespace/:name
                    importName: ApiKeyDetailPage
                mountPoints:
                  - mountPoint: entity.page.api/cards
                    importName: EntityKuadrantApiKeyManagementTab
                    config:
                      layout:
                        gridColumn: "1 / -1"
                      if:
                        allOf:
                          - isKind: api
                  - mountPoint: entity.page.api/cards
                    importName: EntityKuadrantApiProductInfoContent
                    config:
                      layout:
                        gridColumn: "1 / -1"
                      if:
                        allOf:
                          - isKind: api
      - package: ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-dynamic-home-page
        disabled: false
        pluginConfig:
          dynamicPlugins:
            frontend:
              red-hat-developer-hub.backstage-plugin-dynamic-home-page:
                dynamicRoutes:
                  - path: /
                    importName: DynamicHomePage
                    config:
                      props:
                        title: 'Welcome back, {{`{{firstName}}`}}!'
                mountPoints:
                  - mountPoint: home.page/cards
                    importName: SearchBar
                    config:
                      layouts:
                        xl: { w: 10, h: 1, x: 1 }
                        lg: { w: 10, h: 1, x: 1 }
                        md: { w: 10, h: 1, x: 1 }
                        sm: { w: 10, h: 1, x: 1 }
                        xs: { w: 12, h: 1 }
                        xxs: { w: 12, h: 1 }
                  - mountPoint: home.page/cards
                    importName: MarkdownCard
                    config:
                      layouts:
                        xl: { w: 4, h: 8 }
                        lg: { w: 4, h: 8 }
                        md: { w: 6, h: 8 }
                        sm: { w: 12, h: 6 }
                        xs: { w: 12, h: 6 }
                        xxs: { w: 12, h: 6 }
                      props:
                        title: "Workshop Platform"
                        content: |
                          * [ArgoCD (GitOps)](https://openshift-gitops-server-openshift-gitops.{{ .Values.clusterDomain }}) — Continuous Delivery
                          * [Gitea](https://gitea-gitea.{{ .Values.clusterDomain }}) — Source Code Repos
                          * [Keycloak](https://rhbk.{{ .Values.clusterDomain }}/admin/master/console) — Identity & SSO
                          * [Workshop Registration](https://workshop-registration.{{ .Values.clusterDomain }}) — Sign-up Portal
                          * [Mailpit](https://n8n-mailpit-openshift-lightspeed.{{ .Values.clusterDomain }}) — Email Testing
                          * [OpenShift Console](https://console-openshift-console.{{ .Values.clusterDomain }}) — Cluster Console
                  - mountPoint: home.page/cards
                    importName: MarkdownCard
                    config:
                      layouts:
                        xl: { w: 4, h: 8, x: 4 }
                        lg: { w: 4, h: 8, x: 4 }
                        md: { w: 6, h: 8, x: 6 }
                        sm: { w: 12, h: 6 }
                        xs: { w: 12, h: 6 }
                        xxs: { w: 12, h: 6 }
                      props:
                        title: "Observability"
                        content: |
                          * [Grafana](https://grafana-observability.{{ .Values.clusterDomain }}) — Monitoring Dashboards
                          * [Kiali](https://kiali-openshift-cluster-observability-operator.{{ .Values.clusterDomain }}) — Service Mesh
                          * [Jaeger](https://jaeger.{{ .Values.clusterDomain }}) — Distributed Tracing
                  - mountPoint: home.page/cards
                    importName: MarkdownCard
                    config:
                      layouts:
                        xl: { w: 4, h: 8, x: 8 }
                        lg: { w: 4, h: 8, x: 8 }
                        md: { w: 12, h: 6 }
                        sm: { w: 12, h: 6 }
                        xs: { w: 12, h: 6 }
                        xxs: { w: 12, h: 6 }
                      props:
                        title: "Documentation & AI"
                        content: |
                          * [Workshop Guide](https://showroom-from-zero-to-hero.{{ .Values.clusterDomain }}) — Showroom
