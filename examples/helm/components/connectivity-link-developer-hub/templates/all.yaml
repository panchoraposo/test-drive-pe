  VLLM_TLS_VERIFY: "false"
  VALIDATION_PROVIDER: "vllm"
  VALIDATION_MODEL_NAME: {{ .Values.litellmModel | default "qwen25-7b-instruct" | quote }}
  MCP_TOKEN: "backstage"
