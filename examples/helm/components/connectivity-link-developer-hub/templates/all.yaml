        user: lightspeed_user
        password: lightspeed_password_123
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lightspeed-core-sitecustomize
  namespace: developer-hub
data:
  sitecustomize.py: |
    from __future__ import annotations

    from importlib.machinery import PathFinder
    import importlib.abc
    import sys

    TARGET = "app.endpoints.streaming_query"


    class _PatchLoader(importlib.abc.Loader):
      def __init__(self, wrapped):
        self._wrapped = wrapped

      def create_module(self, spec):
        if hasattr(self._wrapped, "create_module"):
          return self._wrapped.create_module(spec)  # type: ignore[attr-defined]
        return None

      def exec_module(self, module):
        self._wrapped.exec_module(module)  # type: ignore[attr-defined]

        def _handle_shield_event(chunk, chunk_id, media_type="application/json"):
          # Keep validation behavior, but don't stream verdict tokens ("No Violation"/"Violation")
          # into the chat output.
          try:
            if getattr(chunk.event.payload, "event_type", None) == "step_complete":
              violation = chunk.event.payload.step_details.violation
              if violation:
                try:
                  module.metrics.llm_calls_validation_errors_total.inc()
                except Exception:
                  pass
          except Exception:
            pass
          return iter(())

        module._handle_shield_event = _handle_shield_event


    class _PatchFinder(importlib.abc.MetaPathFinder):
      def find_spec(self, fullname, path, target=None):
        if fullname != TARGET:
          return None
        spec = PathFinder.find_spec(fullname, path)
        if spec and spec.loader:
          spec.loader = _PatchLoader(spec.loader)
        return spec


    sys.meta_path.insert(0, _PatchFinder())
