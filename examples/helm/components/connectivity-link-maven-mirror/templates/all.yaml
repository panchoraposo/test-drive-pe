apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.mavenMirror.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    purpose: maven-cache
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.mavenMirror.name }}-nginx
  namespace: {{ .Values.mavenMirror.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
data:
  nginx.conf: |
    worker_processes auto;
    error_log  /dev/stdout info;
    pid        /tmp/nginx.pid;

    events { worker_connections  1024; }

    http {
      include       /etc/nginx/mime.types;
      default_type  application/octet-stream;
      access_log    off;
      sendfile      on;

      # Cache to writable /tmp (ephemeral).
      proxy_cache_path /tmp/nginx-cache levels=1:2 keys_zone=mavencache:50m max_size=10g inactive=24h use_temp_path=off;

      server {
        listen 8080;

        # Central: https://repo.maven.apache.org/maven2/
        location /central/ {
          proxy_ssl_server_name on;
          proxy_set_header Host repo.maven.apache.org;
          proxy_http_version 1.1;
          proxy_set_header Connection "";
          proxy_cache mavencache;
          proxy_cache_lock on;
          proxy_cache_background_update on;
          proxy_cache_use_stale updating error timeout http_500 http_502 http_503 http_504;
          proxy_cache_valid 200 302 24h;
          proxy_cache_valid 404 5m;
          add_header X-Cache-Status $upstream_cache_status always;
          proxy_pass https://repo.maven.apache.org/maven2/;
        }

        # Red Hat GA: https://maven.repository.redhat.com/ga/
        location /ga/ {
          proxy_ssl_server_name on;
          proxy_set_header Host maven.repository.redhat.com;
          proxy_http_version 1.1;
          proxy_set_header Connection "";
          proxy_cache mavencache;
          proxy_cache_lock on;
          proxy_cache_background_update on;
          proxy_cache_use_stale updating error timeout http_500 http_502 http_503 http_504;
          proxy_cache_valid 200 302 24h;
          proxy_cache_valid 404 5m;
          add_header X-Cache-Status $upstream_cache_status always;
          proxy_pass https://maven.repository.redhat.com/ga/;
        }

        location = / {
          return 200 "Maven mirror is running.\n- /central/ -> Maven Central\n- /ga/ -> Red Hat GA\n";
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.mavenMirror.name }}
  namespace: {{ .Values.mavenMirror.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: {{ .Values.mavenMirror.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: {{ .Values.mavenMirror.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.mavenMirror.name }}
    spec:
      containers:
        - name: nginx
          image: {{ .Values.mavenMirror.image | quote }}
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
      volumes:
        - name: nginx-conf
          configMap:
            name: {{ .Values.mavenMirror.name }}-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.mavenMirror.name }}
  namespace: {{ .Values.mavenMirror.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  selector:
    app: {{ .Values.mavenMirror.name }}
  ports:
    - name: http
      port: 8080
      targetPort: http

