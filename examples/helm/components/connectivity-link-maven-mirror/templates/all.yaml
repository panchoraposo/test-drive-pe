apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.mavenMirror.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    purpose: maven-cache
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.mavenMirror.name }}-nginx
  namespace: {{ .Values.mavenMirror.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
data:
  nginx.conf: |
    worker_processes  1;
    error_log  /dev/stdout info;
    pid        /tmp/nginx.pid;

    events { worker_connections  1024; }

    http {
      include       /etc/nginx/mime.types;
      default_type  application/octet-stream;
      access_log    /dev/stdout;

      proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=mavencache:50m max_size=15g inactive=7d use_temp_path=off;

      server {
        listen 8080;

        # Central: https://repo.maven.apache.org/maven2/
        location /central/ {
          proxy_ssl_server_name on;
          proxy_set_header Host repo.maven.apache.org;
          proxy_http_version 1.1;
          proxy_set_header Connection "";
          proxy_cache mavencache;
          proxy_cache_lock on;
          proxy_cache_use_stale updating error timeout http_500 http_502 http_503 http_504;
          proxy_cache_valid 200 302 7d;
          proxy_cache_valid 404 10m;
          add_header X-Cache-Status $upstream_cache_status always;
          proxy_pass https://repo.maven.apache.org/maven2/;
        }

        # Red Hat GA: https://maven.repository.redhat.com/ga/
        location /ga/ {
          proxy_ssl_server_name on;
          proxy_set_header Host maven.repository.redhat.com;
          proxy_http_version 1.1;
          proxy_set_header Connection "";
          proxy_cache mavencache;
          proxy_cache_lock on;
          proxy_cache_use_stale updating error timeout http_500 http_502 http_503 http_504;
          proxy_cache_valid 200 302 7d;
          proxy_cache_valid 404 10m;
          add_header X-Cache-Status $upstream_cache_status always;
          proxy_pass https://maven.repository.redhat.com/ga/;
        }

        location = / {
          return 200 "Maven mirror is running.\n- /central/ -> Maven Central\n- /ga/ -> Red Hat GA\n";
        }
      }
    }
---
{{- if .Values.mavenMirror.cache.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.mavenMirror.name }}-cache
  namespace: {{ .Values.mavenMirror.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  accessModes:
    - ReadWriteMany
  {{- if .Values.mavenMirror.cache.storageClassName }}
  storageClassName: {{ .Values.mavenMirror.cache.storageClassName | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.mavenMirror.cache.size }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.mavenMirror.name }}
  namespace: {{ .Values.mavenMirror.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: {{ .Values.mavenMirror.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: {{ .Values.mavenMirror.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.mavenMirror.name }}
    spec:
      containers:
        - name: nginx
          image: {{ .Values.mavenMirror.image | quote }}
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: cache
              mountPath: /var/cache/nginx
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: nginx-conf
          configMap:
            name: {{ .Values.mavenMirror.name }}-nginx
        - name: cache
          {{- if .Values.mavenMirror.cache.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.mavenMirror.name }}-cache
          {{- else }}
          emptyDir: {}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.mavenMirror.name }}
  namespace: {{ .Values.mavenMirror.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  selector:
    app: {{ .Values.mavenMirror.name }}
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ .Values.mavenMirror.name }}
  namespace: {{ .Values.mavenMirror.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  host: {{ .Values.mavenMirror.name }}.{{ .Values.clusterDomain }}
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  to:
    kind: Service
    name: {{ .Values.mavenMirror.name }}
    weight: 100
  wildcardPolicy: None
