apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.mavenMirror.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    purpose: maven-cache
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.mavenMirror.name }}-nginx
  namespace: {{ .Values.mavenMirror.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
data:
  nginx.conf: |
    worker_processes  1;
    error_log  /dev/stdout info;
    pid        /tmp/nginx.pid;

    events { worker_connections  1024; }

    http {
      include       /etc/nginx/mime.types;
      default_type  application/octet-stream;
      access_log    /dev/stdout;

      proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=mavencache:50m max_size=15g inactive=7d use_temp_path=off;

      server {
        listen 8080;

        # Central: https://repo.maven.apache.org/maven2/
        location /central/ {
          proxy_ssl_server_name on;
          proxy_set_header Host repo.maven.apache.org;
          proxy_cache mavencache;
          proxy_cache_valid 200 302 7d;
          proxy_cache_valid 404 10m;
          add_header X-Cache-Status $upstream_cache_status always;
          proxy_pass https://repo.maven.apache.org/maven2/;
        }

        # Red Hat GA: https://maven.repository.redhat.com/ga/
        location /ga/ {
          proxy_ssl_server_name on;
          proxy_set_header Host maven.repository.redhat.com;
          proxy_cache mavencache;
          proxy_cache_valid 200 302 7d;
          proxy_cache_valid 404 10m;
          add_header X-Cache-Status $upstream_cache_status always;
          proxy_pass https://maven.repository.redhat.com/ga/;
        }

        location = / {
          return 200 "Maven mirror is running.\n- /central/ -> Maven Central\n- /ga/ -> Red Hat GA\n";
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.mavenMirror.name }}
  namespace: {{ .Values.mavenMirror.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.mavenMirror.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.mavenMirror.name }}
    spec:
      containers:
        - name: nginx
          image: {{ .Values.mavenMirror.image | quote }}
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: cache
              mountPath: /var/cache/nginx
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: nginx-conf
          configMap:
            name: {{ .Values.mavenMirror.name }}-nginx
        - name: cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.mavenMirror.name }}
  namespace: {{ .Values.mavenMirror.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  selector:
    app: {{ .Values.mavenMirror.name }}
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ .Values.mavenMirror.name }}
  namespace: {{ .Values.mavenMirror.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  host: {{ .Values.mavenMirror.name }}.{{ .Values.clusterDomain }}
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  to:
    kind: Service
    name: {{ .Values.mavenMirror.name }}
    weight: 100
  wildcardPolicy: None
