apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Values.mavenMirror.name }}-warmup
  namespace: {{ .Values.mavenMirror.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: warmup
              image: maven:3.9-eclipse-temurin-17
              command: ["bash", "-lc"]
              args:
                - |
                  set -euo pipefail
                  export HOME=/tmp
                  export MAVEN_USER_HOME=/tmp/.m2
                  mkdir -p /tmp/.m2/repository

                  echo "Waiting for maven-mirror readiness..."
                  for i in $(seq 1 60); do
                    if curl -fsS "http://maven-mirror.maven-mirror.svc.cluster.local:8080/" >/dev/null; then
                      echo "maven-mirror is ready."
                      break
                    fi
                    sleep 2
                  done

                  cat > /tmp/settings.xml <<'EOF'
                  <settings>
                    <profiles>
                      <profile>
                        <id>mirror</id>
                        <repositories>
                          <repository>
                            <id>central</id>
                            <url>http://maven-mirror.maven-mirror.svc.cluster.local:8080/central/</url>
                            <releases><enabled>true</enabled></releases>
                            <snapshots><enabled>false</enabled></snapshots>
                          </repository>
                          <repository>
                            <id>redhat-ga</id>
                            <url>http://maven-mirror.maven-mirror.svc.cluster.local:8080/ga/</url>
                            <releases><enabled>true</enabled></releases>
                            <snapshots><enabled>false</enabled></snapshots>
                          </repository>
                        </repositories>
                        <pluginRepositories>
                          <pluginRepository>
                            <id>central</id>
                            <url>http://maven-mirror.maven-mirror.svc.cluster.local:8080/central/</url>
                            <releases><enabled>true</enabled></releases>
                            <snapshots><enabled>false</enabled></snapshots>
                          </pluginRepository>
                          <pluginRepository>
                            <id>redhat-ga</id>
                            <url>http://maven-mirror.maven-mirror.svc.cluster.local:8080/ga/</url>
                            <releases><enabled>true</enabled></releases>
                            <snapshots><enabled>false</enabled></snapshots>
                          </pluginRepository>
                        </pluginRepositories>
                      </profile>
                    </profiles>
                    <activeProfiles>
                      <activeProfile>mirror</activeProfile>
                    </activeProfiles>
                  </settings>
                  EOF

                  get() {
                    local artifact="$1"
                    echo "Warming: $artifact"
                    mvn -q -s /tmp/settings.xml -Dmaven.repo.local=/tmp/.m2/repository -Dtransitive=true dependency:get -Dartifact="$artifact"
                  }

                  # Backend template (old Quarkus for RHDA demo)
                  get "io.quarkus:quarkus-bom:pom:3.15.7.redhat-00001"
                  get "io.quarkus:quarkus-maven-plugin:3.15.7.redhat-00001"
                  get "io.quarkus:quarkus-rest:3.15.7.redhat-00001"
                  get "io.quarkus:quarkus-rest-jackson:3.15.7.redhat-00001"
                  get "io.quarkus:quarkus-smallrye-openapi:3.15.7.redhat-00001"

                  # MCP template (newer Quarkus + MCP extension)
                  get "io.quarkus:quarkus-bom:pom:3.27.3.redhat-00002"
                  get "io.quarkus:quarkus-maven-plugin:3.27.3.redhat-00002"
                  get "io.quarkiverse.mcp:quarkus-mcp-server-http:1.7.0.redhat-00001"

                  echo "Warmup complete."
