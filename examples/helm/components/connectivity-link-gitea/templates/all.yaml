apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: gitea
  namespace: gitea
spec:
  host: gitea-gitea.{{ .Values.clusterDomain }}
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  to:
    kind: Service
    name: gitea-http
    weight: 100
  wildcardPolicy: None
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitea-setup
  namespace: gitea
  annotations:
    argocd.argoproj.io/sync-wave: "4"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gitea-setup
  namespace: gitea
  annotations:
    argocd.argoproj.io/sync-wave: "4"
rules:
- apiGroups: [""]
  resources: ["pods", "pods/exec"]
  verbs: ["get", "list", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitea-setup
  namespace: gitea
  annotations:
    argocd.argoproj.io/sync-wave: "4"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gitea-setup
subjects:
- kind: ServiceAccount
  name: gitea-setup
  namespace: gitea
---
apiVersion: batch/v1
kind: Job
metadata:
  name: gitea-admin-setup
  namespace: gitea
  annotations:
    argocd.argoproj.io/hook: PostSync
    # Keep the hook Job around so Argo CD can reliably observe completion.
    # It will be removed automatically on the next sync before a new hook is created.
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: gitea-setup
      containers:
        - name: setup
          image: registry.redhat.io/openshift4/ose-cli:latest
          env:
            - name: ADMIN_USER
              value: {{ .Values.adminUser | quote }}
            - name: ADMIN_PASS
              value: {{ .Values.adminPassword | quote }}
            - name: ADMIN_EMAIL
              value: {{ .Values.adminEmail | quote }}
            - name: WORKSHOP_PASSWORD
              value: {{ .Values.workshopPassword | default "redhat" | quote }}
          command:
            - /bin/bash
            - -c
            - |
              set -e
              BASE="http://gitea-http.gitea.svc.cluster.local:3000"
              AUTH="${ADMIN_USER}:${ADMIN_PASS}"
              echo "Waiting for Gitea API..."
              for attempt in $(seq 1 60); do
                if curl -sf "$BASE/api/v1/version" >/dev/null 2>&1; then break; fi
                echo "  attempt $attempt/60 ..."
                sleep 5
              done
              curl -sf "$BASE/api/v1/version" || { echo "Gitea not available" >&2; exit 1; }
              echo "Gitea API ready."

              gitea_pod() {
                oc get pod -n gitea -l app.kubernetes.io/name=gitea -o jsonpath='{.items[0].metadata.name}'
              }

              ensure_gitea_password_policy() {
                local pod="$1"
                echo "Ensuring Gitea allows short workshop passwords..."
                oc exec -n gitea "${pod}" -c gitea -- sh -c '
                  INI=/data/gitea/conf/app.ini
                  if grep -q "^MIN_PASSWORD_LENGTH" "$INI"; then
                    sed -i "s/^MIN_PASSWORD_LENGTH = .*/MIN_PASSWORD_LENGTH = 6/" "$INI"
                  else
                    sed -i "/^\[security\]/a MIN_PASSWORD_LENGTH = 6" "$INI"
                  fi
                  if grep -q "^PASSWORD_COMPLEXITY" "$INI"; then
                    sed -i "s/^PASSWORD_COMPLEXITY = .*/PASSWORD_COMPLEXITY = off/" "$INI"
                  else
                    sed -i "/^MIN_PASSWORD_LENGTH = 6/a PASSWORD_COMPLEXITY = off" "$INI"
                  fi
                '
                echo "Restarting Gitea to apply password policy..."
                oc rollout restart deployment/gitea -n gitea
                oc rollout status deployment/gitea -n gitea --timeout=300s
                echo "Waiting for Gitea API after restart..."
                for attempt in $(seq 1 60); do
                  if curl -sf "$BASE/api/v1/version" >/dev/null 2>&1; then break; fi
                  echo "  attempt $attempt/60 ..."
                  sleep 5
                done
                curl -sf "$BASE/api/v1/version" || { echo "Gitea not available after restart" >&2; exit 1; }
              }

              GITEA_POD=$(gitea_pod)
              echo "Using Gitea pod: ${GITEA_POD}"
              ensure_gitea_password_policy "${GITEA_POD}"
              GITEA_POD=$(gitea_pod)
              echo "Using Gitea pod after restart: ${GITEA_POD}"
              oc exec -n gitea "${GITEA_POD}" -c gitea -- \
                gitea admin user change-password --username "${ADMIN_USER}" --password "${ADMIN_PASS}" --must-change-password=false

              echo "Creating developer-hub org..."
              ORG_JSON='{"username":"developer-hub","full_name":"Developer Hub","visibility":"public"}'
              CODE=$(curl -sS -o /dev/null -w "%{http_code}" -X POST "$BASE/api/v1/orgs" \
                -u "$AUTH" -H "Content-Type: application/json" -d "$ORG_JSON" || true)
              echo "  developer-hub org: HTTP $CODE"

              USER_COUNT={{ .Values.userCount | default 200 }}
              echo "Creating $USER_COUNT users and orgs..."
              GITEA_POD=$(gitea_pod)
              for i in $(seq 1 $USER_COUNT); do
                U="user${i}"
                ORG="ws-${U}"

                U_JSON=$(printf '{"username":"%s","password":"%s","email":"%s@developer-hub.local","must_change_password":false,"send_notify":false}' "$U" "$WORKSHOP_PASSWORD" "$U")
                C=$(curl -sS -o /dev/null -w "%{http_code}" -X POST "$BASE/api/v1/admin/users" \
                  -u "$AUTH" -H "Content-Type: application/json" -d "$U_JSON" || true)

                if ! oc exec -n gitea "${GITEA_POD}" -c gitea -- \
                  gitea admin user change-password --username "${U}" --password "${WORKSHOP_PASSWORD}" --must-change-password=false; then
                  echo "  WARNING: failed to set password for ${U}" >&2
                fi

                O_JSON=$(printf '{"username":"%s","visibility":"public","description":"Workshop repos for %s"}' "$ORG" "$U")
                O=$(curl -sS -o /dev/null -w "%{http_code}" -X POST "$BASE/api/v1/orgs" \
                  -u "$AUTH" -H "Content-Type: application/json" -d "$O_JSON" || true)

                TID=$(curl -sS -u "$AUTH" "$BASE/api/v1/orgs/${ORG}/teams" 2>/dev/null \
                  | sed -n 's/.*"id":\([0-9]*\).*"name":"Owners".*/\1/p')
                if [ -n "$TID" ]; then
                  curl -sS -o /dev/null -X PUT "$BASE/api/v1/teams/${TID}/members/${U}" \
                    -u "$AUTH" || true
                fi

                # Create a per-user demo repo with a unique Backstage entity.
                # This is used by the workshop to demonstrate OLS Developer Hub tool calls:
                # register-catalog-entities from a Gitea raw URL.
                REPO="ols-import-demo"
                R_JSON=$(printf '{"name":"%s","private":false,"auto_init":true,"default_branch":"main","description":"OLS catalog import demo for %s"}' "$REPO" "$U")
                RC=$(curl -sS -o /dev/null -w "%{http_code}" -X POST "$BASE/api/v1/org/${ORG}/repos" \
                  -u "$AUTH" -H "Content-Type: application/json" -d "$R_JSON" || true)

                # Create a Template entity so it appears in Developer Hub → Templates after registration.
                ENTITY_NAME="ols-import-demo-${U}"
                TEMPLATE=$(printf "apiVersion: scaffolder.backstage.io/v1beta3\nkind: Template\nmetadata:\n  name: %s\n  title: OLS Import Demo Template (%s)\n  description: Demo Template to register via OpenShift Lightspeed (register-catalog-entities).\n  tags: [ols, demo]\nspec:\n  type: service\n  owner: user:%s\n  parameters:\n    - title: Demo\n      required: []\n      properties: {}\n  steps:\n    - id: log\n      name: Demo\n      action: debug:log\n      input:\n        message: \"Hello from the OLS import demo template (%s).\"\n  output:\n    text:\n      - title: Next\n        content: \"Template imported successfully.\"\n" "$ENTITY_NAME" "$U" "$U" "$U")
                TB64=$(printf "%s" "$TEMPLATE" | base64 | tr -d '\n')
                T_JSON=$(printf '{"message":"Add demo template for %s","content":"%s","branch":"main"}' "$U" "$TB64")
                FC=$(curl -sS -o /dev/null -w "%{http_code}" -X POST "$BASE/api/v1/repos/${ORG}/${REPO}/contents/template.yaml" \
                  -u "$AUTH" -H "Content-Type: application/json" -d "$T_JSON" || true)

                echo "${U}: user=${C} org=${O} repo=${RC} catalog=${FC}"
              done
              echo "All users and orgs created."
  backoffLimit: 5
