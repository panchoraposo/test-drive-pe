apiVersion: v1
kind: Namespace
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  name: openshift-opentelemetry
---
# MCG / Noobaa bucket for Tempo trace blocks (ODF ObjectBucketClaim).
apiVersion: objectbucket.io/v1alpha1
kind: ObjectBucketClaim
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  name: tempo-traces
  namespace: openshift-opentelemetry
spec:
  generateBucketName: tempo-traces-
  storageClassName: openshift-storage.noobaa.io
---
apiVersion: v1
kind: ServiceAccount
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  name: tempo-s3-secret-sync
  namespace: openshift-opentelemetry
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  name: tempo-s3-secret-sync
  namespace: openshift-opentelemetry
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  name: tempo-s3-secret-sync
  namespace: openshift-opentelemetry
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tempo-s3-secret-sync
subjects:
  - kind: ServiceAccount
    name: tempo-s3-secret-sync
    namespace: openshift-opentelemetry
---
# Map OBC secret + configmap into Tempo Operator S3 secret format.
apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "4"
  name: tempo-s3-secret-from-obc
  namespace: openshift-opentelemetry
spec:
  backoffLimit: 12
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: tempo-s3-secret-sync
      containers:
        - name: sync
          image: quay.io/curl/curl:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              NS="openshift-opentelemetry"
              OBC="tempo-traces"
              TARGET="tempo-s3-storage"
              KUBE_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              KUBE_API="https://kubernetes.default.svc"
              CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt

              EXISTING=$(curl -sS -o /dev/null -w "%{http_code}" \
                "$KUBE_API/api/v1/namespaces/${NS}/secrets/${TARGET}" \
                -H "Authorization: Bearer $KUBE_TOKEN" --cacert "$CA" || true)
              if [ "$EXISTING" = "200" ]; then
                echo "${TARGET} already exists; skipping sync"
                exit 0
              fi

              echo "Waiting for OBC secret ${OBC}..."
              SC="000"
              for i in $(seq 1 120); do
                SC=$(curl -sS -o /dev/null -w "%{http_code}" \
                  "$KUBE_API/api/v1/namespaces/${NS}/secrets/${OBC}" \
                  -H "Authorization: Bearer $KUBE_TOKEN" --cacert "$CA" || true)
                if [ "$SC" = "200" ]; then break; fi
                sleep 5
              done
              [ "$SC" = "200" ] || { echo "OBC secret not ready" >&2; exit 1; }

              SEC_JSON=$(curl -sS "$KUBE_API/api/v1/namespaces/${NS}/secrets/${OBC}" \
                -H "Authorization: Bearer $KUBE_TOKEN" --cacert "$CA")
              CM_JSON=$(curl -sS "$KUBE_API/api/v1/namespaces/${NS}/configmaps/${OBC}" \
                -H "Authorization: Bearer $KUBE_TOKEN" --cacert "$CA" || echo "{}")

              b64dec() { echo "$1" | tr -d '\n' | base64 -d 2>/dev/null; }
              get_data() { echo "$1" | sed -n "s/.*\"$2\":\"\\([^\"]*\\)\".*/\\1/p" | head -1; }

              AK=$(get_data "$SEC_JSON" "AWS_ACCESS_KEY_ID")
              SK=$(get_data "$SEC_JSON" "AWS_SECRET_ACCESS_KEY")
              BUCKET=$(get_data "$SEC_JSON" "BUCKET_NAME")
              HOST=$(get_data "$CM_JSON" "BUCKET_HOST")
              PORT=$(get_data "$CM_JSON" "BUCKET_PORT")
              [ -z "$HOST" ] && HOST="s3.openshift-storage.svc"
              [ -z "$PORT" ] && PORT="80"
              # Noobaa in-cluster S3 uses HTTP on port 80 (TLS on 443 is not compatible with Tempo S3 client here).
              ENDPOINT="http://${HOST}:${PORT}"

              AK=$(b64dec "$AK")
              SK=$(b64dec "$SK")
              BUCKET=$(b64dec "$BUCKET")

              echo "Bucket=${BUCKET} endpoint=${ENDPOINT}"

              PAYLOAD=$(printf '{"apiVersion":"v1","kind":"Secret","metadata":{"name":"%s","namespace":"%s"},"type":"Opaque","stringData":{"bucket":"%s","endpoint":"%s","access_key_id":"%s","access_key_secret":"%s","insecure":"true"}}' \
                "$TARGET" "$NS" "$BUCKET" "$ENDPOINT" "$AK" "$SK")

              EXIST=$(curl -sS -o /dev/null -w "%{http_code}" \
                "$KUBE_API/api/v1/namespaces/${NS}/secrets/${TARGET}" \
                -H "Authorization: Bearer $KUBE_TOKEN" --cacert "$CA" || true)
              if [ "$EXIST" = "200" ]; then
                curl -sS -o /dev/null -X DELETE \
                  "$KUBE_API/api/v1/namespaces/${NS}/secrets/${TARGET}" \
                  -H "Authorization: Bearer $KUBE_TOKEN" --cacert "$CA"
              fi
              CODE=$(curl -sS -o /tmp/out -w "%{http_code}" -X POST \
                "$KUBE_API/api/v1/namespaces/${NS}/secrets" \
                -H "Authorization: Bearer $KUBE_TOKEN" \
                -H "Content-Type: application/json" \
                --cacert "$CA" -d "$PAYLOAD")
              echo "Created ${TARGET}: HTTP ${CODE}"
              [ "$CODE" = "201" ] || { cat /tmp/out >&2; exit 1; }
---
apiVersion: tempo.grafana.com/v1alpha1
kind: TempoStack
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "6"
  name: connectivity
  namespace: openshift-opentelemetry
spec:
  storage:
    secret:
      name: tempo-s3-storage
      type: s3
  storageSize: 5Gi
  resources:
    total:
      limits:
        memory: 2Gi
        cpu: "2"
  template:
    distributor:
      component:
        replicas: 1
    ingester:
      replicas: 1
    querier:
      replicas: 1
    queryFrontend:
      component:
        replicas: 1
      jaegerQuery:
        enabled: true
    compactor:
      replicas: 1
---
# Stable Jaeger service name for Kiali/console; backed by Tempo operator Jaeger Query UI.
apiVersion: v1
kind: Service
metadata:
  labels:
    app: jaeger
  name: jaeger
  namespace: openshift-opentelemetry
spec:
  ports:
  - name: query
    port: 16686
    targetPort: 16686
  selector:
    app.kubernetes.io/component: query-frontend
    app.kubernetes.io/instance: connectivity
    app.kubernetes.io/managed-by: tempo-operator
    app.kubernetes.io/name: tempo
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: tempo
  name: tempo-distributor
  namespace: openshift-opentelemetry
spec:
  ports:
  - name: otlp-grpc
    port: 4317
    targetPort: 4317
  selector:
    app.kubernetes.io/component: distributor
    app.kubernetes.io/instance: connectivity
    app.kubernetes.io/managed-by: tempo-operator
    app.kubernetes.io/name: tempo
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: jaeger
  namespace: openshift-opentelemetry
spec:
  host: jaeger.{{ .Values.clusterDomain }}
  port:
    targetPort: query
  tls:
    termination: edge
  to:
    kind: Service
    name: jaeger
