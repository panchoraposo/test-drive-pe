{{- $userCount := .Values.userCount | default 200 | int }}
{{- $hash := "{SHA}PHZ8Qa+xKtoUAZDtgts/2TDi76M=" }}
apiVersion: v1
kind: Secret
metadata:
  name: htpasswd-workshop-users
  namespace: openshift-config
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
stringData:
  htpasswd: |
    {{- range $i := until $userCount }}
    user{{ add1 $i }}:{{ $hash }}
    {{- end }}
    platformadmin:{{ $hash }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: oauth-patcher
  namespace: openshift-config
  annotations:
    argocd.argoproj.io/sync-wave: "1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: oauth-patcher
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
- apiGroups: ["config.openshift.io"]
  resources: ["oauths"]
  verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: oauth-patcher
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: oauth-patcher
subjects:
- kind: ServiceAccount
  name: oauth-patcher
  namespace: openshift-config
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: workshop-connectivity-link-viewer
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
- apiGroups: ["gateway.networking.k8s.io"]
  resources: ["gateways", "httproutes", "grpcroutes", "referencegrants"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["kuadrant.io"]
  resources: ["authpolicies", "ratelimitpolicies", "dnspolicies", "tlspolicies", "tokenratelimitpolicies"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["gateway.kuadrant.io"]
  resources: ["policies"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["extensions.istio.io"]
  resources: ["wasmplugins"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["networking.istio.io"]
  resources: ["envoyfilters"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: workshop-connectivity-link-viewer
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: workshop-connectivity-link-viewer
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: Group
  name: system:authenticated
---
apiVersion: batch/v1
kind: Job
metadata:
  name: oauth-htpasswd-setup
  namespace: openshift-config
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: oauth-patcher
      containers:
      - name: patch-oauth
        image: registry.redhat.io/openshift4/ose-cli:latest
        command:
        - /bin/bash
        - -c
        - |
          set -e

          NAMES=$(oc get oauth cluster -o jsonpath='{.spec.identityProviders[*].name}' 2>/dev/null || echo "")

          for N in $NAMES; do
            if [ "$N" = "workshop-users" ]; then
              echo "HTPasswd identity provider 'workshop-users' already configured."
              exit 0
            fi
          done

          echo "Adding HTPasswd identity provider 'workshop-users'..."

          oc get oauth cluster -o jsonpath='{.spec.identityProviders}' >/dev/null 2>&1
          if [ $? -ne 0 ] || [ -z "$(oc get oauth cluster -o jsonpath='{.spec.identityProviders}' 2>/dev/null)" ]; then
            oc patch oauth cluster --type=json -p '[
              {"op": "add", "path": "/spec/identityProviders", "value": [
                {
                  "name": "workshop-users",
                  "mappingMethod": "claim",
                  "type": "HTPasswd",
                  "htpasswd": {
                    "fileData": {
                      "name": "htpasswd-workshop-users"
                    }
                  }
                }
              ]}
            ]'
          else
            oc patch oauth cluster --type=json -p '[
              {"op": "add", "path": "/spec/identityProviders/-", "value": {
                "name": "workshop-users",
                "mappingMethod": "claim",
                "type": "HTPasswd",
                "htpasswd": {
                  "fileData": {
                    "name": "htpasswd-workshop-users"
                  }
                }
              }}
            ]'
          fi

          echo "OAuth patched. Users can log in via 'workshop-users' provider."
          echo "OAuth pods will restart automatically (~2 min)."
