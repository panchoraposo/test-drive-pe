##
## 5. MCP Controller Deployment
##
# The Operator installs and runs the controller.
{{- if false }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-controller
  namespace: mcp-system
  labels:
    app: mcp-controller
    app.kubernetes.io/part-of: mcp-gateway
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-controller
  template:
    metadata:
      labels:
        app: mcp-controller
        app.kubernetes.io/part-of: mcp-gateway
    spec:
      serviceAccountName: mcp-controller
      containers:
        - name: controller
          image: ghcr.io/kuadrant/mcp-controller:latest
          command:
            - ./mcp_controller
          args:
            - --log-level=0
          ports:
            - name: health
              containerPort: 8081
              protocol: TCP
            - name: metrics
              containerPort: 8082
              protocol: TCP
          resources:
            requests:
              memory: '64Mi'
              cpu: '50m'
            limits:
              memory: '256Mi'
              cpu: '200m'
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
{{- end }}
---
##
## 6. Gateway
##
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: mcp-gateway
  namespace: mcp-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    networking.istio.io/service-type: ClusterIP
spec:
  gatewayClassName: istio
  listeners:
    - name: mcp
      protocol: HTTP
      port: 8080
      allowedRoutes:
        namespaces:
          from: All
---
##
## 7. MCPGatewayExtension (controller creates broker, HTTPRoute, and service)
##
{{- if (.Values.operatorInstallEnabled | default false) }}
apiVersion: mcp.kuadrant.io/v1alpha1
kind: MCPGatewayExtension
metadata:
  name: mcp-gateway-extension
  namespace: mcp-system
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  # RHCL 1.3 TP (0.6.0): workshop manages HTTPRoutes for OLS backends manually.
  httpRouteManagement: Disabled
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: mcp-gateway
    namespace: mcp-system
    sectionName: mcp
  publicHost: mcp-gateway.{{ .Values.clusterDomain }}
  # Allow in-cluster callers (e.g. OLS) to use the service DNS name as Host.
  # Without this, tool discovery may work but tool execution can fail due to
  # hostname mismatch across HTTPRoutes.
  privateHost: mcp-gateway-istio.mcp-system.svc.cluster.local:8080
  trustedHeadersKey:
    generate: Disabled
    secretName: trusted-headers-public-key
  # Operator default; include in GitOps to avoid ArgoCD OutOfSync drift.
  backendPingIntervalSeconds: 60
{{- end }}
---
##
## 8. MCP Server Registrations — connect openshift-mcp-server backends to the gateway
##
apiVersion: v1
kind: Service
metadata:
  name: openshift-mcp-server-proxy
  namespace: mcp-system
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  type: ExternalName
  externalName: openshift-mcp-server-accept-proxy.openshift-lightspeed.svc.cluster.local
  ports:
    - port: 8080
      protocol: TCP
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-mcp-server-proxy
  namespace: mcp-system
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  type: ExternalName
  externalName: k8s-mcp-server-accept-proxy.openshift-lightspeed.svc.cluster.local
  ports:
    - port: 8085
      protocol: TCP
      targetPort: 8085
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: openshift-mcp-server-route
  namespace: mcp-system
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  hostnames:
    - mcp-gateway.{{ .Values.clusterDomain }}
    - mcp-gateway-istio.mcp-system.svc.cluster.local
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: mcp-gateway
      namespace: mcp-system
      sectionName: mcp
  rules:
    - backendRefs:
        - name: openshift-mcp-server-proxy
          port: 8080
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /mcp
      matches:
        - path:
            type: PathPrefix
            value: /openshift-mcp-server/mcp
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: k8s-mcp-server-route
  namespace: mcp-system
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  hostnames:
    - mcp-gateway.{{ .Values.clusterDomain }}
    - mcp-gateway-istio.mcp-system.svc.cluster.local
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: mcp-gateway
      namespace: mcp-system
      sectionName: mcp
  rules:
    - backendRefs:
        - name: k8s-mcp-server-proxy
          port: 8085
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /mcp
      matches:
        - path:
            type: PathPrefix
            value: /k8s-mcp-server/mcp
---
{{- if (.Values.operatorInstallEnabled | default false) }}
apiVersion: mcp.kuadrant.io/v1alpha1
kind: MCPServerRegistration
metadata:
  name: openshift-mcp-server
  namespace: mcp-system
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: openshift-mcp-server-route
  # Path prefix as exposed through the gateway (matches HTTPRoute).
  path: /openshift-mcp-server/mcp
---
apiVersion: mcp.kuadrant.io/v1alpha1
kind: MCPServerRegistration
metadata:
  name: kubernetes-mcp-server
  namespace: mcp-system
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: k8s-mcp-server-route
  # Path prefix as exposed through the gateway (matches HTTPRoute).
  path: /k8s-mcp-server/mcp
{{- end }}
{{/*
  RHDH MCP Server via Kuadrant Gateway is DISABLED.
  Reason: RHDH plugin uses legacy SSE transport (GET /sse + POST /messages?sessionId=X),
  but the Kuadrant mcp-controller only supports Streamable HTTP (POST /mcp).
  RHDH MCP is accessed directly by OLS via the rhdh-catalog entry in OLSConfig.
*/}}
---
##
## 8b. ArgoCD MCP Server — Deployment, Services, HTTPRoute, MCPServerRegistration
##
{{/*
  ArgoCD MCP Server via Kuadrant Gateway is DISABLED.
  Reason: current argocd-mcp uses legacy SSE transport and returns 4xx for
  Streamable HTTP initialize POST, which makes the gateway continuously unhealthy.
*/}}
