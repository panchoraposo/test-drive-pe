##
## 9. Route — OpenShift route to expose the gateway
##
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: mcp-gateway
  namespace: mcp-system
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  host: mcp-gateway.{{ .Values.clusterDomain }}
  to:
    kind: Service
    name: mcp-gateway-istio
    weight: 100
  port:
    targetPort: 8080
  tls:
    termination: edge
  wildcardPolicy: None
