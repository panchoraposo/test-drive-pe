apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-broker-router
  namespace: mcp-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-controller
  namespace: mcp-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mcp-controller
  annotations:
    argocd.argoproj.io/sync-wave: "0"
rules:
  - apiGroups: ['mcp.kuadrant.io']
    resources: ['mcpserverregistrations', 'mcpserverregistrations/status', 'mcpvirtualservers', 'mcpgatewayextensions', 'mcpgatewayextensions/status', 'mcpgatewayextensions/finalizers']
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']
  - apiGroups: ['gateway.networking.k8s.io']
    resources: ['httproutes', 'httproutes/status', 'gateways', 'gateways/status', 'referencegrants']
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']
  - apiGroups: ['']
    resources: ['services', 'serviceaccounts', 'secrets', 'endpoints', 'events', 'namespaces', 'configmaps']
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']
  - apiGroups: ['discovery.k8s.io']
    resources: ['endpointslices']
    verbs: ['get', 'list', 'watch']
  - apiGroups: ['networking.istio.io']
    resources: ['envoyfilters']
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']
  - apiGroups: ['apps']
    resources: ['deployments']
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mcp-controller
  annotations:
    argocd.argoproj.io/sync-wave: "0"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mcp-controller
subjects:
  - kind: ServiceAccount
    name: mcp-controller
    namespace: mcp-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mcp-broker-router
  namespace: mcp-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
rules:
  - apiGroups: ['']
    resources: ['configmaps']
    resourceNames: ['mcp-gateway-config']
    verbs: ['get', 'watch']
  - apiGroups: ['']
    resources: ['secrets']
    resourceNames: ['mcp-gateway-config']
    verbs: ['get', 'watch']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mcp-broker-router
  namespace: mcp-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
roleRef:
  apiGroup: rbac.authorization.k8s.io
