##
## 5. MCP Controller Deployment
##
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-controller
  namespace: mcp-system
  labels:
    app: mcp-controller
    app.kubernetes.io/part-of: mcp-gateway
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-controller
  template:
    metadata:
      labels:
        app: mcp-controller
        app.kubernetes.io/part-of: mcp-gateway
    spec:
      serviceAccountName: mcp-controller
      containers:
        - name: controller
          image: ghcr.io/kuadrant/mcp-controller:latest
          command:
            - ./mcp_controller
          args:
            - --log-level=0
          ports:
            - name: health
              containerPort: 8081
              protocol: TCP
            - name: metrics
              containerPort: 8082
              protocol: TCP
          resources:
            requests:
              memory: '64Mi'
              cpu: '50m'
            limits:
              memory: '256Mi'
              cpu: '200m'
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
---
##
## 6. Gateway
##
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: mcp-gateway
  namespace: mcp-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    networking.istio.io/service-type: ClusterIP
spec:
  gatewayClassName: istio
  listeners:
    - name: mcp
      protocol: HTTP
      port: 8080
      allowedRoutes:
        namespaces:
          from: All
---
##
## 7. MCPGatewayExtension (controller creates broker, HTTPRoute, and service)
##
apiVersion: mcp.kuadrant.io/v1alpha1
kind: MCPGatewayExtension
metadata:
  name: mcp-gateway-extension
  namespace: mcp-system
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: mcp-gateway
    namespace: mcp-system
    sectionName: mcp
  publicHost: mcp-gateway.{{ .Values.clusterDomain }}
  # Allow in-cluster callers (e.g. OLS) to use the service DNS name as Host.
  # Without this, tool discovery may work but tool execution can fail due to
  # hostname mismatch across HTTPRoutes.
  privateHost: mcp-gateway-istio.mcp-system.svc.cluster.local
  trustedHeadersKey:
    secretName: trusted-headers-public-key
---
##
## 8. MCP Server Registrations — connect openshift-mcp-server backends to the gateway
##
apiVersion: v1
kind: Service
metadata:
  name: openshift-mcp-server-proxy
  namespace: mcp-system
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  type: ExternalName
  externalName: openshift-mcp-server.openshift-lightspeed.svc.cluster.local
  ports:
    - port: 8080
      protocol: TCP
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-mcp-server-proxy
  namespace: mcp-system
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  type: ExternalName
  externalName: openshift-mcp-server-k8s-mcp.openshift-lightspeed.svc.cluster.local
  ports:
    - port: 8085
      protocol: TCP
      targetPort: 8085
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: openshift-mcp-server-route
  namespace: mcp-system
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  hostnames:
    - mcp-gateway.{{ .Values.clusterDomain }}
    - mcp-gateway-istio.mcp-system.svc.cluster.local
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: mcp-gateway
      namespace: mcp-system
      sectionName: mcp
  rules:
    - backendRefs:
        - name: openshift-mcp-server-proxy
          port: 8080
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /mcp
      matches:
        - path:
            type: PathPrefix
            value: /openshift-mcp-server/mcp
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: k8s-mcp-server-route
  namespace: mcp-system
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  hostnames:
    - mcp-gateway.{{ .Values.clusterDomain }}
    - mcp-gateway-istio.mcp-system.svc.cluster.local
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: mcp-gateway
      namespace: mcp-system
      sectionName: mcp
  rules:
    - backendRefs:
        - name: k8s-mcp-server-proxy
          port: 8085
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /mcp
      matches:
        - path:
            type: PathPrefix
            value: /k8s-mcp-server/mcp
---
apiVersion: mcp.kuadrant.io/v1alpha1
kind: MCPServerRegistration
metadata:
  name: openshift-mcp-server
  namespace: mcp-system
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  targetRef:
    name: openshift-mcp-server-route
  toolPrefix: ocp
  path: /mcp
---
apiVersion: mcp.kuadrant.io/v1alpha1
kind: MCPServerRegistration
metadata:
  name: kubernetes-mcp-server
  namespace: mcp-system
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  targetRef:
    name: k8s-mcp-server-route
  toolPrefix: k8s
  path: /mcp
{{/*
  RHDH MCP Server via Kuadrant Gateway is DISABLED.
  Reason: RHDH plugin uses legacy SSE transport (GET /sse + POST /messages?sessionId=X),
  but the Kuadrant mcp-controller only supports Streamable HTTP (POST /mcp).
  RHDH MCP is accessed directly by OLS via the rhdh-catalog entry in OLSConfig.
*/}}
---
##
## 8b. ArgoCD MCP Server — Deployment, Services, HTTPRoute, MCPServerRegistration
##
apiVersion: v1
kind: Secret
metadata:
  name: argocd-mcp-token
  namespace: mcp-system
  annotations:
    argocd.argoproj.io/sync-wave: "3"
type: Opaque
stringData:
  ARGOCD_API_TOKEN: {{ .Values.argocdApiToken | default "" | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-mcp-server
  namespace: mcp-system
  labels:
    app: argocd-mcp-server
    app.kubernetes.io/part-of: mcp-gateway
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: argocd-mcp-server
  template:
    metadata:
      labels:
        app: argocd-mcp-server
        app.kubernetes.io/part-of: mcp-gateway
    spec:
      containers:
        - name: argocd-mcp
          image: registry.redhat.io/ubi9/nodejs-22:latest
          command: ["npx"]
          args: ["argocd-mcp@latest", "http"]
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: ARGOCD_BASE_URL
              value: "https://openshift-gitops-server.openshift-gitops.svc.cluster.local"
            - name: ARGOCD_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: argocd-mcp-token
                  key: ARGOCD_API_TOKEN
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
          resources:
            requests:
              memory: '128Mi'
              cpu: '100m'
            limits:
              memory: '512Mi'
              cpu: '500m'
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 120
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
---
