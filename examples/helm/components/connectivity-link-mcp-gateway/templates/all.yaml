##
## 1b. Install MCP Gateway Operator (OLM)
## Per RHC Link docs: mcp-gateway channel=preview from redhat-operators.
##
{{- if (.Values.operatorInstallEnabled | default false) }}
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: mcp-gateway
  namespace: mcp-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  targetNamespaces:
    - mcp-system
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: mcp-gateway
  namespace: mcp-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  name: mcp-gateway
  channel: preview
{{- end }}
---
