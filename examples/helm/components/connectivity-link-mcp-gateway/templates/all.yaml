metadata:
  name: argocd-mcp-server
  namespace: mcp-system
  labels:
    app: argocd-mcp-server
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  selector:
    app: argocd-mcp-server
  ports:
    - port: 3000
      protocol: TCP
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: argocd-mcp-server-proxy
  namespace: mcp-system
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  type: ExternalName
  externalName: argocd-mcp-server.mcp-system.svc.cluster.local
  ports:
    - port: 3000
      protocol: TCP
      targetPort: 3000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-mcp-server-route
  namespace: mcp-system
  annotations:
    argocd.argoproj.io/sync-wave: "7"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  hostnames:
    - mcp-gateway.{{ .Values.clusterDomain }}
    - mcp-gateway-istio.mcp-system.svc.cluster.local
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: mcp-gateway
      namespace: mcp-system
      sectionName: mcp
  rules:
    - backendRefs:
        - name: argocd-mcp-server-proxy
          port: 3000
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /mcp
      matches:
        - path:
            type: PathPrefix
            value: /argocd-mcp-server/mcp
---
apiVersion: mcp.kuadrant.io/v1alpha1
kind: MCPServerRegistration
metadata:
  name: argocd-mcp-server
  namespace: mcp-system
  annotations:
    argocd.argoproj.io/sync-wave: "8"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  targetRef:
    name: argocd-mcp-server-route
  toolPrefix: argo
  path: /mcp
---
##
## 9. Route — OpenShift route to expose the gateway
##
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: mcp-gateway
  namespace: mcp-system
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  host: mcp-gateway.{{ .Values.clusterDomain }}
  to:
    kind: Service
    name: mcp-gateway-istio
    weight: 100
  port:
    targetPort: 8080
  tls:
    termination: edge
  wildcardPolicy: None
