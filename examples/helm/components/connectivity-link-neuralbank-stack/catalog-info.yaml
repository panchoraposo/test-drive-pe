---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: neuralbank-api
  namespace: default
  description: "Neuralbank REST API — endpoints para clientes, créditos y operaciones bancarias"
  annotations:
    kuadrant.io/namespace: neuralbank-stack
    kuadrant.io/apiproduct: neuralbank-api
    kuadrant.io/httproute: neuralbank-api-route
  tags:
    - rest
    - openapi
spec:
  type: openapi
  lifecycle: production
  owner: platform-engineering
  system: neuralbank-system
  definition: |
    openapi: "3.0.3"
    info:
      title: Neuralbank Customer Service API
      description: |
        API REST de gestión de clientes para Neuralbank.
        Protegida por Kuadrant OIDCPolicy con autenticación OIDC (Keycloak).
        Incluye RateLimitPolicy de 10 req/min por usuario.

        **Autenticación:** Bearer token JWT (Keycloak realm neuralbank)
        **Usuarios:** user1…user200 / redhat
      version: "1.0.0"
      contact:
        name: Platform Engineering
        email: platform@neuralbank.dev
    servers:
      - url: https://neuralbank.apps.cluster-94mvp.dynamic.redhatworkshops.io
        description: Producción (neuralbank-stack)
    security:
      - bearerAuth: []
    tags:
      - name: Customer Service
        description: Operaciones CRUD de clientes
      - name: Credit Scoring
        description: Gestión de score crediticio
      - name: Customer Status
        description: Activación, desactivación y bloqueo
    paths:
      /api/v1/customers:
        get:
          summary: Listar clientes con filtros
          tags: [Customer Service]
          parameters:
            - name: search
              in: query
              schema:
                type: string
            - name: tipoCliente
              in: query
              schema:
                type: string
                enum: [PERSONAL, EMPRESARIAL, CORPORATIVO]
            - name: activo
              in: query
              schema:
                type: boolean
            - name: ciudad
              in: query
              schema:
                type: string
            - name: page
              in: query
              schema:
                type: integer
                default: 0
            - name: size
              in: query
              schema:
                type: integer
                default: 20
          responses:
            '200':
              description: Lista paginada de clientes
            '302':
              description: Redirect a Keycloak (sin token)
        post:
          summary: Crear nuevo cliente
          tags: [Customer Service]
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/CreateCustomerRequest'
          responses:
            '201':
              description: Cliente creado exitosamente
            '400':
              description: Datos inválidos
            '409':
              description: Cliente duplicado
      /api/v1/customers/{customerId}:
        get:
          summary: Obtener cliente por ID
          tags: [Customer Service]
          parameters:
            - name: customerId
              in: path
              required: true
              schema:
                type: integer
                format: int64
          responses:
            '200':
              description: Cliente encontrado
            '404':
              description: Cliente no encontrado
        put:
          summary: Actualizar cliente
          tags: [Customer Service]
          parameters:
            - name: customerId
              in: path
              required: true
              schema:
                type: integer
                format: int64
          responses:
            '200':
              description: Cliente actualizado
            '404':
              description: Cliente no encontrado
        delete:
          summary: Eliminar cliente (soft delete)
          tags: [Customer Service]
          parameters:
            - name: customerId
              in: path
              required: true
              schema:
                type: integer
                format: int64
          responses:
            '204':
              description: Cliente eliminado
      /api/v1/customers/{customerId}/credit-score:
        get:
          summary: Obtener score crediticio
          tags: [Credit Scoring]
          parameters:
            - name: customerId
              in: path
              required: true
              schema:
                type: integer
                format: int64
          responses:
            '200':
              description: Score obtenido
      /api/v1/customers/{customerId}/summary:
        get:
          summary: Resumen completo del cliente
          tags: [Customer Service]
          parameters:
            - name: customerId
              in: path
              required: true
              schema:
                type: integer
                format: int64
          responses:
            '200':
              description: Resumen obtenido
      /api/v1/customers/{customerId}/activate:
        post:
          summary: Activar cliente
          tags: [Customer Status]
          parameters:
            - name: customerId
              in: path
              required: true
              schema:
                type: integer
                format: int64
          responses:
            '204':
              description: Cliente activado
      /api/v1/customers/{customerId}/block:
        post:
          summary: Bloquear cliente
          tags: [Customer Status]
          parameters:
            - name: customerId
              in: path
              required: true
              schema:
                type: integer
                format: int64
          responses:
            '204':
              description: Cliente bloqueado
    components:
      securitySchemes:
        bearerAuth:
          type: http
          scheme: bearer
          bearerFormat: JWT
          description: |
            JWT token de Keycloak (realm neuralbank).
            Obtener via: POST /realms/neuralbank/protocol/openid-connect/token
      schemas:
        CreateCustomerRequest:
          type: object
          required: [identificacion, tipoIdentificacion, nombre, apellido]
          properties:
            identificacion:
              type: string
            tipoIdentificacion:
              type: string
              enum: [DNI, PASSPORT, SSN, RFC, CURP, CPF, CUIT, RUT, RUN, NINO, CIF, EIN, TAX_ID]
            nombre:
              type: string
            apellido:
              type: string
            email:
              type: string
            telefono:
              type: string
            direccion:
              type: string
            ciudad:
              type: string
            tipoCliente:
              type: string
              enum: [PERSONAL, EMPRESARIAL, CORPORATIVO]
