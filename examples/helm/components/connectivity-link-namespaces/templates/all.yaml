# ============================================================
# Per-User Namespaces (dynamic, driven by .Values.userCount)
# Each user gets two namespaces:
#   - userN-devspaces  (developer workspace)
#   - userN-neuralbank (application deployments)
# Each namespace includes: admin RoleBinding + ArgoCD RoleBinding + pipeline RoleBinding
# ============================================================
{{- $userCount := .Values.userCount | default 200 | int }}
{{- range $i := until $userCount }}
{{- $user := printf "user%d" (add1 $i) }}
{{- $devNs := printf "%s-devspaces" $user }}
{{- $appNs := printf "%s-neuralbank" $user }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $devNs }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/managed-by: openshift-gitops
  labels:
    purpose: developer-workspace
    user: {{ $user }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $user }}-admin
  namespace: {{ $devNs }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: User
  name: {{ $user }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-admin
  namespace: {{ $devNs }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
subjects:
- kind: ServiceAccount
  name: openshift-gitops-argocd-application-controller
  namespace: openshift-gitops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-image-pusher
  namespace: {{ $devNs }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:image-builder
subjects:
- kind: ServiceAccount
  name: pipeline
  namespace: {{ $devNs }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vscode-editor-configurations
  namespace: {{ $devNs }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/part-of: che.eclipse.org
data:
  extensions.json: |
    {
      "recommendations": [
        "redhat.fabric8-analytics"
      ]
    }
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $appNs }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/managed-by: openshift-gitops
  labels:
    purpose: application-deployment
    user: {{ $user }}
    istio.io/dataplane-mode: ambient
    istio.io/use-waypoint: waypoint
    istio.io/ingress-use-waypoint: "true"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $user }}-admin
  namespace: {{ $appNs }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: User
  name: {{ $user }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-admin
  namespace: {{ $appNs }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
subjects:
- kind: ServiceAccount
  name: openshift-gitops-argocd-application-controller
  namespace: openshift-gitops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-image-pusher
  namespace: {{ $appNs }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:image-builder
subjects:
- kind: ServiceAccount
  name: pipeline
  namespace: {{ $appNs }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: waypoint
  namespace: {{ $appNs }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    istio.io/waypoint-for: service
spec:
  gatewayClassName: istio-waypoint
  listeners:
    - name: mesh
      port: 15008
      protocol: HBONE
{{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ambient-mesh-enroll
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "2"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ambient-mesh-enroll
  annotations:
    argocd.argoproj.io/sync-wave: "2"
rules:
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ambient-mesh-enroll
  annotations:
    argocd.argoproj.io/sync-wave: "2"
subjects:
- kind: ServiceAccount
  name: ambient-mesh-enroll
  namespace: openshift-gitops
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ambient-mesh-enroll
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ambient-mesh-enroll
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "2"
spec:
  backoffLimit: 2
  template:
    spec:
      serviceAccountName: ambient-mesh-enroll
      restartPolicy: OnFailure
      containers:
      - name: enroll
        image: registry.redhat.io/openshift4/ose-cli:latest
        command:
        - /bin/bash
        - -c
        - |
          set -euo pipefail
          USER_COUNT="{{ .Values.userCount | default 200 }}"
          echo "Enrolling user namespaces into Istio ambient mode (no sidecars) with waypoint..."
          for i in $(seq 1 "$USER_COUNT"); do
            ns="user${i}-neuralbank"
            if ! oc get namespace "$ns" >/dev/null 2>&1; then
              continue
            fi
            oc label namespace "$ns" istio.io/dataplane-mode=ambient istio.io/use-waypoint=waypoint istio.io/ingress-use-waypoint=true --overwrite >/dev/null
            echo "Labeled $ns"
          done
          echo "Done."
