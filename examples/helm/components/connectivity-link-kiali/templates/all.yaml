apiVersion: kiali.io/v1alpha1
kind: Kiali
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  name: kiali
  namespace: openshift-cluster-observability-operator
spec:
  deployment:
    cluster_wide_access: true
    namespace: openshift-cluster-observability-operator
  external_services:
    grafana:
      enabled: true
      external_url: https://grafana-observability.{{ .Values.clusterDomain }}
      internal_url: http://grafana-observability-service.openshift-cluster-observability-operator.svc.cluster.local:3000
    prometheus:
      url: http://connectivity-link-stack-prometheus.openshift-cluster-observability-operator.svc.cluster.local:9090
    tracing:
      enabled: true
      external_url: https://jaeger.{{ .Values.clusterDomain }}
      # Jaeger UI queries Tempo via gRPC storage plugin; UI still on :16686.
      internal_url: http://jaeger.openshift-opentelemetry.svc.cluster.local:16686
      use_grpc: false
      # TempoStack search + trace hydration often exceeds Kiali default (5s); OSSM console shows "Could not fetch traces".
      query_timeout: 60
      # Ambient mesh: waypoint proxy emits traces under waypoint.<namespace> service names.
      use_waypoint_name: true
---
apiVersion: kiali.io/v1alpha1
kind: OSSMConsole
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "6"
  name: ossmconsole
  namespace: openshift-cluster-observability-operator
spec:
  kiali:
    serviceName: kiali
    serviceNamespace: openshift-cluster-observability-operator
  version: default
