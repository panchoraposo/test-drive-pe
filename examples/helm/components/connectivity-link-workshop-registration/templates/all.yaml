    <!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Workshop Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;700&family=Red+Hat+Text:wght@400;500&display=swap" rel="stylesheet">
    <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Red Hat Text',sans-serif;background:#f0f0f0;min-height:100vh;display:flex;flex-direction:column}
    .header{background:#151515;padding:16px 32px;display:flex;align-items:center;gap:16px}
    .header h1{color:#fff;font-family:'Red Hat Display',sans-serif;font-size:1.1rem;font-weight:500}
    .main{flex:1;padding:32px;max-width:960px;margin:0 auto;width:100%}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
    .stat-card{background:#fff;border-radius:8px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.08);text-align:center}
    .stat-card .number{font-size:2rem;font-weight:700;font-family:'Red Hat Display',sans-serif;color:#151515}
    .stat-card .label{color:#6a6e73;font-size:.85rem;margin-top:4px}
    .stat-card.green .number{color:#3e8635}
    .stat-card.blue .number{color:#0066cc}
    .stat-card.red .number{color:#c9190b}
    .actions{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
    .btn{padding:10px 20px;border:none;border-radius:4px;font-size:.9rem;font-weight:500;cursor:pointer;font-family:'Red Hat Display',sans-serif;transition:background .2s}
    .btn-primary{background:#0066cc;color:#fff}
    .btn-primary:hover{background:#004080}
    .btn-danger{background:#c9190b;color:#fff}
    .btn-danger:hover{background:#a30000}
    .btn-outline{background:#fff;color:#151515;border:1px solid #d2d2d2}
    .btn-outline:hover{background:#f0f0f0}
    .table-wrap{background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden}
    table{width:100%;border-collapse:collapse}
    th{background:#f0f0f0;padding:12px 16px;text-align:left;font-weight:500;font-size:.85rem;color:#6a6e73;text-transform:uppercase;letter-spacing:.5px}
    td{padding:12px 16px;border-top:1px solid #f0f0f0;font-size:.9rem}
    tr:hover td{background:#fafafa}
    .badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:.8rem;font-weight:500;background:#e7f1fa;color:#0066cc}
    .btn-sm{padding:4px 12px;font-size:.8rem}
    .empty{text-align:center;padding:48px;color:#6a6e73}
    .login-card{background:#fff;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.1);padding:48px;max-width:400px;margin:80px auto}
    .login-card h2{font-family:'Red Hat Display',sans-serif;margin-bottom:24px}
    .form-group{margin-bottom:20px}
    .form-group label{display:block;font-weight:500;margin-bottom:8px;font-size:.9rem}
    .form-group input{width:100%;padding:10px 14px;border:1px solid #d2d2d2;border-radius:4px;font-size:1rem;font-family:'Red Hat Text',sans-serif}
    .form-group input:focus{outline:none;border-color:#0066cc;box-shadow:0 0 0 1px #0066cc}
    .footer{background:#151515;color:#6a6e73;text-align:center;padding:16px;font-size:.8rem}
    </style>
    </head>
    <body>
    <div class="header">
      <h1>Workshop Admin Dashboard</h1>
    </div>

    <div id="login-view" class="main" style="display:flex;align-items:center;justify-content:center">
      <div class="login-card">
        <h2>Admin Access</h2>
        <div class="form-group">
          <label for="token-input">Admin Token</label>
          <input type="password" id="token-input" placeholder="Enter admin token" autofocus>
        </div>
        <button class="btn btn-primary" style="width:100%" onclick="login()">Sign In</button>
        <div id="login-error" style="color:#c9190b;font-size:.85rem;margin-top:12px;display:none"></div>
      </div>
    </div>

    <div id="admin-view" class="main" style="display:none">
      <div class="stats">
        <div class="stat-card green"><div class="number" id="s-registered">0</div><div class="label">Registered</div></div>
        <div class="stat-card blue"><div class="number" id="s-available">0</div><div class="label">Available</div></div>
        <div class="stat-card red"><div class="number" id="s-total">0</div><div class="label">Total Seats</div></div>
      </div>
      <div class="actions">
        <button class="btn btn-primary" onclick="refresh()">Refresh</button>
        <button class="btn btn-outline" onclick="exportCsv()">Export CSV</button>
        <button class="btn btn-danger" onclick="resetAll()">Reset All</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>User</th><th>Email</th><th>Registered</th><th>Actions</th></tr></thead>
          <tbody id="user-table"><tr><td colspan="4" class="empty">Loading...</td></tr></tbody>
        </table>
      </div>
    </div>

    <div class="footer">Red Hat Tech Day Santiago 2026</div>
    <script>
    var adminToken = '__ADMIN_TOKEN__';
    var users = [];

    function login() {
      var t = document.getElementById('token-input').value.trim();
      if (!t) return;
      adminToken = t;
      fetch('/api/users', {headers: {'X-Admin-Token': t}})
        .then(function(r) {
          if (!r.ok) { document.getElementById('login-error').textContent = 'Invalid token'; document.getElementById('login-error').style.display = 'block'; return; }
          return r.json();
        })
        .then(function(data) {
          if (!data) return;
          document.getElementById('login-view').style.display = 'none';
          document.getElementById('admin-view').style.display = 'block';
          renderData(data);
          var url = new URL(window.location);
          url.searchParams.set('token', adminToken);
          window.history.replaceState({}, '', url);
        });
    }

    function refresh() {
      fetch('/api/users', {headers: {'X-Admin-Token': adminToken}})
        .then(function(r) { return r.json(); })
        .then(renderData);
    }

    function renderData(data) {
      users = data.users || [];
      document.getElementById('s-registered').textContent = users.length;
      document.getElementById('s-available').textContent = data.available;
      document.getElementById('s-total').textContent = data.maxUsers;
      var tbody = document.getElementById('user-table');
      if (users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="empty">No registrations yet</td></tr>';
        return;
      }
      var html = '';
      users.forEach(function(u) {
        var dt = new Date(u.registered_at);
        var ts = dt.toLocaleString();
        html += '<tr><td><span class="badge">' + u.username + '</span></td><td>' + u.email + '</td><td>' + ts + '</td><td><button class="btn btn-outline btn-sm" onclick="removeUser(\'' + u.username + '\')">Remove</button></td></tr>';
      });
      tbody.innerHTML = html;
    }

    function removeUser(username) {
      if (!confirm('Remove ' + username + '?')) return;
      fetch('/api/users/delete', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'X-Admin-Token': adminToken},
        body: JSON.stringify({username: username})
      }).then(refresh);
    }

    function resetAll() {
      if (!confirm('Reset ALL registrations? This cannot be undone.')) return;
      fetch('/api/reset', {
        method: 'POST',
        headers: {'X-Admin-Token': adminToken}
      }).then(refresh);
    }

    function exportCsv() {
      var csv = 'Username,Email,Registered At\n';
      users.forEach(function(u) { csv += u.username + ',' + u.email + ',' + u.registered_at + '\n'; });
      var blob = new Blob([csv], {type: 'text/csv'});
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'workshop-registrations.csv';
      a.click();
    }

    if (adminToken && adminToken !== '__ADMIN_TOKEN__') {
      document.getElementById('login-view').style.display = 'none';
      document.getElementById('admin-view').style.display = 'block';
      refresh();
    }
    document.getElementById('token-input').addEventListener('keypress', function(e) { if (e.key === 'Enter') login(); });
    </script>
    </body>
    </html>

  success.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head><meta charset="utf-8"><title>Redirecting...</title></head>
    <body><p>Redirecting to lab environment...</p></body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workshop-registration
  namespace: showroom
  labels:
    app: workshop-registration
    demo.redhat.com/application: "workshop-registration"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workshop-registration
  template:
    metadata:
      labels:
        app: workshop-registration
    spec:
      containers:
        - name: app
          image: registry.access.redhat.com/ubi9/python-311:latest
          command: ["python3", "/app/app.py"]
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: DATA_FILE
              value: "/data/users.json"
            - name: MAX_USERS
              value: {{ .Values.registration.maxUsers | quote }}
            - name: ADMIN_TOKEN
              value: {{ .Values.registration.adminToken | quote }}
            - name: SHOWROOM_URL
              value: {{ $showroomUrl | quote }}
            - name: CLUSTER_DOMAIN
              value: {{ $domain | quote }}
            - name: KEYCLOAK_URL
              value: {{ $keycloakUrl | quote }}
            - name: KEYCLOAK_REALM
              value: {{ .Values.keycloak.realm | quote }}
            - name: KEYCLOAK_ADMIN_USER
              value: {{ .Values.keycloak.adminUser | quote }}
            - name: KEYCLOAK_ADMIN_PASSWORD
              value: {{ .Values.keycloak.adminPassword | quote }}
          volumeMounts:
            - name: app-code
              mountPath: /app
            - name: data
              mountPath: /data
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: app-code
          configMap:
            name: workshop-registration-app
        - name: data
          persistentVolumeClaim:
            claimName: workshop-registration-data
---
apiVersion: v1
kind: Service
metadata:
  name: workshop-registration
  namespace: showroom
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app: workshop-registration
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: workshop-registration
  namespace: showroom
spec:
  host: workshop-registration.{{ $domain }}
  to:
    kind: Service
    name: workshop-registration
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
{{- end }}
