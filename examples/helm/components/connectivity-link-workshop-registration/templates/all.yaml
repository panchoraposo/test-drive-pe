  app.py: |
    #!/usr/bin/env python3
    """Workshop Registration Service."""
    import http.server, json, os, datetime, urllib.request, urllib.parse, ssl, threading, hashlib

    DATA_FILE = os.environ.get('DATA_FILE', '/data/users.json')
    MAX_USERS = int(os.environ.get('MAX_USERS', '200'))
    ADMIN_TOKEN = os.environ.get('ADMIN_TOKEN', 'change-me')
    SHOWROOM_URL = os.environ.get('SHOWROOM_URL', '')
    CLUSTER_DOMAIN = os.environ.get('CLUSTER_DOMAIN', '')
    KEYCLOAK_URL = os.environ.get('KEYCLOAK_URL', '')
    KEYCLOAK_REALM = os.environ.get('KEYCLOAK_REALM', 'backstage')
    KEYCLOAK_ADMIN_USER = os.environ.get('KEYCLOAK_ADMIN_USER', 'admin')
    KEYCLOAK_ADMIN_PASSWORD = os.environ.get('KEYCLOAK_ADMIN_PASSWORD', '')
    PORT = int(os.environ.get('PORT', '8080'))

    lock = threading.Lock()
    ssl_ctx = ssl.create_default_context()
    ssl_ctx.check_hostname = False
    ssl_ctx.verify_mode = ssl.CERT_NONE

    def load_users():
        try:
            with open(DATA_FILE) as f:
                return json.load(f)
        except (FileNotFoundError, json.JSONDecodeError):
            return []

    def save_users(users):
        os.makedirs(os.path.dirname(DATA_FILE), exist_ok=True)
        with open(DATA_FILE, 'w') as f:
            json.dump(users, f, indent=2)

    def keycloak_token():
        if not KEYCLOAK_URL or not KEYCLOAK_ADMIN_PASSWORD:
            return None
        data = urllib.parse.urlencode({
            'grant_type': 'password', 'client_id': 'admin-cli',
            'username': KEYCLOAK_ADMIN_USER, 'password': KEYCLOAK_ADMIN_PASSWORD,
        }).encode()
        req = urllib.request.Request(
            KEYCLOAK_URL + '/realms/master/protocol/openid-connect/token',
            data=data, headers={'Content-Type': 'application/x-www-form-urlencoded'})
        try:
            with urllib.request.urlopen(req, context=ssl_ctx, timeout=10) as r:
                return json.loads(r.read())['access_token']
        except Exception as e:
            print(f'Keycloak token error: {e}')
            return None

    def keycloak_update_email(username, email):
        token = keycloak_token()
        if not token:
            return
        try:
            url = KEYCLOAK_URL + f'/admin/realms/{KEYCLOAK_REALM}/users?username={username}&exact=true'
            req = urllib.request.Request(url, headers={'Authorization': f'Bearer {token}'})
            with urllib.request.urlopen(req, context=ssl_ctx, timeout=10) as r:
                users = json.loads(r.read())
            if not users:
                return
            uid = users[0]['id']
            body = json.dumps({'email': email, 'emailVerified': True}).encode()
            req = urllib.request.Request(
                KEYCLOAK_URL + f'/admin/realms/{KEYCLOAK_REALM}/users/{uid}',
                data=body, method='PUT',
                headers={'Authorization': f'Bearer {token}', 'Content-Type': 'application/json'})
            urllib.request.urlopen(req, context=ssl_ctx, timeout=10)
            print(f'Keycloak: updated {username} email to {email}')
        except Exception as e:
            print(f'Keycloak update error for {username}: {e}')

    REGISTRATION_HTML = open('/app/index.html').read() if os.path.exists('/app/index.html') else '<h1>Registration</h1>'
    ADMIN_HTML = open('/app/admin.html').read() if os.path.exists('/app/admin.html') else '<h1>Admin</h1>'
    SUCCESS_HTML = open('/app/success.html').read() if os.path.exists('/app/success.html') else '<h1>Success</h1>'

    class Handler(http.server.BaseHTTPRequestHandler):
        def log_message(self, fmt, *args):
            print(f'{self.client_address[0]} - {fmt % args}')

        def send_json(self, data, code=200):
            body = json.dumps(data).encode()
            self.send_response(code)
            self.send_header('Content-Type', 'application/json')
            self.send_header('Content-Length', str(len(body)))
            self.send_header('Access-Control-Allow-Origin', '*')
            self.end_headers()
            self.wfile.write(body)

        def send_html(self, html, code=200):
            body = html.encode()
            self.send_response(code)
            self.send_header('Content-Type', 'text/html; charset=utf-8')
            self.send_header('Content-Length', str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def check_admin(self):
            auth = self.headers.get('Authorization', '')
            token = self.headers.get('X-Admin-Token', '')
            qp = urllib.parse.parse_qs(urllib.parse.urlparse(self.path).query)
            qt = qp.get('token', [''])[0]
            valid = ADMIN_TOKEN
            if token == valid or qt == valid or auth == f'Bearer {valid}':
                return True
            self.send_json({'error': 'Unauthorized'}, 401)
            return False

        def do_OPTIONS(self):
            self.send_response(204)
            self.send_header('Access-Control-Allow-Origin', '*')
            self.send_header('Access-Control-Allow-Methods', 'GET, POST, DELETE, OPTIONS')
            self.send_header('Access-Control-Allow-Headers', 'Content-Type, Authorization, X-Admin-Token')
            self.end_headers()

        def do_GET(self):
            parsed = urllib.parse.urlparse(self.path)
            path = parsed.path.rstrip('/')
            if path == '' or path == '/index.html':
                self.send_html(REGISTRATION_HTML)
            elif path == '/admin':
                qp = urllib.parse.parse_qs(parsed.query)
                qt = qp.get('token', [''])[0]
                if qt != ADMIN_TOKEN:
                    self.send_html(ADMIN_HTML.replace('__ADMIN_TOKEN__', ''))
                else:
                    self.send_html(ADMIN_HTML.replace('__ADMIN_TOKEN__', qt))
            elif path == '/api/users':
                if not self.check_admin():
                    return
                with lock:
                    users = load_users()
                self.send_json({'users': users, 'maxUsers': MAX_USERS, 'available': MAX_USERS - len(users)})
            elif path == '/api/health':
                self.send_json({'status': 'ok', 'registered': len(load_users()), 'maxUsers': MAX_USERS})
            else:
                self.send_json({'error': 'Not found'}, 404)

        def do_POST(self):
            parsed = urllib.parse.urlparse(self.path)
            path = parsed.path.rstrip('/')
            content_length = int(self.headers.get('Content-Length', 0))
            body = self.rfile.read(content_length) if content_length > 0 else b'{}'

            if path == '/api/register':
                try:
                    data = json.loads(body)
                except json.JSONDecodeError:
                    self.send_json({'error': 'Invalid JSON'}, 400)
                    return
                email = data.get('email', '').strip().lower()
                if not email or '@' not in email:
                    self.send_json({'error': 'Valid email required'}, 400)
                    return
                with lock:
                    users = load_users()
                    for u in users:
                        if u['email'] == email:
                            redirect = f'{SHOWROOM_URL}/?USER_NAME={u["username"]}&CLUSTER_DOMAIN={CLUSTER_DOMAIN}'
                            self.send_json({'username': u['username'], 'redirect': redirect, 'existing': True})
                            return
                    assigned = set(u['username'] for u in users)
                    username = None
                    for i in range(1, MAX_USERS + 1):
                        candidate = f'user{i}'
                        if candidate not in assigned:
                            username = candidate
                            break
                    if not username:
                        self.send_json({'error': 'All seats are taken. Please contact the workshop administrator.'}, 503)
                        return
                    entry = {
                        'username': username,
                        'email': email,
                        'registered_at': datetime.datetime.now(datetime.timezone.utc).isoformat(),
                    }
                    users.append(entry)
                    save_users(users)
                threading.Thread(target=keycloak_update_email, args=(username, email), daemon=True).start()
                redirect = f'{SHOWROOM_URL}/?USER_NAME={username}&CLUSTER_DOMAIN={CLUSTER_DOMAIN}'
                self.send_json({'username': username, 'redirect': redirect, 'existing': False})

            elif path == '/api/reset':
                if not self.check_admin():
                    return
                with lock:
                    save_users([])
                self.send_json({'message': 'All registrations cleared'})

            elif path == '/api/users/delete':
                if not self.check_admin():
                    return
                try:
                    data = json.loads(body)
                except json.JSONDecodeError:
                    self.send_json({'error': 'Invalid JSON'}, 400)
                    return
                username = data.get('username', '')
                with lock:
                    users = load_users()
                    users = [u for u in users if u['username'] != username]
                    save_users(users)
                self.send_json({'message': f'{username} removed'})

            else:
                self.send_json({'error': 'Not found'}, 404)

    if __name__ == '__main__':
        print(f'Workshop Registration Service starting on port {PORT}')
        print(f'Max users: {MAX_USERS} | Showroom: {SHOWROOM_URL}')
        print(f'Keycloak: {KEYCLOAK_URL or "disabled"} | Realm: {KEYCLOAK_REALM}')
        server = http.server.ThreadingHTTPServer(('0.0.0.0', PORT), Handler)
        server.serve_forever()

