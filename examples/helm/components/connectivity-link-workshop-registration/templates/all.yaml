    .main{flex:1;display:flex;align-items:center;justify-content:center;padding:32px}
    .card{background:#fff;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.1);padding:48px;max-width:480px;width:100%}
    .card h2{font-family:'Red Hat Display',sans-serif;font-size:1.5rem;color:#151515;margin-bottom:8px}
    .card p{color:#6a6e73;font-size:.95rem;margin-bottom:32px;line-height:1.5}
    .form-group{margin-bottom:24px}
    .form-group label{display:block;font-weight:500;color:#151515;margin-bottom:8px;font-size:.9rem}
    .form-group input{width:100%;padding:10px 14px;border:1px solid #d2d2d2;border-radius:4px;font-size:1rem;font-family:'Red Hat Text',sans-serif;transition:border-color .2s}
    .form-group input:focus{outline:none;border-color:#0066cc;box-shadow:0 0 0 1px #0066cc}
    .btn{width:100%;padding:12px;background:#ee0000;color:#fff;border:none;border-radius:4px;font-size:1rem;font-weight:500;cursor:pointer;font-family:'Red Hat Display',sans-serif;transition:background .2s}
    .btn:hover{background:#c00}
    .btn:disabled{background:#d2d2d2;cursor:not-allowed}
    .error{color:#c9190b;font-size:.85rem;margin-top:8px;display:none}
    .success-card{text-align:center}
    .success-card .icon{font-size:48px;color:#3e8635;margin-bottom:16px}
    .success-card h2{color:#3e8635}
    .success-card .username{background:#f0f0f0;border-radius:4px;padding:12px;font-size:1.2rem;font-weight:700;color:#151515;margin:16px 0;font-family:'Red Hat Display',sans-serif}
    .success-card .btn{margin-top:24px;background:#0066cc}
    .success-card .btn:hover{background:#004080}
    .footer{background:#151515;color:#6a6e73;text-align:center;padding:16px;font-size:.8rem}
    .spinner{display:inline-block;width:18px;height:18px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:8px}
    @keyframes spin{to{transform:rotate(360deg)}}
    </style>
    </head>
    <body>
    <div class="header">
      <h1>From Zero To Hero with Red Hat Developer Hub</h1>
    </div>
    <div class="main">
      <div class="card" id="register-card">
        <div style="text-align:center;margin-bottom:24px"><img src="https://mktdevzone.com/redhat/2026/SAC/SOLA_WEST/2604-TechDay-Chile/AGENDA/mailing/imagenes/img-01.jpg" alt="Red Hat Tech Day Chile" style="max-width:100%;height:auto;max-height:80px"></div>
        <h2>Workshop Registration</h2>
        <p>Enter your email to get started. You will be automatically assigned a workshop user and redirected to the lab environment.</p>
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" placeholder="you@company.com" autocomplete="email" autofocus>
          <div class="error" id="error-msg"></div>
        </div>
        <button class="btn" id="register-btn" onclick="register()">Start Workshop</button>
      </div>
      <div class="card success-card" id="success-card" style="display:none">
        <div class="icon">&#10003;</div>
        <h2>You're all set!</h2>
        <p>Your assigned workshop user is:</p>
        <div class="username" id="assigned-user"></div>
        <p style="color:#6a6e73;font-size:.85rem">You will be redirected to the lab environment automatically.</p>
        <button class="btn" id="go-btn" onclick="goToLab()">Open Lab Environment</button>
      </div>
    </div>
    <div class="footer">Red Hat Tech Day Santiago 2026</div>
    <script>
    var redirectUrl = '';
    function register() {
      var email = document.getElementById('email').value.trim();
      var errEl = document.getElementById('error-msg');
      var btn = document.getElementById('register-btn');
      errEl.style.display = 'none';
      if (!email || email.indexOf('@') < 1) {
        errEl.textContent = 'Please enter a valid email address.';
        errEl.style.display = 'block';
        return;
      }
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Registering...';
      fetch('/api/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email: email})
      })
      .then(function(r) { return r.json().then(function(d) { return {ok: r.ok, data: d}; }); })
      .then(function(res) {
        if (!res.ok) {
          errEl.textContent = res.data.error || 'Registration failed.';
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Start Workshop';
          return;
        }
        redirectUrl = res.data.redirect;
        document.getElementById('assigned-user').textContent = res.data.username;
        document.getElementById('register-card').style.display = 'none';
        document.getElementById('success-card').style.display = 'block';
        setTimeout(function() { if (redirectUrl) window.location.href = redirectUrl; }, 3000);
      })
      .catch(function(e) {
        errEl.textContent = 'Network error. Please try again.';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Start Workshop';
      });
    }
    function goToLab() { if (redirectUrl) window.location.href = redirectUrl; }
    document.getElementById('email').addEventListener('keypress', function(e) { if (e.key === 'Enter') register(); });
    </script>
    </body>
    </html>

