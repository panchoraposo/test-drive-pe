    <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Red Hat Text',sans-serif;background:#f0f0f0;min-height:100vh;display:flex;flex-direction:column}
    .header{background:#151515;padding:16px 32px;display:flex;align-items:center;gap:16px}
