apiVersion: v1
kind: Service
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  name: rhbk-service
  namespace: rhbk-operator
spec:
  ports:
  - name: http
    port: 8080
    protocol: TCP
    targetPort: 8080
  - name: management
    port: 9000
    protocol: TCP
    targetPort: 9000
  - name: http-80
    port: 80
    protocol: TCP
    targetPort: 8080
  selector:
    app: keycloak
    app.kubernetes.io/instance: rhbk
    app.kubernetes.io/managed-by: keycloak-operator
  type: ClusterIP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  name: postgresql-db
  namespace: rhbk-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgresql-db
  serviceName: postgresql-db-service
  template:
    metadata:
      labels:
        app: postgresql-db
    spec:
      containers:
      - env:
        - name: POSTGRES_USER
          value: testuser
        - name: POSTGRES_PASSWORD
          value: testpassword
        - name: PGDATA
          value: /data/pgdata
        - name: POSTGRES_DB
          value: keycloak
        image: postgres:15
        name: postgresql-db
        volumeMounts:
        - mountPath: /data
          name: cache-volume
      volumes:
      - emptyDir: {}
        name: cache-volume
---
apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  name: rhbk
  namespace: rhbk-operator
spec:
  additionalOptions:
  - name: http-enabled
    value: "true"
  - name: proxy
    value: edge
  bootstrapAdmin:
    user:
      secret: keycloak-initial-admin
  db:
    database: keycloak
    host: postgres-db
    passwordSecret:
      key: password
      name: keycloak-db-secret
    usernameSecret:
      key: username
      name: keycloak-db-secret
    vendor: postgres
  hostname:
    hostname: rhbk.{{ .Values.clusterDomain }}
  http: {}
  instances: 1
  proxy:
    headers: xforwarded
---
