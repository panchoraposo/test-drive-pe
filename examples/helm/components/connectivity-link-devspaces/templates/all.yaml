apiVersion: org.eclipse.che/v2
kind: CheCluster
metadata:
  annotations:
    argocd.argoproj.io/compare-options: IgnoreExtraneous=true
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "7"
  labels:
    app.kubernetes.io/instance: devspaces
  name: devspaces
  namespace: devspaces
spec:
  components:
    cheServer:
      debug: false
      logLevel: INFO
    dashboard: {}
    devWorkspace: {}
    devfileRegistry: {}
    imagePuller:
      enable: true
      # Let the Dev Spaces operator manage the default image list
      # (see Red Hat Dev Spaces docs: "Cache images for faster workspace start").
    metrics:
      enable: true
    pluginRegistry: {}
  containerRegistry: {}
  devEnvironments:
    startTimeoutSeconds: 600
    defaultNamespace:
      autoProvision: true
      template: <username>-devspaces
    secondsOfRunBeforeIdling: 1800
    storage:
      pvcStrategy: per-user
  gitServices: {}
  networking:
    {{- if .Values.clusterDomain }}
    auth:
      identityProviderURL: "https://rhbk.{{ .Values.clusterDomain }}/realms/backstage"
      oAuthClientName: devspaces
      oAuthSecret: devspaces-oidc-secret
    {{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: devspaces-git-setup
  namespace: devspaces
  annotations:
    argocd.argoproj.io/sync-wave: "8"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: devspaces-git-setup
  annotations:
    argocd.argoproj.io/sync-wave: "8"
rules:
- apiGroups: [""]
  resources: ["secrets", "namespaces"]
  verbs: ["get", "list", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: devspaces-git-setup-binding
  annotations:
    argocd.argoproj.io/sync-wave: "8"
subjects:
- kind: ServiceAccount
  name: devspaces-git-setup
  namespace: devspaces
roleRef:
  kind: ClusterRole
  name: devspaces-git-setup
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: devspaces-gitea-credentials
  namespace: devspaces
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: devspaces-git-setup
      restartPolicy: OnFailure
      containers:
      - name: setup
        image: registry.redhat.io/openshift4/ose-cli:latest
        env:
        - name: GITEA_HOST
          value: "gitea-gitea.{{ .Values.clusterDomain }}"
        - name: USER_COUNT
          value: "{{ .Values.userCount | default 200 }}"
        - name: GITEA_PASSWORD
          value: "redhat"
        command:
        - /bin/bash
        - -c
        - |
          set -e
          echo "Provisioning Gitea git credentials for DevSpaces users..."
          for i in $(seq 1 $USER_COUNT); do
            U="user${i}"
            NS="${U}-devspaces"

            if ! oc get namespace "$NS" &>/dev/null; then
              continue
            fi

            SECRET_NAME="gitea-git-credentials"
            if oc get secret "$SECRET_NAME" -n "$NS" &>/dev/null; then
              continue
            fi

            CRED_LINE="https://${U}:${GITEA_PASSWORD}@${GITEA_HOST}"

            cat <<EOSECRET | oc apply -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: ${SECRET_NAME}
            namespace: ${NS}
            labels:
              controller.devfile.io/mount-to-devworkspace: "true"
              controller.devfile.io/watch-secret: "true"
            annotations:
              controller.devfile.io/mount-path: /etc/secret
              controller.devfile.io/mount-as: subpath
          type: Opaque
          stringData:
            credentials: "${CRED_LINE}"
          EOSECRET

            cat <<EOCONFIG | oc apply -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: devspaces-gitconfig
            namespace: ${NS}
            labels:
              controller.devfile.io/mount-to-devworkspace: "true"
              controller.devfile.io/watch-secret: "true"
            annotations:
              controller.devfile.io/mount-path: /home/user
              controller.devfile.io/mount-as: subpath
          type: Opaque
          stringData:
            .gitconfig: |
              [user]
                  name = ${U}
                  email = ${U}@developer-hub.local
              [credential]
                  helper = store --file /etc/secret/credentials
          EOCONFIG

            echo "Provisioned git credentials for $U in $NS"
          done
          echo "Done provisioning git credentials."
