apiVersion: org.eclipse.che/v2
kind: CheCluster
metadata:
  annotations:
    argocd.argoproj.io/compare-options: IgnoreExtraneous=true
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "7"
  labels:
    app.kubernetes.io/instance: devspaces
  name: devspaces
  namespace: devspaces
spec:
  components:
    cheServer:
      debug: false
      logLevel: INFO
    dashboard: {}
    devWorkspace: {}
    devfileRegistry: {}
    imagePuller:
      enable: true
      # Let the Dev Spaces operator manage the default image list
      # (see Red Hat Dev Spaces docs: "Cache images for faster workspace start").
    metrics:
      enable: true
    pluginRegistry: {}
  containerRegistry: {}
  devEnvironments:
    startTimeoutSeconds: 600
    defaultNamespace:
      autoProvision: true
      template: <username>-devspaces
    secondsOfRunBeforeIdling: 1800
    storage:
      pvcStrategy: per-user
  gitServices: {}
  networking:
    {{- if .Values.clusterDomain }}
    auth:
      identityProviderURL: "https://rhbk.{{ .Values.clusterDomain }}/realms/backstage"
      oAuthClientName: devspaces
      oAuthSecret: devspaces-oidc-secret
    {{- end }}
---
# DevWorkspace Operator (devworkspace-controller) runs in `openshift-operators` and requires a
# `DevWorkspaceOperatorConfig` named `devworkspace-operator-config` in the same namespace.
# Without this, DevWorkspaces fail with:
# "basic routing requires .config.routing.clusterHostSuffix to be set in operator config".
apiVersion: controller.devfile.io/v1alpha1
kind: DevWorkspaceOperatorConfig
metadata:
  name: devworkspace-operator-config
  namespace: openshift-operators
  annotations:
    argocd.argoproj.io/sync-wave: "7"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
config:
  routing:
    clusterHostSuffix: {{ .Values.clusterDomain }}
  workspace:
    # DevSpaces uses container-build SCC to allow SETUID/SETGID during workspace startup.
    containerSecurityContext:
      allowPrivilegeEscalation: true
      capabilities:
        add:
        - SETGID
        - SETUID
    deploymentStrategy: Recreate
    ignoredUnrecoverableEvents:
    - FailedScheduling
    persistUserHome:
      enabled: true
    progressTimeout: 600s
    serviceAccount:
      disableCreation: false
---
# OCP provides `system:openshift:scc:*` ClusterRoles for most SCCs, but some clusters
# (including this workshop environment) may miss `container-build`. Create it so we can
# grant SCC access via RoleBindings in user DevSpaces namespaces.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: system:openshift:scc:container-build
  annotations:
    argocd.argoproj.io/sync-wave: "7"
rules:
- apiGroups: ["security.openshift.io"]
  resources: ["securitycontextconstraints"]
  resourceNames: ["container-build"]
  verbs: ["use"]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: devspaces-git-setup
  namespace: devspaces
  annotations:
    argocd.argoproj.io/sync-wave: "8"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: devspaces-git-setup
  annotations:
    argocd.argoproj.io/sync-wave: "8"
rules:
- apiGroups: [""]
  resources: ["secrets", "namespaces"]
  verbs: ["get", "list", "create", "patch", "update"]
- apiGroups: ["controller.devfile.io"]
  resources: ["devworkspaceoperatorconfigs"]
  verbs: ["get", "list", "patch", "update"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["rolebindings"]
  verbs: ["get", "list", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: devspaces-git-setup-binding
  annotations:
    argocd.argoproj.io/sync-wave: "8"
subjects:
- kind: ServiceAccount
  name: devspaces-git-setup
  namespace: devspaces
roleRef:
  kind: ClusterRole
  name: devspaces-git-setup
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: devspaces-gitea-credentials
  namespace: devspaces
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: devspaces-git-setup
      restartPolicy: OnFailure
      containers:
      - name: setup
        image: registry.redhat.io/openshift4/ose-cli:latest
        env:
        - name: GITEA_HOST
          value: "gitea-gitea.{{ .Values.clusterDomain }}"
        - name: USER_COUNT
          value: "{{ .Values.userCount | default 200 }}"
        - name: GITEA_PASSWORD
          value: "redhat"
        - name: CLUSTER_DOMAIN
          value: "{{ .Values.clusterDomain }}"
        command:
        - /bin/bash
        - -c
        - |
          set -euo pipefail
          # After cold starts/power cycles, DevSpaces may come up without routing.clusterHostSuffix set,
          # which causes DevWorkspaces to fail with: "basic routing requires ... clusterHostSuffix".
          # Make this idempotent and self-healing.
          if [ -n "${CLUSTER_DOMAIN:-}" ]; then
            echo "Ensuring DevWorkspaceOperatorConfig.routing.clusterHostSuffix=${CLUSTER_DOMAIN} ..."
            oc patch devworkspaceoperatorconfig devworkspace-config -n devspaces --type=merge \
              -p "{\"config\":{\"routing\":{\"clusterHostSuffix\":\"${CLUSTER_DOMAIN}\"}}}" >/dev/null 2>&1 || true
          fi
          echo "Provisioning Gitea git credentials for DevSpaces users..."
          for i in $(seq 1 $USER_COUNT); do
            U="user${i}"
            NS="${U}-devspaces"

            if ! oc get namespace "$NS" &>/dev/null; then
              continue
            fi

            # DevSpaces workspaces need container-build SCC (SETUID/SETGID, allowPrivilegeEscalation).
            # Bind SCC access for all serviceaccounts in each user's DevSpaces namespace.
            oc -n "$NS" create rolebinding devspaces-scc-container-build \
              --clusterrole=system:openshift:scc:container-build \
              --group="system:serviceaccounts:${NS}" \
              --dry-run=client -o yaml | oc apply -f -

            SECRET_NAME="gitea-git-credentials"
            # Use a trailing slash so git credential matching works reliably for all repo paths.
            CRED_LINE="https://${U}:${GITEA_PASSWORD}@${GITEA_HOST}/"
            AUTH_B64="$(printf '%s' "${U}:${GITEA_PASSWORD}" | base64 | tr -d '\n')"

            oc -n "$NS" create secret generic "${SECRET_NAME}" \
              --from-literal=credentials="${CRED_LINE}" \
              --type=Opaque \
              --dry-run=client -o yaml | oc apply -f -
            oc -n "$NS" label secret "${SECRET_NAME}" \
              controller.devfile.io/mount-to-devworkspace=true \
              controller.devfile.io/watch-secret=true \
              --overwrite
            oc -n "$NS" annotate secret "${SECRET_NAME}" \
              controller.devfile.io/mount-path=/etc/secret \
              controller.devfile.io/mount-as=subpath \
              --overwrite

            # Use http.extraHeader instead of credential-store on the read-only secret mount.
            # credential-store creates *.lock next to the store file; /etc/secret is not writable
            # and breaks git commit/push from VS Code ("unable to get credential storage lock").
            GITCONFIG="$(printf '[user]\n    name = %s\n    email = %s@developer-hub.local\n[http \"https://%s/\"]\n    extraHeader = AUTHORIZATION: basic %s\n' \
              "$U" "$U" "$GITEA_HOST" "$AUTH_B64")"
            oc -n "$NS" create secret generic devspaces-gitconfig \
              --from-literal=.gitconfig="${GITCONFIG}" \
              --type=Opaque \
              --dry-run=client -o yaml | oc apply -f -
            oc -n "$NS" label secret devspaces-gitconfig \
              controller.devfile.io/mount-to-devworkspace=true \
              controller.devfile.io/watch-secret=true \
              --overwrite
            oc -n "$NS" annotate secret devspaces-gitconfig \
              controller.devfile.io/mount-path=/home/user \
              controller.devfile.io/mount-as=subpath \
              --overwrite

            echo "Provisioned git credentials for $U in $NS"
          done
          echo "Done provisioning git credentials."
