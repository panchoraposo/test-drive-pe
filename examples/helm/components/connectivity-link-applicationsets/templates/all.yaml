apiVersion: v1
kind: Secret
metadata:
  name: gitea-repo-creds
  namespace: openshift-gitops
  labels:
    argocd.argoproj.io/secret-type: repo-creds
stringData:
  type: git
  url: http://gitea-http.gitea.svc.cluster.local:3000
  username: gitea_admin
  password: openshift
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitea-token-creator
  namespace: openshift-gitops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gitea-token-creator
  namespace: openshift-gitops
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitea-token-creator
  namespace: openshift-gitops
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gitea-token-creator
subjects:
- kind: ServiceAccount
  name: gitea-token-creator
  namespace: openshift-gitops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gitea-webhook-sync-pipelines
rules:
- apiGroups: ["tekton.dev"]
  resources: ["pipelineruns"]
  verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gitea-webhook-sync-pipelines
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: gitea-webhook-sync-pipelines
subjects:
- kind: ServiceAccount
  name: gitea-token-creator
  namespace: openshift-gitops
---
apiVersion: batch/v1
kind: Job
metadata:
  name: gitea-argocd-token-setup
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: gitea-token-creator
      containers:
        - name: create-token
          image: quay.io/curl/curl:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              GITEA="http://gitea-http.gitea.svc.cluster.local:3000"
              ADMIN_USER="gitea_admin"
              ADMIN_PASS="openshift"
              KUBE_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              KUBE_API="https://kubernetes.default.svc"
              CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt

              echo "Checking if secret already exists..."
              SC=$(curl -sS -o /dev/null -w "%{http_code}" \
                "$KUBE_API/api/v1/namespaces/openshift-gitops/secrets/gitea-argocd-token" \
                -H "Authorization: Bearer $KUBE_TOKEN" --cacert "$CA" || true)
              if [ "$SC" = "200" ]; then
                echo "Secret gitea-argocd-token already exists. Done."
                exit 0
              fi

              echo "Waiting for Gitea API..."
              for attempt in $(seq 1 60); do
                if curl -sf "$GITEA/api/v1/version" >/dev/null 2>&1; then break; fi
                echo "  attempt $attempt/60 ..."
                sleep 5
              done
              curl -sf "$GITEA/api/v1/version" || { echo "Gitea not available after 5min" >&2; exit 1; }

              echo "Checking for existing Gitea token..."
              EXISTING=$(curl -sS -u "${ADMIN_USER}:${ADMIN_PASS}" \
                "$GITEA/api/v1/users/${ADMIN_USER}/tokens" 2>/dev/null \
                | grep -o '"name":"argocd-scm"' || true)
              if [ -n "$EXISTING" ]; then
                echo "Deleting old token to recreate..."
                curl -sS -o /dev/null -X DELETE \
                  "$GITEA/api/v1/users/${ADMIN_USER}/tokens/argocd-scm" \
                  -u "${ADMIN_USER}:${ADMIN_PASS}" || true
              fi

              echo "Creating Gitea API token..."
              TOKEN_RESP=$(curl -sS -X POST \
                "$GITEA/api/v1/users/${ADMIN_USER}/tokens" \
                -u "${ADMIN_USER}:${ADMIN_PASS}" \
                -H "Content-Type: application/json" \
                -d '{"name":"argocd-scm","scopes":["read:organization","read:repository","read:issue","read:user"]}')
              TOKEN_VAL=$(echo "$TOKEN_RESP" | sed -n 's/.*"sha1":"\([^"]*\)".*/\1/p')
              if [ -z "$TOKEN_VAL" ]; then
                echo "Failed to extract token: $TOKEN_RESP" >&2
                exit 1
              fi

              echo "Creating Secret in openshift-gitops..."
              TOKEN_B64=$(echo -n "$TOKEN_VAL" | base64)
              SECRET_JSON=$(printf '{"apiVersion":"v1","kind":"Secret","metadata":{"name":"gitea-argocd-token","namespace":"openshift-gitops"},"type":"Opaque","data":{"token":"%s"}}' "$TOKEN_B64")
              CODE=$(curl -sS -o /tmp/k8s_resp -w "%{http_code}" \
                -X POST "$KUBE_API/api/v1/namespaces/openshift-gitops/secrets" \
                -H "Authorization: Bearer $KUBE_TOKEN" \
                -H "Content-Type: application/json" \
                --cacert "$CA" \
                -d "$SECRET_JSON" || true)
              if [ "$CODE" = "409" ]; then
                echo "Secret exists, updating..."
                curl -sS -o /dev/null \
                  -X PATCH "$KUBE_API/api/v1/namespaces/openshift-gitops/secrets/gitea-argocd-token" \
                  -H "Authorization: Bearer $KUBE_TOKEN" \
                  -H "Content-Type: application/strategic-merge-patch+json" \
                  --cacert "$CA" \
                  -d "$(printf '{"data":{"token":"%s"}}' "$TOKEN_B64")"
              elif [ "$CODE" != "201" ]; then
                echo "Secret creation failed: HTTP $CODE" >&2
                cat /tmp/k8s_resp >&2 || true
                exit 1
              fi
              echo "Gitea API token stored successfully."
  backoffLimit: 5
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: gitea-webhook-sync
  namespace: openshift-gitops
spec:
  schedule: "*/2 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          serviceAccountName: gitea-token-creator
          containers:
            - name: webhook-sync
              image: quay.io/curl/curl:latest
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  GITEA="http://gitea-http.gitea.svc.cluster.local:3000"
                  ADMIN_USER="gitea_admin"
                  ADMIN_PASS="openshift"
                  DOMAIN="{{ $.Values.clusterDomain }}"
                  USER_COUNT={{ $.Values.userCount | default 200 }}
                  KUBE_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
                  KUBE_API="https://kubernetes.default.svc"
                  CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt

                  # Ensure gitea-argocd-token secret exists
                  SC=$(curl -sS -o /dev/null -w "%{http_code}" \
                    "$KUBE_API/api/v1/namespaces/openshift-gitops/secrets/gitea-argocd-token" \
                    -H "Authorization: Bearer $KUBE_TOKEN" --cacert "$CA" || true)
                  if [ "$SC" != "200" ]; then
                    echo "Creating gitea-argocd-token secret..."
                    EXISTING=$(curl -sS -u "${ADMIN_USER}:${ADMIN_PASS}" \
                      "$GITEA/api/v1/users/${ADMIN_USER}/tokens" 2>/dev/null \
                      | grep -o '"name":"argocd-scm"' || true)
                    if [ -n "$EXISTING" ]; then
                      curl -sS -o /dev/null -X DELETE \
                        "$GITEA/api/v1/users/${ADMIN_USER}/tokens/argocd-scm" \
                        -u "${ADMIN_USER}:${ADMIN_PASS}" || true
                    fi
                    TOKEN_RESP=$(curl -sS -X POST \
                      "$GITEA/api/v1/users/${ADMIN_USER}/tokens" \
                      -u "${ADMIN_USER}:${ADMIN_PASS}" \
                      -H "Content-Type: application/json" \
                      -d '{"name":"argocd-scm","scopes":["read:organization","read:repository","read:issue","read:user"]}')
                    TOKEN_VAL=$(echo "$TOKEN_RESP" | sed -n 's/.*"sha1":"\([^"]*\)".*/\1/p')
                    if [ -n "$TOKEN_VAL" ]; then
                      TOKEN_B64=$(echo -n "$TOKEN_VAL" | base64)
                      curl -sS -o /dev/null -X POST \
                        "$KUBE_API/api/v1/namespaces/openshift-gitops/secrets" \
                        -H "Authorization: Bearer $KUBE_TOKEN" \
                        -H "Content-Type: application/json" --cacert "$CA" \
                        -d "$(printf '{"apiVersion":"v1","kind":"Secret","metadata":{"name":"gitea-argocd-token","namespace":"openshift-gitops"},"type":"Opaque","data":{"token":"%s"}}' "$TOKEN_B64")" || true
                      echo "Secret created."
                    fi
                  fi

                  for i in $(seq 1 $USER_COUNT); do
                    USER="user${i}"
                    ORG="ws-${USER}"
                    NS="${USER}-neuralbank"

                    REPOS=$(curl -sS -u "${ADMIN_USER}:${ADMIN_PASS}" \
                      "${GITEA}/api/v1/orgs/${ORG}/repos?limit=50" 2>/dev/null \
                      | grep -o '"name":"[^"]*"' | sed 's/"name":"//;s/"//' || true)

                    for REPO in $REPOS; do
                      # Migrate legacy DevSpaces factory URLs (.git?devfilePath= or raw.gitea subdomain)
                      # to Gitea /raw/branch/main/devfile.yaml path on the main host (avoids raw.* SAN errors).
                      CATALOG_RESP=$(curl -sS -u "${ADMIN_USER}:${ADMIN_PASS}" \
                        "${GITEA}/api/v1/repos/${ORG}/${REPO}/contents/catalog-info.yaml?ref=main" 2>/dev/null || true)
                      if echo "$CATALOG_RESP" | grep -q '"sha"'; then
                        CATALOG_SHA=$(echo "$CATALOG_RESP" | sed -n 's/.*"sha":"\([^"]*\)".*/\1/p')
                        CATALOG_B64=$(echo "$CATALOG_RESP" | sed -n 's/.*"content":"\([^"]*\)".*/\1/p')
                        if [ -n "$CATALOG_SHA" ] && [ -n "$CATALOG_B64" ]; then
                          CATALOG_CONTENT=$(printf '%s' "$CATALOG_B64" | tr -d '\n' | base64 -d 2>/dev/null || true)
                          if printf '%s' "$CATALOG_CONTENT" | grep -qE 'devfilePath=devfile\.yaml|raw\.gitea-gitea'; then
                            FACTORY_URL="https://devspaces.${DOMAIN}/#https://gitea-gitea.${DOMAIN}/${ORG}/${REPO}/raw/branch/main/devfile.yaml?new"
                            NEW_CATALOG=$(printf '%s' "$CATALOG_CONTENT" | sed \
                              -e 's|\.git?new&devfilePath=devfile\.yaml|/raw/branch/main/devfile.yaml?new|g' \
                              -e 's|raw\.gitea-gitea\.|gitea-gitea.|g' \
                              -e "s|devspaces.io/factory: \"[^\"]*\"|devspaces.io/factory: \"${FACTORY_URL}\"|" \
                              -e "s|- url: \"https://devspaces\\.[^\"]*\"|- url: \"${FACTORY_URL}\"|")
                            if [ "$CATALOG_CONTENT" != "$NEW_CATALOG" ]; then
                              NEW_CATALOG_B64=$(printf '%s' "$NEW_CATALOG" | base64 | tr -d '\n')
                              PUT_CODE=$(curl -sS -o /dev/null -w "%{http_code}" -X PUT \
                                "${GITEA}/api/v1/repos/${ORG}/${REPO}/contents/catalog-info.yaml" \
                                -u "${ADMIN_USER}:${ADMIN_PASS}" \
                                -H "Content-Type: application/json" \
                                -d "$(printf '{"message":"Migrate DevSpaces factory URL to Gitea raw path","content":"%s","sha":"%s","branch":"main"}' "$NEW_CATALOG_B64" "$CATALOG_SHA")" || true)
                              echo "  catalog-info DevSpaces URL migration ${ORG}/${REPO}: HTTP ${PUT_CODE}"
                            fi
                          fi
                        fi
                      fi

                      # If starting from a devfile URL, Che/Dev Spaces only clones repositories defined in `projects:`.
                      # Older workshop repos shipped devfiles without `projects`, which results in an empty workspace.
                      DEVFILE_RESP=$(curl -sS -u "${ADMIN_USER}:${ADMIN_PASS}" \
                        "${GITEA}/api/v1/repos/${ORG}/${REPO}/contents/devfile.yaml?ref=main" 2>/dev/null || true)
                      if echo "$DEVFILE_RESP" | grep -q '"sha"'; then
                        DEVFILE_SHA=$(echo "$DEVFILE_RESP" | sed -n 's/.*"sha":"\([^"]*\)".*/\1/p')
                        DEVFILE_B64=$(echo "$DEVFILE_RESP" | sed -n 's/.*"content":"\([^"]*\)".*/\1/p')
                        if [ -n "$DEVFILE_SHA" ] && [ -n "$DEVFILE_B64" ]; then
                          DEVFILE_CONTENT=$(printf '%s' "$DEVFILE_B64" | tr -d '\n' | base64 -d 2>/dev/null || true)
                          if [ -n "$DEVFILE_CONTENT" ]; then
                            NEW_DEVFILE="$DEVFILE_CONTENT"

                            # Inject `projects:` so workspaces created from a raw devfile URL clone the repo.
                            if ! printf '%s\n' "$NEW_DEVFILE" | grep -qE '^projects:'; then
                              ORIGIN_URL="https://gitea-gitea.${DOMAIN}/${ORG}/${REPO}.git"
                              NEW_DEVFILE=$(printf '%s\n' "$NEW_DEVFILE" | awk -v repo="$REPO" -v origin="$ORIGIN_URL" '
                                BEGIN { inserted=0 }
                                (!inserted && $0 ~ /^components:/) {
                                  print "projects:"
                                  print "  - name: " repo
                                  print "    git:"
                                  print "      remotes:"
                                  print "        origin: " origin
                                  print "      checkoutFrom:"
                                  print "        revision: main"
                                  print ""
                                  inserted=1
                                }
                                { print }
                              ')
                            fi

                            # Avoid flaky Quarkus `package` in DevSpaces build task; compile is enough.
                            NEW_DEVFILE=$(printf '%s\n' "$NEW_DEVFILE" | sed \
                              -e 's|mvn -ntp package -DskipTests|mvn -ntp -DskipTests compile|g')

                            if [ -n "$NEW_DEVFILE" ] && [ "$DEVFILE_CONTENT" != "$NEW_DEVFILE" ]; then
                              NEW_DEVFILE_B64=$(printf '%s' "$NEW_DEVFILE" | base64 | tr -d '\n')
                              PUT_CODE=$(curl -sS -o /dev/null -w "%{http_code}" -X PUT \
                                "${GITEA}/api/v1/repos/${ORG}/${REPO}/contents/devfile.yaml" \
                                -u "${ADMIN_USER}:${ADMIN_PASS}" \
                                -H "Content-Type: application/json" \
                                -d "$(printf '{"message":"Update devfile for DevSpaces auto-clone/build","content":"%s","sha":"%s","branch":"main"}' "$NEW_DEVFILE_B64" "$DEVFILE_SHA")" || true)
                              echo "  devfile migration ${ORG}/${REPO}: HTTP ${PUT_CODE}"
                            fi
                          fi
                        fi
                      fi

                      # neuralbank-backend + customer-service-mcp: keep Istio gateway pods out of the app Service
                      # and normalize MCP REST client API key header (X-API-Key).
                      case "$REPO" in
                        neuralbank-backend|customer-service-mcp)
                          for MFILE in manifests/gateway.yaml manifests/service.yaml manifests/deployment.yaml; do
                            MRESP=$(curl -sS -u "${ADMIN_USER}:${ADMIN_PASS}" \
                              "${GITEA}/api/v1/repos/${ORG}/${REPO}/contents/${MFILE}?ref=main" 2>/dev/null || true)
                            if echo "$MRESP" | grep -q '"sha"'; then
                              MSHA=$(echo "$MRESP" | sed -n 's/.*"sha":"\([^"]*\)".*/\1/p')
                              MB64=$(echo "$MRESP" | sed -n 's/.*"content":"\([^"]*\)".*/\1/p')
                              if [ -n "$MSHA" ] && [ -n "$MB64" ]; then
                                MCONTENT=$(printf '%s' "$MB64" | tr -d '\n' | base64 -d 2>/dev/null || true)
                                if [ -n "$MCONTENT" ]; then
                                  NEW_M="$MCONTENT"
                                  if [ "$MFILE" = "manifests/gateway.yaml" ] && printf '%s' "$NEW_M" | grep -q "kind: Gateway" \
                                    && ! printf '%s' "$NEW_M" | grep -q "app.kubernetes.io/name: ${REPO}-gateway"; then
                                    NEW_M=$(printf '%s' "$NEW_M" | sed "s|app.kubernetes.io/name: ${REPO}|app.kubernetes.io/name: ${REPO}-gateway|")
                                  fi
                                  if [ "$MFILE" = "manifests/service.yaml" ] && ! printf '%s' "$NEW_M" | grep -q 'app.kubernetes.io/component: application'; then
                                    NEW_M=$(printf '%s' "$NEW_M" | awk '
                                      /^  selector:/ { sel=1 }
                                      sel && /app.kubernetes.io\/name:/ { print; print "    app.kubernetes.io/component: application"; sel=0; next }
                                      { print }
                                    ')
                                  fi
                                  if [ "$MFILE" = "manifests/deployment.yaml" ] && ! printf '%s' "$NEW_M" | grep -q 'app.kubernetes.io/component: application'; then
                                    NEW_M=$(printf '%s' "$NEW_M" | awk '
                                      /^  selector:/ { dep=1 }
                                      dep && /matchLabels:/ { ml=1 }
                                      ml && /app.kubernetes.io\/name:/ { print; print "      app.kubernetes.io/component: application"; ml=0; next }
                                      /^      labels:/ { pod=1 }
                                      pod && /app.kubernetes.io\/name:/ { print; print "        app.kubernetes.io/component: application"; pod=0; next }
                                      /^  labels:/ { top=1 }
                                      top && /app.kubernetes.io\/name:/ { print; print "    app.kubernetes.io/component: application"; top=0; next }
                                      { print }
                                    ')
                                  fi
                                  if [ "$MCONTENT" != "$NEW_M" ]; then
                                    NEW_M_B64=$(printf '%s' "$NEW_M" | base64 | tr -d '\n')
                                    PUT_CODE=$(curl -sS -o /dev/null -w "%{http_code}" -X PUT \
                                      "${GITEA}/api/v1/repos/${ORG}/${REPO}/contents/${MFILE}" \
                                      -u "${ADMIN_USER}:${ADMIN_PASS}" \
                                      -H "Content-Type: application/json" \
                                      -d "$(printf '{"message":"Fix app Service selector vs Istio gateway","content":"%s","sha":"%s","branch":"main"}' "$NEW_M_B64" "$MSHA")" || true)
                                    echo "  manifest migration ${ORG}/${REPO}/${MFILE}: HTTP ${PUT_CODE}"
                                  fi
                                fi
                              fi
                            fi
                          done
                          if [ "$REPO" = "customer-service-mcp" ]; then
                            PRESP=$(curl -sS -u "${ADMIN_USER}:${ADMIN_PASS}" \
                              "${GITEA}/api/v1/repos/${ORG}/${REPO}/contents/src/main/resources/application.properties?ref=main" 2>/dev/null || true)
                            if echo "$PRESP" | grep -q '"sha"'; then
                              PSHA=$(echo "$PRESP" | sed -n 's/.*"sha":"\([^"]*\)".*/\1/p')
                              PB64=$(echo "$PRESP" | sed -n 's/.*"content":"\([^"]*\)".*/\1/p')
                              if [ -n "$PSHA" ] && [ -n "$PB64" ]; then
                                PCONTENT=$(printf '%s' "$PB64" | tr -d '\n' | base64 -d 2>/dev/null || true)
                                NEW_P=$(printf '%s' "$PCONTENT" | sed \
                                  -e 's|quarkus.rest-client."customerclient".headers.x-api-key=devspaces|quarkus.rest-client."customerclient".headers."X-API-Key"=devspaces|g')
                                if [ -n "$PCONTENT" ] && [ "$PCONTENT" != "$NEW_P" ]; then
                                  NEW_P_B64=$(printf '%s' "$NEW_P" | base64 | tr -d '\n')
                                  PUT_CODE=$(curl -sS -o /dev/null -w "%{http_code}" -X PUT \
                                    "${GITEA}/api/v1/repos/${ORG}/${REPO}/contents/src/main/resources/application.properties" \
                                    -u "${ADMIN_USER}:${ADMIN_PASS}" \
                                    -H "Content-Type: application/json" \
                                    -d "$(printf '{"message":"Use X-API-Key for backend REST client","content":"%s","sha":"%s","branch":"main"}' "$NEW_P_B64" "$PSHA")" || true)
                                  echo "  application.properties migration ${ORG}/${REPO}: HTTP ${PUT_CODE}"
                                fi
                              fi
                            fi
                          fi
                          ;;
                      esac

                      HOOKS=$(curl -sS -u "${ADMIN_USER}:${ADMIN_PASS}" \
                        "${GITEA}/api/v1/repos/${ORG}/${REPO}/hooks" 2>/dev/null || echo "[]")

                      LISTENER_SVC="http://el-${REPO}-listener.${NS}.svc.cluster.local:8080"
                      LISTENER_EXT="https://el-${REPO}-listener-${NS}.${DOMAIN}"

                      # Migrate old external-URL webhooks to internal service URL
                      OLD_HOOK_ID=$(echo "$HOOKS" | grep -o "\"id\":[0-9]*" | head -1 | sed 's/"id"://')
                      if [ -n "$OLD_HOOK_ID" ] && echo "$HOOKS" | grep -q "$LISTENER_EXT"; then
                        echo "Migrating webhook ${OLD_HOOK_ID} for ${ORG}/${REPO}: external → internal"
                        curl -sS -o /dev/null -X PATCH \
                          "${GITEA}/api/v1/repos/${ORG}/${REPO}/hooks/${OLD_HOOK_ID}" \
                          -u "${ADMIN_USER}:${ADMIN_PASS}" \
                          -H "Content-Type: application/json" \
                          -d "{\"config\":{\"url\":\"${LISTENER_SVC}\",\"content_type\":\"json\"},\"active\":true}" || true
                      fi

                      if echo "$HOOKS" | grep -q "$LISTENER_SVC"; then
                        # Webhook only; initial build is owned by the Argo CD initial-build-job hook.
                        continue
                      fi

                      echo "Creating webhook for ${ORG}/${REPO} → ${LISTENER_SVC}"
                      curl -sS -o /dev/null -X POST \
                        "${GITEA}/api/v1/repos/${ORG}/${REPO}/hooks" \
                        -u "${ADMIN_USER}:${ADMIN_PASS}" \
                        -H "Content-Type: application/json" \
                        -d "{\"type\":\"gitea\",\"config\":{\"url\":\"${LISTENER_SVC}\",\"content_type\":\"json\"},\"events\":[\"push\"],\"active\":true}" || true
                    done
                  done
                  echo "Webhook sync complete."
      backoffLimit: 1
---
{{- $userCount := .Values.userCount | default 200 | int }}
{{- range $i := until $userCount }}
{{- $user := printf "user%d" (add1 $i) }}
{{- $org := printf "ws-%s" $user }}
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: {{ $org }}-repos
  namespace: openshift-gitops
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - scmProvider:
        gitea:
          owner: {{ $org }}
          api: http://gitea-http.gitea.svc.cluster.local:3000
          allBranches: false
          tokenRef:
            secretName: gitea-argocd-token
            key: token
        filters:
          - repositoryMatch: ".*"
            pathsExist:
              - manifests
        requeueAfterSeconds: 60
  template:
    metadata:
      name: '{{ $user }}-{{ "{{ .repository }}" }}'
      namespace: openshift-gitops
      labels:
        backstage.io/kubernetes-id: '{{ $user }}-{{ "{{ .repository }}" }}'
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source:
        repoURL: 'http://gitea-http.gitea.svc.cluster.local:3000/{{ "{{ .organization }}" }}/{{ "{{ .repository }}" }}.git'
        targetRevision: main
        path: manifests
      destination:
        server: https://kubernetes.default.svc
        namespace: {{ $user }}-neuralbank
      # Workshop repos may share certain resources (Tekton Tasks, shared RBAC, etc.).
      # Ignore benign/operator-added drift and Argo tracking-id differences so apps stay Synced.
      ignoreDifferences:
        # Allow scaling via `oc scale` / OpenShift Lightspeed without GitOps reverting it.
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/replicas
        - group: tekton.dev
          kind: Task
          jsonPointers:
            - /spec/steps/0/computeResources
            - /metadata/annotations/argocd.argoproj.io~1tracking-id
        - group: triggers.tekton.dev
          kind: EventListener
          jsonPointers:
            - /spec/namespaceSelector
            - /spec/resources
            - /spec/triggers/0/bindings/0/kind
            - /metadata/annotations/argocd.argoproj.io~1tracking-id
        - group: gateway.networking.k8s.io
          kind: HTTPRoute
          jsonPointers:
            - /spec/parentRefs/0/group
            - /spec/parentRefs/0/kind
            - /metadata/annotations/argocd.argoproj.io~1tracking-id
        - group: rbac.authorization.k8s.io
          kind: ClusterRoleBinding
          jsonPointers:
            - /metadata/annotations/argocd.argoproj.io~1tracking-id
        - group: rbac.authorization.k8s.io
          kind: Role
          jsonPointers:
