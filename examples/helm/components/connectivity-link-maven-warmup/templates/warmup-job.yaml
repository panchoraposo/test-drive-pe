apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nexus-anyuid
  namespace: {{ .Values.mavenWarmup.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
subjects:
  - kind: ServiceAccount
    name: nexus-repository-manager
    namespace: {{ .Values.mavenWarmup.namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: maven-warmup-once
  namespace: {{ .Values.mavenWarmup.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: warmup
          image: maven:3.9-eclipse-temurin-17
          command: ["bash","-lc"]
          args:
            - |
              set -euo pipefail
              NEXUS="http://{{ .Values.mavenWarmup.nexusServiceHost }}:{{ .Values.mavenWarmup.nexusPort }}"

              echo "Waiting for Nexus at ${NEXUS}..."
              for i in $(seq 1 240); do
                curl -fsS "${NEXUS}/service/rest/v1/status" >/dev/null && break || true
                sleep 2
              done

              mkdir -p /tmp/.m2/repository /tmp/warm/backend /tmp/warm/mcp

              cat > /tmp/settings.xml <<'EOF'
              <settings>
                <mirrors>
                  <mirror>
                    <id>central</id>
                    <mirrorOf>central</mirrorOf>
                    <url>http://nexus-repository-manager.maven-repo.svc.cluster.local:8081/repository/maven-central/</url>
                  </mirror>
                  <mirror>
                    <id>redhat-ga</id>
                    <mirrorOf>redhat-ga</mirrorOf>
                    <url>http://nexus-repository-manager.maven-repo.svc.cluster.local:8081/repository/redhat-ga/</url>
                  </mirror>
                </mirrors>
              </settings>
              EOF

              warm_pom() {
                local name="$1"
                local url="$2"
                local dir="$3"
                echo "Downloading ${name} pom from ${url}"
                curl -fsSLo "${dir}/pom.xml" "${url}"
                echo "Warming Maven cache for ${name} (dependency:go-offline)"
                mvn -q -s /tmp/settings.xml \
                  -Dmaven.repo.local=/tmp/.m2/repository \
                  -Dmaven.wagon.http.retryHandler.count=3 \
                  -Dmaven.wagon.httpconnectionManager.ttlSeconds=120 \
                  -DskipTests \
                  -f "${dir}/pom.xml" \
                  dependency:go-offline || echo "WARN: warmup failed for ${name}"
              }

              warm_pom "backend" "{{ .Values.mavenWarmup.backendPomUrl }}" "/tmp/warm/backend"
              warm_pom "mcp" "{{ .Values.mavenWarmup.mcpPomUrl }}" "/tmp/warm/mcp"

              echo "Warmup done."
