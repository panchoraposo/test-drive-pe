apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nexus-anyuid
  namespace: {{ .Values.mavenWarmup.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
subjects:
  - kind: ServiceAccount
    name: nexus-repository-manager
    namespace: {{ .Values.mavenWarmup.namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: maven-warmup-once
  namespace: {{ .Values.mavenWarmup.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: warmup
          image: docker.io/curlimages/curl:8.12.1
          command: ["sh","-c"]
          args:
            - |
              set -eu
              NEXUS="http://{{ .Values.mavenWarmup.nexusServiceHost }}:{{ .Values.mavenWarmup.nexusPort }}"
              CENTRAL="${NEXUS}/repository/maven-central"
              RHGA="${NEXUS}/repository/redhat-ga"

              echo "Waiting for Nexus at ${NEXUS}..."
              for i in $(seq 1 240); do
                curl -fsS "${NEXUS}/service/rest/v1/status" >/dev/null && break || true
                sleep 2
              done

              fetch_url() {
                url="$1"
                echo "GET $url"
                code="$(curl -sS -o /dev/null -w '%{http_code}' "$url" || true)"
                if [ "$code" != "200" ]; then
                  echo "WARN: $url -> HTTP $code"
                fi
              }

              fetch_gav() {
                base="$1"
                group="$2"
                art="$3"
                ver="$4"
                ext="$5"
                groupPath="$(echo "$group" | tr '.' '/')"
                fetch_url "${base}/${groupPath}/${art}/${ver}/${art}-${ver}.${ext}"
              }

              # Quarkus backend template (old Quarkus for RHDA demo)
              fetch_gav "$RHGA" "io.quarkus" "quarkus-bom" "3.15.7.redhat-00001" "pom"
              fetch_gav "$RHGA" "io.quarkus" "quarkus-maven-plugin" "3.15.7.redhat-00001" "pom"
              fetch_gav "$RHGA" "io.quarkus" "quarkus-maven-plugin" "3.15.7.redhat-00001" "jar"
              fetch_gav "$RHGA" "io.quarkus" "quarkus-rest" "3.15.7.redhat-00001" "pom"
              fetch_gav "$RHGA" "io.quarkus" "quarkus-rest" "3.15.7.redhat-00001" "jar"
              fetch_gav "$RHGA" "io.quarkus" "quarkus-rest-jackson" "3.15.7.redhat-00001" "pom"
              fetch_gav "$RHGA" "io.quarkus" "quarkus-rest-jackson" "3.15.7.redhat-00001" "jar"
              fetch_gav "$RHGA" "io.quarkus" "quarkus-smallrye-openapi" "3.15.7.redhat-00001" "pom"
              fetch_gav "$RHGA" "io.quarkus" "quarkus-smallrye-openapi" "3.15.7.redhat-00001" "jar"

              # MCP template (newer Quarkus + MCP extension)
              fetch_gav "$RHGA" "io.quarkus" "quarkus-bom" "3.27.3.redhat-00002" "pom"
              fetch_gav "$RHGA" "io.quarkus" "quarkus-maven-plugin" "3.27.3.redhat-00002" "pom"
              fetch_gav "$RHGA" "io.quarkus" "quarkus-maven-plugin" "3.27.3.redhat-00002" "jar"
              fetch_gav "$RHGA" "io.quarkiverse.mcp" "quarkus-mcp-server-http" "1.7.0.redhat-00001" "pom"
              fetch_gav "$RHGA" "io.quarkiverse.mcp" "quarkus-mcp-server-http" "1.7.0.redhat-00001" "jar"

              echo "Warmup done."
