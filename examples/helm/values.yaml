# ============================================================
# Helm Chart Applications (deployed via ArgoCD Helm source)
# These install third-party charts from external Helm repos
# ============================================================
  helmApps:
    - id: gitea
      enabled: true
      repoURL: "https://dl.gitea.com/charts/"
      chart: gitea
      targetRevision: "12.5.0"
      destinationNamespace: gitea
      syncWave: "3"
      values:
        strategy:
          type: Recreate
        global:
          compatibility:
            openshift:
              adaptSecurityContext: force
        gitea:
          admin:
            username: gitea_admin
            password: openshift
            email: admin@gitea.local
          config:
            security:
              MIN_PASSWORD_LENGTH: 6
              PASSWORD_COMPLEXITY: "off"
            # Workshop: avoid external Redis/Valkey dependencies. A broken cluster cache makes
            # `/contents/<path>` fail, which breaks Argo CD ApplicationSet SCM generators.
            session:
              PROVIDER: memory
            cache:
              ADAPTER: memory
            queue:
              TYPE: level
        postgresql-ha:
          enabled: false
        postgresql:
          enabled: true
          primary:
            resources:
              requests:
                cpu: 250m
                memory: 256Mi
              limits:
                cpu: "1"
                memory: 512Mi
        redis-cluster:
          enabled: false
        redis:
          enabled: false
        # Workshop: 200 Argo CD ApplicationSet SCM polls hammer the API; without CPU
        # requests Gitea throttles and publish:gitea repo create takes 6-10s+.
        resources:
          requests:
            cpu: 500m
            memory: 768Mi
          limits:
            cpu: "2"
            memory: 1536Mi
        persistence:
          enabled: true
          size: 10Gi
        service:
          http:
            type: ClusterIP
            port: 3000
    - id: nexus
      enabled: true
      repoURL: "https://sonatype.github.io/helm3-charts/"
      chart: nexus-repository-manager
      targetRevision: "61.0.2"
      destinationNamespace: maven-repo
      syncWave: "4"
      values:
        nexus:
          securityContext: {}
          env:
            - name: NEXUS_SECURITY_RANDOMPASSWORD
              value: "true"
        persistence:
          enabled: true
          accessMode: ReadWriteOnce
          storageSize: 50Gi
        service:
          name: nexus3
          type: ClusterIP
        deployment:
          additionalContainers:
            - name: nexus-bootstrap
              image: docker.io/curlimages/curl:8.12.1
              imagePullPolicy: IfNotPresent
              command: ["sh","-c"]
              args:
                - |
                  set -u
                  echo "[nexus-bootstrap] waiting for Nexus..."
                  for i in $(seq 1 240); do
                    curl -fsS http://127.0.0.1:8081/service/rest/v1/status >/dev/null && break || true
                    sleep 2
                  done

                  PASS="$(cat /nexus-data/admin.password 2>/dev/null || true)"
                  if [ -z "${PASS}" ]; then
                    echo "[nexus-bootstrap] admin.password missing; nothing to do"
                    sleep infinity
                  fi

                  if curl -fsS -u "admin:${PASS}" http://127.0.0.1:8081/service/rest/v1/repositories | grep -q '"name"\\s*:\\s*"redhat-ga"'; then
                    echo "[nexus-bootstrap] redhat-ga already present"
                    sleep infinity
                  fi

                  echo "[nexus-bootstrap] creating redhat-ga proxy repo (based on maven-central)"
                  payload='{"name":"redhat-ga","online":true,"storage":{"blobStoreName":"default","strictContentTypeValidation":false,"writePolicy":"ALLOW"},"cleanup":null,"proxy":{"remoteUrl":"https://maven.repository.redhat.com/ga/","contentMaxAge":-1,"metadataMaxAge":1440},"negativeCache":{"enabled":true,"timeToLive":1440},"httpClient":{"blocked":false,"autoBlock":false,"connection":{"retries":null,"userAgentSuffix":null,"timeout":null,"enableCircularRedirects":false,"enableCookies":false,"useTrustStore":false},"authentication":null},"routingRuleName":null,"maven":{"versionPolicy":"RELEASE","layoutPolicy":"PERMISSIVE","contentDisposition":"INLINE"},"format":"maven2","type":"proxy"}'

                  code="$(curl -sS -o /tmp/resp.txt -w '%{http_code}' -u "admin:${PASS}" -H 'Content-Type: application/json' \
                    -X POST http://127.0.0.1:8081/service/rest/v1/repositories/maven/proxy \
                    -d "${payload}" || true)"
                  if [ "${code}" != "201" ] && [ "${code}" != "204" ]; then
                    echo "[nexus-bootstrap] create repo failed (HTTP ${code})"
                    cat /tmp/resp.txt || true
                    sleep infinity
                  fi
                  echo "[nexus-bootstrap] redhat-ga created (HTTP ${code})"
                  sleep infinity
              volumeMounts:
                - name: nexus-repository-manager-data
                  mountPath: /nexus-data
    - id: openshift-mcp-server
      enabled: true
      repoURL: "https://maximilianoPizarro.github.io/openshift-mcp-server"
      chart: openshift-mcp-server
      targetRevision: "0.1.0-alpha"
      destinationNamespace: openshift-lightspeed
      syncWave: "8"
      values:
        namespace: openshift-lightspeed
        kubernetesMcp:
          enabled: false
        litellm:
          model:
            name: qwen25-7b-instruct
            modelId: qwen25-7b-instruct
            apiBase: "http://mock-llm.openshift-lightspeed.svc.cluster.local:8080/v1"
            apiKey: "sk-no-key"
    - id: n8n
      enabled: true
      repoURL: "https://maximilianopizarro.github.io/n8n-helm-chart/"
      chart: n8n
      targetRevision: "1.16.0"
      destinationNamespace: openshift-lightspeed
      syncWave: "8"
      values:
        mailpit:
          enabled: true
          route:
            enabled: true

# ============================================================
# Lightspeed / MCP — LLM provider config for OLS component
# Keys are injected at deploy time (RHDP or --set), NOT in git
# ============================================================
lightspeed:
  llmApiKey: "sk-openshift-mcp-1234"
  llmEndpoint: "http://openshift-mcp-server-litellm.openshift-lightspeed.svc.cluster.local:4000/v1"
  model: "qwen25-7b-instruct"

# ============================================================
# User Scaling — single parameter controls all user provisioning
# Keycloak users, DevSpaces namespaces, RBAC policy, workshop registration
# Recommended: 30 (small), 50 (medium), 100 (large), 200 (extra-large)
# See README.md "Cluster Sizing" for node/resource recommendations
# ============================================================
userCount: 50

# ============================================================
# Workshop Registration Portal
# ============================================================
workshopRegistration:
  adminToken: "workshop-admin-2024"
  keycloakAdminPassword: ""

# ============================================================
# Components - Enable/disable and configure each component
# ============================================================
components:

  # --- Operator Installation (single OLM subscription, template repo) ---
  operator:
    enabled: false
    name: web-terminal
    namespace: openshift-operators
    channel: fast
    source: redhat-operators
    sourceNamespace: openshift-marketplace
    installPlanApproval: Automatic

  # --- Hello World Demo Application ---
  helloWorld:
    enabled: false
    namespace: terminal-demo
    appName: hello-world
    replicas: 1
    image: registry.redhat.io/ubi8/httpd-24:latest
    userInfo:
      enabled: true
      title: "Web Terminal Demo"
      instructions: "Access the Showroom lab guide, then click the terminal icon (>_) in the OpenShift console."

  # --- Showroom Lab Guide ---
  showroom:
    enabled: true
    namespace: showroom
    name: showroom
    content:
      repoUrl: "https://github.com/panchoraposo/showroom-from-zero-to-hero.git"
      repoRef: "main"
      antoraPlaybook: "site.yml"
      image: "quay.io/rhpds/showroom-content:v1.3.1"
    nookbag:
      enabled: true
      bundleUrl: "https://github.com/rhpds/nookbag/releases/download/nookbag-v0.2.1/nookbag-v0.2.1.zip"
    terminal:
      enabled: true
      image: "quay.io/rhpds/openshift-showroom-terminal-ocp:latest"
      resources:
        requests:
          cpu: "500m"
          memory: "512Mi"
        limits:
          cpu: "500m"
          memory: "1Gi"

# ============================================================
# Values injected by field content workload (do not modify)
# ============================================================
deployer:
  domain: "apps.cluster-rd2gb.dynamic2.redhatworkshops.io"
  apiUrl: ""

fieldContent:
  deploymentType: "helm"
