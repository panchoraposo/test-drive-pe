# Field Content Demo - App of Apps
# This chart deploys multiple components as separate ArgoCD Applications

# ============================================================
# GitOps Configuration
# ============================================================
gitops:
  # Repository containing the component charts (your fork or this template)
  repoUrl: "https://github.com/panchoraposo/test-drive-pe.git"
  revision: "main"
  basePath: "examples/helm"

# ArgoCD settings
argocd:
  namespace: openshift-gitops
  project: default

# ============================================================
# Connectivity Link (vendored from GitLab connectivity-link)
# One Argo CD Application per entry; paths under components/connectivity-link-*
# ============================================================
connectivityLink:
  mcpToken: "IpIbd50gbMb1p2+iCigrhkm21pZwbn0g"
  argocdMcpToken: ""
  mcpGateway:
    # Optional: install the MCP Gateway Operator (OLM) from redhat-operators.
    # Keep disabled by default to avoid OLM conflicts on clusters where Kuadrant /
    # Authorino are already installed and managing AuthConfig resources.
    operatorInstallEnabled: false
  operators:
    channel: stable-4.20
    version: 4.20.4
    # servicemeshoperator3: templates/servicemeshoperator3.yaml (omit here to avoid duplicate)
    subscriptions:
      - name: cluster-observability-operator
        namespace: openshift-cluster-observability-operator
        channel: stable
        source: redhat-operators
      - name: grafana-operator
        namespace: openshift-operators
        channel: v5
        source: community-operators
      - name: kiali-ossm
        namespace: openshift-operators
        channel: stable
        source: redhat-operators

  # neuralbank-stack — Keycloak URLs derived from deployer.domain when synced
  neuralbank:
    global:
      postgresql:
        auth:
          postgresPassword: "supersecretpassword"
          username: "neuralbank"
          password: "neuralbank123!"
          database: "neuralbank"
    backend:
      image:
        repository: quay.io/maximilianopizarro/neuralbank-backend
        tag: "latest"
        pullPolicy: Always
      service:
        port: 8080
      replicaCount: 1
    frontend:
      image:
        repository: quay.io/maximilianopizarro/neuralbank-front
        tag: "pkce"
        pullPolicy: Always
      service:
        port: 8080
      replicaCount: 1
    keycloak:
      clientId: "neuralbank-frontend"
      clientSecret: ""
      issuerUrl: ""
      authorizationEndpoint: ""
      redirectUri: ""
      tokenEndpoint: ""
      postLogoutRedirectUri: ""
    api:
      baseUrl: "/api"

