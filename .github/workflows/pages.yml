name: Deploy Showroom to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Clone showroom content
        run: git clone --depth 1 https://github.com/maximilianoPizarro/showroom-from-zero-to-hero.git /tmp/showroom

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Antora
        run: npm i -g @antora/cli@3.1 @antora/site-generator@3.1

      - name: Configure Antora for GitHub Pages
        run: |
          cat > /tmp/showroom/content/antora.yml << 'ANTORA'
          name: modules
          title: From Zero To Hero with Red Hat Developer Hub
          version: ~
          asciidoc:
            attributes:
              cluster_domain: apps.cluster.example.com
              user_name: user1
              user_password: redhat
              demo_namespace: terminal-demo
              demo_app: hello-world
          nav:
            - modules/ROOT/nav.adoc
          ANTORA

          cat > /tmp/showroom/site.yml << 'SITE'
          site:
            title: "From Zero To Hero with Red Hat Developer Hub"
            url: https://maximilianopizarro.github.io/test-drive-pe-oscg
            start_page: modules::index.adoc
          content:
            sources:
              - url: .
                start_path: content
          ui:
            bundle:
              url: https://github.com/rhpds/rhdp_showroom_theme/releases/download/patternfly-6/ui-bundle.zip
              snapshot: true
            supplemental_files: ./content/supplemental-ui
          asciidoc:
            attributes: {}
          output:
            dir: ./www
          SITE

      - name: Build Antora site
        run: antora --stacktrace site.yml
        working-directory: /tmp/showroom

      - name: Replace Demo Platform branding with OpenShift Commons
        run: |
          cp docs/assets/images/Logo-OSC_with_padding.png /tmp/showroom/www/_/img/footer_logo.png

          python3 << 'PYEOF'
          import glob, re

          NEW_FOOTER = '''<footer class="footer" style="text-align:center;padding:20px;">
            <a href="https://commons.openshift.org/" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:10px;text-decoration:none;color:#666;">
              <img src="{root}_/img/footer_logo.png" alt="OpenShift Commons" style="height:40px;">
              <span style="font-size:0.85rem;line-height:1.3;"><strong>OpenShift Commons Gathering</strong><br>Buenos Aires 2026</span>
            </a>
          </footer>'''

          for fpath in glob.glob('/tmp/showroom/www/**/*.html', recursive=True):
              with open(fpath) as f:
                  html = f.read()

              depth = fpath.replace('/tmp/showroom/www/', '').count('/')
              root = '../' * depth if depth > 0 else ''
              footer = NEW_FOOTER.replace('{root}', root)

              html = re.sub(
                  r'<footer class="footer">.*?</footer>',
                  footer,
                  html,
                  flags=re.DOTALL
              )
              with open(fpath, 'w') as f:
                  f.write(html)

          print('Footer replaced in all HTML files')
          PYEOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/showroom/www

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
